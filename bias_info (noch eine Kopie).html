            <h2>6. Wie Bias und Propaganda wirken</h2>

            <h3>Überzeugung</h3>
            <p>Zum einen gibt es Propaganda, wie man sie sich oft vorstellt: mit dem primären Ziel, ihre Empfänger von einer bestimmten Botschaft zu überzeugen. Die hier beschriebenen Bias-Typen können tatsächlich ein geeignetes Mittel dafür sein. Allerdings ist es gar nicht so einfach, jemanden durch bloße Kommunikation wirklich von etwas zu überzeugen, vor allem nicht, wenn ein Thema der Person sehr wichtig ist, sie eine starke Meinung vertritt und glaubt, viel darüber zu wissen. ${sourceLink( "de")}</p>
            <p>Die Forschung zeigt, dass sich neue Überzeugungen vor allem bei Themen formen lassen, die dem Empfänger mehr oder weniger egal sind und ihn nicht auf persönlicher Ebene berühren. Die meisten Menschen sind schnell bereit zu akzeptieren, dass Thomas Edison nicht die Glühbirne erfunden hat, tatsächlich hat er eine bestehende Erfindung verbessert und auf den Massenmarkt gebracht, selbst wenn sie zuvor das Gegenteil geglaubt haben. Bei Themen wie Migration, Sozialstaat, Sicherheit oder Steuerpolitik, also Themen, die politisch aufgeladen sind, sieht das jedoch ganz anders aus. ${sourceLink( "de")} Weil sie so politisiert sind, sind sie zu eng mit der eigenen Identität verknüpft. Sich oder anderen einzugestehen, dass man sich auch nur in einem Punkt irrt, stellt mit seinen Implikationen eine Bedrohung für das komplette eigene Bild der Welt und den eigenen Platz darin dar, etwas, das nach Möglichkeit vermieden werden muss.</p>
            <p>Eine überzeugende Botschaft ist also oft vor allem eine, die an bereits bestehende Überzeugungen anknüpft und als deren Fortsetzung wahrgenommen wird, nicht als Widerspruch. Ein Widerspruch kann sogar zum sogenannten <span class="term">Backfire-Effekt</span> führen: Werden Menschen mit einer Gegenposition zu ihren Überzeugungen konfrontiert, selbst wenn diese noch so logisch und gut argumentiert ist, verfestigen sie ihre Haltung als Abwehrmechanismus oft noch weiter. ${sourceLink( "de")}</p>
            ${figurePlaceholder(19, "de", "Platzhalter für eine Visualisierung von Überzeugung, Abwehr und Backfire-Effekt.")}
            <p>Überhaupt sind Medien viel effektiver darin, die Themen vorzugeben, die im öffentlichen Diskurs eine Rolle spielen, als direkt die Meinung zu diesen Themen zu ändern, auch wenn Staatsmedien in Autokratien aufgrund der fehlenden Konkurrenz durch widersprüchliche Perspektiven hier einen Vorteil haben könnten. ${sourceLink( "de")} Da gewisse Themen allerdings in der Bevölkerung mit gewissen Parteien besonders assoziiert sind, das sogenannte <span class="term">Topic Ownership</span> ${sourceLink( "de")}, und diese von der Diskussion „ihres“ Themas besonders profitieren, können Medien so trotzdem indirekt großen Einfluss nehmen. So ein Einfluss auf Wahlergebnisse ist zum Beispiel für das amerikanische Fox News empirisch belegt: Überall dort, wo der konservative Sender an den Start ging und eine Zuschauerschaft fand, haben die Republikaner messbar profitiert. ${sourceLink( "de")}</p>

            <h3>Polarisierung</h3>
            <p>Wenn Bias und Propaganda in beide Richtungen bestehender Überzeugungen wirken, entweder indem sie sie durch ihren Inhalt bestätigen oder durch den Widerspruch eine Verfestigung als Gegenreaktion provozieren, ist das zu erwartende Ergebnis eine Verstärkung gesellschaftlicher Gräben und Konfliktlinien, ein Ergebnis, das in Studien auch immer wieder nachgewiesen wird. ${sourceLink( "de")}</p>
            <p>Wenn das Thema bereits polarisierend genug ist, muss die Berichterstattung dazu nicht einmal selbst besonders spaltend sein; selbst gute, faktenbasierte, faire journalistische Arbeit kann durch bloße Erhöhung der Aufmerksamkeit für das Thema die Spaltung weiter befeuern. ${sourceLink( "de")}</p>
            <p>Dieser Effekt wird durch den <span class="term">Illusory Truth Effect</span> verstärkt: Wenn jemand generell anfällig für eine Botschaft ist, wird deren Glaubwürdigkeit höher eingestuft, je öfter sie wiederholt wird. ${sourceLink( "de")}</p>
            <p>Es wäre allerdings falsch, diese Politisierung nur als Nebenprodukt von Überzeugungsversuchen zu sehen; oft ist diese Spaltung selbst genau das Ziel. „Divide et impera“, also „teile und herrsche“, wie es bereits in der Antike hieß. Es ist gut dokumentiert, wie russische Propagandakampagnen in den USA sowohl pro- als auch anti-Black-Lives-Matter-Inhalte produzierten und verbreiteten. ${sourceLink( "de")} Teilweise wurden dabei sogar zeitgleich pro- und kontra-Veranstaltungen in derselben Stadt gefördert, um Konfrontation zu erzeugen.</p>
            ${figurePlaceholder(20, "de", "Platzhalter für eine Darstellung polarisierter Gegenproteste und Divide-et-impera-Strategien.")}
            <p>Natürlich wird diese Strategie nicht nur zwischen Staaten im „Informationskrieg“ eingesetzt. Auch innerhalb einer Gesellschaft kann es für diejenigen mit Macht von Vorteil sein, wenn Gruppen, die eigentlich ein Interesse daran hätten, sich miteinander zu solidarisieren, stattdessen übereinander herfallen.</p>
            <p>So zeigen Analysen politischer Werbekampagnen in den USA, dass die Republikaner besonders in Gegenden, die durch das Outsourcing von Jobs im Rahmen zunehmender Globalisierung schwer getroffen wurden, in ihrer Wählerwerbung besonders stark auf Themen setzten, die für die Identität vieler der weißen, nun oft arbeitslosen Arbeiter in diesen Regionen wichtig sind, etwa Waffenbesitz, Abtreibung, generell konservative Werte und auch Ablehnung von Immigration. ${sourceLink( "de")} Wirtschaftliche Fragen wie Steuern, Handel oder Sozialstaat rückten dagegen in den Hintergrund. Diese Themen wurden wiederum von den Demokraten stärker betont.</p>
            <p>Die Strategie der Republikaner lässt sich also so verstehen, dass sie angesichts einer sich verschlechternden wirtschaftlichen Lage versuchten zu verhindern, dass sich ihre Wähler den Demokraten zuwenden, von deren Wirtschafts- und Sozialpolitik sie möglicherweise mehr profitiert hätten. Stattdessen betonten sie stärker, was die Wähler in ihrer Identität von den Demokraten unterscheidet, um sie bei der Stange zu halten.</p>
            <blockquote class="quote-box">„Das Ziel des Propagandisten ist es, eine Gruppe von Menschen vergessen zu lassen, dass andere Gruppen ebenfalls Menschen sind.“ – Aldous Huxley ${sourceLink( "de")}</blockquote>
            <p>Diese <span class="term">Dehumanisierung</span> des vermeintlichen Gegners ist das, was die schlimmsten Formen organisierter Gewalt, zu denen die Menschheit fähig ist, überhaupt erst ermöglicht. Kein Krieg und kein Völkermord wären denkbar, wenn es nicht möglich wäre, Menschen die Menschlichkeit derer, die nicht zu „ihrer“ Gruppe gehören, vergessen zu lassen. ${sourceLink( "de")}</p>

            <h3>Zynismus</h3>
            <p>Manchmal bemüht sich Propaganda gar nicht, eine angebliche Wahrheit zu verbreiten. Stattdessen kann das Ziel auch sein, das Konzept von Wahrheit generell aufzulösen. ${sourceLink( "de")} An einem Tag wird eine Variante der Ereignisse, eine Version der Geschichte, gepusht, am nächsten Tag eine völlig andere. Bis eine Lüge richtiggestellt ist, wurden schon zwei neue in Umlauf gebracht. Angesichts dieser Flut erscheint die Wahrheit bald nur noch als eine Geschichte unter vielen. „Man hört so viel, wer weiß schon, was wirklich stimmt? Es lügen doch sowieso alle.“</p>
            ${figurePlaceholder(21, "de", "Platzhalter für eine Visualisierung von Informationsüberflutung, Relativierung und Zynismus.")}
            <p>Für ein Regime oder eine Bewegung, für die Macht wichtiger ist als jede tatsächliche Überzeugung, kann diese Form der Propaganda durchaus nützlicher sein. Wer an keine Wahrheit mehr glaubt, kann sich auch nicht enttäuscht von ihrer Wahrheit abwenden.</p>
            <p>Eine Propaganda, der die Wahrheit nicht mehr wichtig ist, stört dementsprechend auch ein Fact-Check nicht wirklich. Tatsächlich hat beispielsweise die russische Auslandspropaganda im Rahmen der „Operation Overload“ sogar immer wieder gezielt Fact-Checking-Organisationen kontaktiert und sich dabei als „besorgte Bürger“ ausgegeben, die diese oder jene Falschmeldung geprüft haben wollten. ${sourceLink( "de")} Denn eine Richtigstellung sehen viel mehr Leute als die ursprüngliche Lüge.</p>
            <p>Es gibt mittlerweile Forschung, die belegt, dass selbst ein erfolgreicher Fact-Check, also einer, bei dem die Leute hinterher wissen, was wahr und was falsch ist, nicht verhindern kann, dass die Lüge einen gewissen Effekt auf Überzeugungen hat. ${sourceLink( "de")}</p>

            <h3>Einschüchtern</h3>
            <p>Von außen betrachtet wirkt die Propaganda in vielen Diktaturen oft einfach nur absurd lächerlich: riesige goldene Statuen, peinliche Loblieder und Wahlen, die angeblich mit 99&nbsp;% der Stimmen gewonnen werden. Diese Absurdität ist zum Teil natürlich einfach das Ergebnis des Narzissmus dieser Gewaltherrscher, die irgendwann den Kontakt zur Realität verloren haben. Gleichzeitig steckt aber auch System dahinter: Öffentlich eine Lüge zu verkünden, die so absurd und dumm ist, dass jeder sie sofort als solche durchschaut, und gleichzeitig jeden zu zwingen, öffentlich bei dieser Lüge mitzumachen, ist eine Demonstration von Macht. Widerstand gegen eine Regierung, die eine ganze Gesellschaft zwingen kann, „die Lüge zu singen“ ${sourceLink( "de")}, erscheint oft sinnlos. ${sourceLink( "de")}</p>
            ${figurePlaceholder(22, "de", "Platzhalter für eine Darstellung absurder Propaganda in Diktaturen.")}
            <p>Diktaturen versuchen häufig, etwa durch ein Netzwerk aus Spitzeln, zu garantieren, dass sich diese Lüge bis ins Private fortsetzt, bis sich jede und jeder fragt, ob sie oder er nicht allein mit der eigenen Opposition dasteht. Allerdings hat die Geschichte gezeigt, dass das Private letztlich viel schwerer zu kontrollieren ist als die Öffentlichkeit. Im Privaten überwintern die wahren Überzeugungen, warten auf Risse in der Fassade, und sobald diese bricht, kann alles ganz schnell gehen – wie in der Geschichte „Des Kaisers neue Kleider“. ${sourceLink( "de")}</p>
            <p>Historisch lässt sich die letzte öffentliche Rede von Nicolae Ceaușescu als symbolisch für diese Dynamik verstehen. Der rumänische Diktator pflegte einen extremen Personenkult, ließ sich als „Genie der Karpaten“ feiern und inszenierte Massenkundgebungen mit zehntausenden jubelnden Anhängern. Bei seiner letzten Rede, mit der das Regime angesichts der Proteste in Timișoara Stärke demonstrieren wollte, sprach er vor rund 100.000 angekarrten Zuschauern. Als plötzlich einzelne Buhrufe laut wurden, die sich schnell lawinenartig über den Platz verbreiteten, geriet Ceaușescu ins Stocken, die TV-Übertragung brach ab, und aus der geplanten Machtdemonstration wurden Massenproteste, die wenige Tage später zu seinem Sturz führten. ${sourceLink( "de")}</p>
            <p>Tatsächlich sind es vor allem Diktaturen, die sich ansonsten keinerlei Mühe machen, auch nur den Anschein von Demokratie aufrechtzuerhalten, die auf solche absurde Propaganda setzen. Laut einer Analyse von Propaganda aus verschiedenen Autokratien entsprechen die typischen Staatsmedien in Autokratien, die einige demokratische Legitimationselemente aufrechterhalten, wie etwa Wahlen, die natürlich alles andere als frei und fair sind, in ihrem Bias-Niveau etwa „Fox News“. ${sourceLink( "de")} Also einem Sender, der zwar eindeutig extrem parteiisch ist und sich nicht zu schade ist, klare Propaganda zu verbreiten, aber eben Propaganda, die von den Zuschauern tatsächlich geglaubt werden soll. Medien in totalitären Staaten sind laut dieser Analyse jedoch etwa viermal parteiischer, bis zu einem Level, das ins Absurde abgleiten kann.</p>
            <p>Auch die Natur der Wirtschaft eines Regimes kann die Art der Propaganda und des Bias bestimmen: Autokratische Regierungen, die ihr Einkommen vor allem aus dem Verkauf natürlicher Ressourcen wie Erdöl ziehen, neigen zu einer noch strikteren Kontrolle jeder Form kritischer Berichterstattung als Diktaturen, die weniger ressourcenreich sind. ${sourceLink( "de")} Die gängigste Theorie führt dies darauf zurück, dass Diktaturen, die sich nicht einfach über eine einzelne Ressource finanzieren können, stärker darauf angewiesen sind, dass die Bürokratie im Land einigermaßen funktioniert, und demzufolge ein Interesse daran haben, dass etwa Fälle von Korruption über die Medien aufgedeckt werden können.</p>

            <h3>Kann es gute Propaganda geben?</h3>
            <p>Wenn Bias und Propaganda grundsätzlich funktionieren, dann stellt sich natürlich die grundsätzliche Frage, ob es so etwas wie gute Propaganda geben kann. Also Kommunikation, die anstatt im Sinne der Aufklärung mit rationaler Argumentation und Fakten zu überzeugen versucht, sich bewusst der hier diskutierten Techniken bedient, um Ziele voranzutreiben, die eine aufgeklärte Gesellschaft in der Regel als „gut“ bezeichnen würde. Natürlich bleibt es am Ende immer ein Stück weit subjektiv, was „gut“ ist; die Diskussion würde an dieser Stelle zu weit führen. Aber wenn man wirklich ein Anliegen hat, das diese Bezeichnung verdient, wäre es dann ein Fehler, sich dieser funktionierenden Methoden zu verweigern und den Erfolg seines Anliegens zu riskieren, oder ist eine solche Form der manipulativen Kommunikation bereits ein Fehler an sich – aus prinzipiellen ethischen Überlegungen oder weil man die Normalisierung dieser Methoden für zu gefährlich hält?</p>
            <p>Denn tatsächlich kann Propaganda nicht nur Desinformation verbreiten, extremistische Kräfte an die Macht bringen und eine Gesellschaft spalten, sondern ebenso helfen, die öffentliche Gesundheit zu verbessern ${sourceLink( "de")}, den Aufstieg von Extremisten zu bremsen ${sourceLink( "de")} und Gemeinsamkeiten zu betonen ${sourceLink( "de")}.</p>
            <blockquote class="quote-box">„Der einzige Unterschied zwischen ‚Propaganda‘ und ‚Bildung‘ liegt eigentlich im Blickwinkel. Die Förderung dessen, woran wir glauben, ist Bildung. Die Förderung dessen, woran wir nicht glauben, ist Propaganda.“<br><br>„Propaganda wird niemals aussterben. Intelligente Menschen müssen erkennen, dass Propaganda das moderne Instrument ist, mit dem sie für produktive Ziele kämpfen und helfen können, Ordnung aus dem Chaos zu schaffen.“ – Edward Bernays ${sourceLink( "de")}</blockquote>
            ${figurePlaceholder(23, "de", "Platzhalter für eine Visualisierung der ethischen Spannung zwischen Aufklärung und manipulativer Kommunikation.")}
            <p>Die meisten der anderen hier bereits zitierten Autoren, von Lippmann über Huxley bis Orwell, sehen das deutlich kritischer. Wer letztendlich Recht hat, darauf kann BiasScanner keine Antwort geben, auch wenn ich natürlich meine eigene persönliche Meinung dazu habe. Unser Ziel ist es, auf das Thema aufmerksam zu machen und Usern zu helfen, Bias und Propaganda zu erkennen, zu verstehen und zu ermöglichen, dass sie selbst eine Entscheidung treffen, wie sie damit umgehen wollen.</p>
          `,
          "social-media": () => `
            <h2>7. Bias, Propaganda und Social Media</h2>

            <h3>Der Algorithmus als neuer Gatekeeper</h3>
            <p>Oben wurde bereits darauf eingegangen, wie im 21. Jahrhundert die Rolle des „Gatekeepers“ zwischen uns und den Nachrichten zusehends von den klassischen Medien auf insbesondere Social Media übergeht. Hier kommt der Algorithmus als eine neue, automatisierte Quelle des Bias ins Spiel. In der Ausgestaltung des Algorithmus wiederum spielen die altbekannten Faktoren eine Rolle: einmal das marktwirtschaftliche Zusammenspiel aus Angebot und Nachfrage. Social-Media-Plattformen haben ein Interesse daran, dass ihre User möglichst viel Zeit auf der Plattform verbringen, damit ihnen möglichst viel bezahlte Werbung ausgespielt werden kann. Also werden solche Inhalte priorisiert, mit denen User besonders viel interagieren, und das sind wie bei klassischen Medien emotionalisierende Inhalte und solche, die das eigene Weltbild bestätigen. ${sourceLink( "de")}</p>
            <p>Daneben kommt die Agenda der Eigentümer, die noch häufiger als bei klassischen Medien Milliardäre sind. Es ist nicht immer möglich nachzuvollziehen, wie sehr hier aktiv aufgrund einer politischen Agenda eingegriffen wird, aber im Fall von Elon Musk, „Twitter“ bzw. „X“, beispielsweise tauchten laut einer Analyse der Queensland University seine eigenen Tweets und die anderer rechter Accounts deutlich häufiger in den Empfehlungen auf, nachdem Elon Musk im Juli 2024 offiziell erklärte, Donald Trump in der anstehenden Wahl zu unterstützen. ${sourceLink( "de")}</p>
            ${figurePlaceholder(24, "de", "Platzhalter für eine Darstellung algorithmischer Empfehlungen und Plattformmacht.")}
            <p>Allgemein zeigen Experimente immer wieder, dass standardmäßig über alle Plattformen hinweg Usern deutlich mehr rechter Content vorgeschlagen wird als linker. Das kann aber auch einfach daran liegen, dass die politische Rechte in der Regel ein besseres „Social-Media-Game“ hat und das, was auf diesen Plattformen besonders gut läuft, besonders gut produzieren kann. Vergleicht man beispielsweise das Verhältnis zwischen Social-Media-Werbebudget und gesammelten Reaktionen im Wahlkampf für den deutschen Bundestag 2025, so ergibt sich für die AfD das beste Verhältnis, während die Grünen hier am ineffizientesten wären. Gleichzeitig konnte allerdings auch die Linke gut Boden gutmachen. ${sourceLink( "de")}</p>
            <p>Da Menschen tendenziell empfänglicher für Botschaften sind, die nicht sofort als Propaganda erkennbar sind ${sourceLink( "de")}, sondern vermeintlich von „Menschen wie du und ich“ kommen, werden auf Social Media neben offiziellen Parteiaccounts auch vermeintlich unabhängige Accounts zur Multiplikation der eigenen Botschaft eingesetzt. Eine Strategie, die außerhalb von Social Media schon länger als <span class="term">Astroturfing</span> bekannt ist. ${sourceLink( "de")}</p>

            <h3>Politische Narrative in Unterhaltung</h3>
            <p>Passend dazu ist die Verbreitung politischer Narrative in Form von vorgeblich apolitischer Unterhaltung. Das ist ebenfalls nicht neu: Auch Bücher, Filme oder Videospiele transportierten schon immer ein bestimmtes Bild von der Welt, oft unbeabsichtigt, oft aber auch geplant. Durch Social Media kommen hier nun auch verstärkt zum Beispiel Podcasts ins Spiel, die sich selbst nicht primär als Politik-, sondern als Unterhaltungsformate sehen. Diese vorgebliche Distanz zur Politik, an die die Hosts oftmals sogar selbst glauben, sowie der intime Charakter machen diese Formate zu effektiven Werkzeugen der Verbreitung von Narrativen. Media Matters hat dieses Phänomen für die USA 2024 untersucht und identifizierte auch hier eine starke Dominanz rechter Formate: Neun von zehn der nach Followern populärsten Online-Formate, bei denen eine politische Orientierung festzustellen war, waren eher rechts orientiert. ${sourceLink( "de")}</p>
            ${figurePlaceholder(25, "de", "Platzhalter für eine Visualisierung zu Podcasts, Unterhaltung und politischer Einflussnahme.")}
            <p>Was zusätzlich auffällt: Ein Drittel dieser Formate mit erkennbarer politischer Ausrichtung kategorisieren sich selbst als unpolitisch, besonders häufig, nämlich in 72&nbsp;% der Fälle, wenn sie eigentlich politisch rechts stehen.</p>

            <h3>Die deutsche Medienlandschaft</h3>
            <p>Je nachdem, wen man fragt, sind die Medien in Deutschland eher klar links oder eindeutig rechts. ${sourceLink( "de")} Wie man das sieht, hängt wenig überraschend primär davon ab, wo man selbst steht. Aus diesem Grund versucht der BiasScanner, Bias nicht anhand des Links-Rechts-Spektrums, sondern konkreter anhand der verwendeten Art von Sprache zu messen.</p>
            <p>Der Medienkompass hat vor 2019 einmal versucht, diese Positionen mit einer großen Umfrage zusammenzufassen, nach dem Motto: Wenn eine Hälfte ein Medium für links und die andere Hälfte es für rechts hält, entspricht es wohl der Mitte der Gesellschaft. ${sourceLink( "de")} Ich hatte diese Umfrage, die neben der Ausrichtung auch nach der empfundenen Qualität des Journalismus fragte, Anfang 2025 einmal mit Zahlen zur Reichweite verschiedener Medien kombiniert, um einen Überblick zu bekommen, wie man die deutsche Medienlandschaft insgesamt einordnen könnte. Zusammengefasst ergibt sich nach diesen Zahlen das Bild einer deutschen Medienlandschaft, die politisch Mitte rechts steht und nicht unbedingt qualitativ hochwertig berichtet. Die mit Abstand auflagenstärkste Tageszeitung war die BILD, die bekanntermaßen ebenso rechts wie reißerisch ist. Ebenso war ihr Webangebot auch das meistaufgerufene Online-Nachrichtenportal, allerdings war hier der Abstand zu anderen Websites wie der deutlich mittigeren und qualitativ besseren Tagesschau und t-online, das in der Medienkompass-Umfrage wie andere neuere Medien nicht dabei war, aber eher Mitte bis Mitte links eingeordnet wird, nicht so groß wie bei den Printmedien. Im Fernsehen hatten nach wie vor Formate des Öffentlich-Rechtlichen die Nase vorn, während auf YouTube mit Welt TV ein weiteres Mal eine Marke des Springer-Konzerns am reichweitenstärksten war.</p>
            ${figurePlaceholder(26, "de", "Platzhalter für eine Übersichtsgrafik zur deutschen Medienlandschaft.")}
            <p>Die große Frage bleibt: Was können wir tun, um zumindest zu versuchen, uns bestmöglich zu informieren, anstatt uns manipulieren zu lassen?</p>
          `,
          "practical-tips": () => `
            <h2>8. Was können wir tun?</h2>
            <p>Ein Ansatz, den wir zum Beispiel mit BiasScanner versuchen, beruht wie oben erwähnt auf der <span class="term">Inoculation Theory</span>. Die Idee ist, durch Konfrontation mit Formen von Bias und Propaganda in einem kontrollierten Setting eine gewisse Resistenz aufzubauen. Wenn man beispielsweise später gewisse Muster, die man beim Spielen mit BiasScanner bereits schon einmal gesehen hat, wiedererkennt, kann das helfen, sich davon nicht beeindrucken zu lassen.</p>
            <p>Zum anderen wollen wir aber auch das kritische Nachdenken und die Auseinandersetzung mit Medien ganz grundsätzlich fördern. Wer die Nachrichten nicht einfach als die Nachrichten betrachtet, sondern als etwas, das man mit einer gewissen Distanz analysieren, diskutieren und kritisch hinterfragen kann, lässt sich davon wohl auch nicht so einfach beeinflussen.</p>
            <p>Dabei sollte klar sein, dass keiner von uns völlig ohne Bias durchs Leben geht und die Welt so sehen kann, wie sie ist, aber das ist okay. Wichtig ist, dass wir uns dessen bewusst sind und trotzdem versuchen, uns der „Wahrheit“ irgendwie nach bestem Wissen und Gewissen anzunähern. Hier sind ein paar Ideen, die wir dafür im Hinterkopf behalten können:</p>

            <div class="info-box">
              <h4>Praktische Leitgedanken</h4>
              <ul class="checklist">
                <li>Immer dran denken: Die Welt, die in den Medien gezeigt wird, ist keine direkte Abbildung der echten Welt, sondern eine Version, die durch viele Filter gelaufen ist.</li>
                <li>Seid skeptisch. Macht nicht den Fehler, etwas zu glauben, nur weil es in das eigene Weltbild passt.</li>
                <li>Erlaubt euch und anderen, die Meinung zu ändern. Wir alle irren uns ständig, und das ist okay. Viel zu häufig halten wir an etwas nur deswegen fest, weil es zu schwierig für die eigene Identität ist, uns und anderen einzugestehen, dass wir unrecht hatten. Wir sollten uns also alle um ein gesellschaftliches Umfeld bemühen, in dem so ein Eingeständnis ohne hohe soziale Kosten passieren kann.</li>
                <li>Fragt euch immer: Will dieser Nachrichtenbeitrag mich informieren oder will er mir sagen, was ich zu denken oder zu fühlen habe? Woher kommt diese Nachricht, und wieso bekomme ich sie zu sehen?</li>
                <li>Gönnt euch eine Pause. Ihr müsst nicht permanent up to date mit den neuesten Einzelheiten aller Krisen, Konflikte und Tragödien auf der Welt sein. <span class="term">Doomscrolling</span> hilft niemandem, im Gegenteil.</li>
                <li>Lasst euch nicht gegen andere Menschen aufhetzen. Das hat noch nie zu etwas Gutem geführt. Erkennt solche Versuche und lasst euch nicht darauf ein.</li>
                <li>Distanziert euch von dem Nachrichtenbeitrag und schaut von außen darauf, ob und wie Arten von Bias darin vorkommen. Nutzt auch gerne BiasScanner zum ersten Einstieg 😉</li>
              </ul>
            </div>
          `
        },

            <h2>8. Was können wir tun?</h2>
            <p>Keiner von uns ist völlig frei von Bias. Umso wichtiger ist es, Medien nicht einfach nur zu konsumieren, sondern bewusst und mit etwas Distanz zu lesen.</p>

            <div class="info-box">

      en: {
        full: {
          definitions: () => `
            <h2>1. What do we mean by <span class="term">media bias</span>?</h2>
            <p>In very general terms, <span class="term">bias</span> means a systematic distortion in the representation of reality. That can happen, for example, when a career-guidance chatbot suggests professions such as software engineer or engineer far less often to girls, and jobs such as educator or social worker far less often to boys, even though gender says little about actual suitability. Or when we meet someone new and our brain, as a mental shortcut, instinctively relies on hasty judgments based on superficial features to assess the person in front of us. Or in the media, when an event is not presented as fairly and factually as possible, but reporting adopts or privileges a perspective that the facts do not justify. That is the kind of <span class="term">media bias</span> BiasScanner is trained to detect.</p>
            <p>You can think of bias as a filter lying between reality and our perception. The world as we see it is not always the world as it really is. Since in principle every human being has such a filter, journalists included, their own perspectives and prejudices often slip into reporting unconsciously. <span class="term">Media bias</span> is therefore not always intentional; in fact, a very large share of bias in the media is probably produced without manipulative intent. But there is also media bias that is used deliberately to manipulate and divide people; in that case we speak of <span class="term">propaganda</span>.</p>
            <p>While today we mostly use that word for politically motivated attempts at manipulation, up until the mid-20th century even advertising—which often is, at its core, manipulation driven by economic motives—was openly and neutrally referred to as propaganda. Because even if proponents of classical economic theory or democratic theory sometimes claim otherwise, whether we support a certain political party or buy the smartphone of a certain brand, neither is simply an enlightened, rational decision based on the best arguments. In both cases it is also about who presses “our buttons” most effectively.</p>
            <p>In fact, the most famous book by Edward Bernays, published in 1928 and appropriately written by a man now regarded as one of the founders of “public relations” (PR), bears the simple title “Propaganda.” ${sourceLink( "en")}</p>
            <p>Over the course of the 20th century, however, the reputation of the term “propaganda” became so negatively charged—through its large-scale, state-organized use in both world wars and its association with totalitarian ideologies—that companies and advertisers eventually wanted to avoid any association with it at all.</p>

            <div class="info-box">
              <h4>In summary, we can define:</h4>
              <div class="definition-grid">
                <div class="card">
                  <h4><span class="term">Media bias</span></h4>
                  <p>The tendency to report a story, consciously or unconsciously, in a way that reinforces an existing narrative rather than offering an objective account of the facts.</p>
                </div>
                <div class="card">
                  <h4><span class="term">Propaganda</span></h4>
                  <p>The deliberate use of <span class="term">(media) bias</span> in order to manipulate public opinion.</p>
                </div>
              </div>
            </div>

            <h3>Three levels of media bias</h3>
            <p><span class="term">Media bias</span> can, in principle, appear on three levels:</p>
            <div class="level-grid">
              <div class="card">
                <h4>At the publication level</h4>
                <p>This refers to the overall bias of a medium, whether a newspaper, a TV channel or a social-media page. Which topics are covered at all, and how much? Which real or supposed experts are regularly given a voice?</p>
              </div>
              <div class="card">
                <h4>At the article level</h4>
                <p>Here the focus is the overall bias of a single article or contribution: which perspective on the topic ultimately dominates? Which narratives are supported, and which details are emphasized?</p>
              </div>
              <div class="card">
                <h4>At the sentence level</h4>
                <p>Which viewpoint is being pushed in a single sentence or in a connected group of sentences, and how exactly does that happen?</p>
              </div>
            </div>
            <p><span class="term">BiasScanner</span> is explicitly trained to search the article level and the sentence level for bias.</p>
          `,
          detection: () => `
            <h2>2. BiasScanner, taxonomy and automated detection</h2>
            <p>To categorize the individual sentences the system finds, we gradually developed a <span class="term">taxonomy</span> of bias types. It is based on a dataset of examples collected by us and with the help of an earlier version of Scanner. At this point, many thanks again to everyone who used BiasScanner so diligently, and especially to those who used the feature that let them “donate” their bias report ;)</p>
            <p>We used the <span class="term">periodic table of the elements</span> as inspiration for structuring our taxonomy of media-bias types. Like the periodic table, which started out incomplete and evolved through new discoveries, our taxonomy is meant to remain expandable and gradually provide a complete picture of all sentence-level bias types.</p>
            ${figurePlaceholder(1, "en", "Placeholder for a visualization of the bias taxonomy in the style of the periodic table.")}
            <div class="info-box">
              <h4>How the taxonomy is arranged</h4>
              <ul class="clean-list">
                <li>Similar bias types are grouped together and highlighted by color.</li>
                <li>The placement of the groups is based on how frequent all bias types in a group are in a sample from our dataset.</li>
                <li>The order within each group is based on frequency.</li>
                <li>To keep groups visually connected, the order alternates in a zigzag pattern: odd rows run left to right, even rows right to left.</li>
                <li>For each type, one of five font sizes indicates absolute frequency.</li>
              </ul>
            </div>
            <p>More detailed explanations of what defines the individual types and how exactly we developed the system of bias elements are available in our article. ${sourceLink( "en")}</p>

            <h3>From Walter Lippmann to <span class="term">NLP</span></h3>
            <p>When the American journalist Walter Lippmann, together with his partner Charles Merz and with the help of his wife, conducted what is considered the first systematic study of bias in reporting in 1920 with “A Test of the News,” he analyzed how the New York Times covered the October Revolution in Russia. ${sourceLink( "en")} This was extremely labor-intensive: hundreds of articles had to be read and compared with other sources. The same effort would have had to be repeated from scratch for every new topic. At the same time, Lippmann observed: “The news cannot be mathematically stated.”</p>
            <p>Then, a few decades later, the computer arrived: in 1954, the Georgetown–IBM experiment publicly demonstrated for the first time that a machine could process text by translating sentences from Russian into English. Leon Dostert, one of the scientists involved, stated: “The people responsible for this experiment now regard it as definitively proven that transfer of meaning by electronic language translation is possible.” ${sourceLink( "en")} This marked the beginning of the electronic processing of language by computers, so-called <span class="term">Natural Language Processing (NLP)</span>. What Lippmann had said may have been true in his time, but now it suddenly seemed possible that news might indeed be expressible mathematically after all.</p>
            <p>Because news consists of words, words consist of individual characters and tokens—smaller units, similar to but not identical with syllables—and these characters and tokens can be represented by numbers. And with numbers, we can automatically compute and compare things.</p>
            <p>Early approaches to bias detection often tried to measure distortion by comparing an article with some reference point. For example, researchers counted how often certain think tanks or political groups were quoted ${sourceLink( "en")}, or how similar the language used in an article was to the language of speeches by selected politicians ${sourceLink( "en")}. The need for such a reference point, however, greatly limits transfer to new topics, because a new reference has to be collected every time. A list of American think tanks and speeches by members of Congress is not necessarily useful if you want to detect the bias of a German-language newspaper.</p>

            <h3><span class="term">Word embeddings</span></h3>
            <p>Another breakthrough in the “mathematization” of news and text in general came with so-called <span class="term">word embeddings</span>: a method for representing words as vectors—simplified, arrows with length and direction. Vectors for words with similar meanings point in similar directions, while the tips of vectors for very different meanings lie far apart.</p>
            ${figurePlaceholder(2, "en", "Placeholder for a graphic showing word vectors in a semantic space.")}
            <p>To visualize these vectors, people often use a simplified three-dimensional projection, because we live in a three-dimensional world and usually find it difficult to imagine higher dimensions. In practice, however, such vectors often have several hundred dimensions—in <span class="term">Word2Vec</span>, one of the best-known formats, for example, 300. ${sourceLink( "en")} Each of these dimensions can represent a particular “layer of meaning,” such as animals or movement, but they are not always directly interpretable by humans and may encode relationships that are visible only to the computer.</p>
            <p>These vectors are generated through automated statistical methods that learn from large amounts of text in which contexts words tend to appear together more or less often.</p>
            <p>Once words are represented as vectors, we can use vector arithmetic to learn about the relationships between them. The cosine of the angle between two vectors, for example, tells us how similar two concepts are in meaning. In Word2Vec, the cosine between <em>chimpanzee</em> and <em>gorilla</em> is about 0.61, whereas between <em>chimpanzee</em> and <em>bicycle</em> it is only around 0.15.</p>
            ${figurePlaceholder(3, "en", "Placeholder for a visualization of cosine similarity between word vectors.")}
            <p>Things become especially exciting when you begin adding and subtracting vectors. The sum of the vector for <em>princess</em> and <em>coronation</em>, for example, approximately yields the vector for <em>queen</em>. If you subtract <em>beer</em> from <em>munich</em>, you get <em>berlin</em>. And according to Word2Vec, <em>birds</em> are <em>animals</em> plus <em>feathers</em>, but minus <em>scales</em>.</p>
            ${figurePlaceholder(4, "en", "Placeholder for a visualization of vector arithmetic with word vectors.")}

            <h3>Machine learning, <span class="term">transformers</span> and <span class="term">LLMs</span></h3>
            <p>When people talk about AI today, what they usually mean is <span class="term">machine learning</span>. The difference from classical programming is that you do not manually tell the computer, “if this happens, do that.” Instead, in simplified terms, you show the computer many examples of an input and the corresponding output, and it has to find its own way of getting there.</p>
            <p>The most common way of doing this today is through various forms of so-called <span class="term">neural networks</span>. These are models inspired by a highly simplified idea of how the human brain works. You program several layers of so-called neurons that are connected to one another. Each neuron stores a number—which, amusingly, is also called a bias—that determines when it forwards a signal it has received from another neuron. For each connection, it also stores weights that determine how strongly a signal is passed on. At the beginning, all of these numbers are random. During training, the model is shown many examples according to the principle: for this input signal—for example, an image of a cat—this output must result, in this case the classification “cat.” The model is then checked to see whether its current numbers already produce the right answer. If not, those numbers are adjusted using a mathematical procedure called <span class="term">backpropagation</span> so that they would lead to the correct result. If this is repeated not for one cat image but for many, the model eventually learns what generally makes a cat recognizable.</p>
            ${figurePlaceholder(5, "en", "Placeholder for a schematic neural network with inputs, weights and outputs.")}
            <p>You can also train such models, using the word embeddings described above, so that instead of saying which animal appears in an image, they predict the next word in a text. Simple neural networks like the basic form described above quickly run into limits here, because they struggle to capture the relationship among all the words in a sentence and therefore often make rather nonsensical suggestions. That is why there are specialized variants tailored to text, such as the <span class="term">transformer</span>.</p>
            <p>The most important feature helping the transformer take the context of words in a sentence into account is the so-called <span class="term">self-attention mechanism</span>, a mathematical method in which the relevance of every token—the small text units transformers work with, which can be whole words or parts of words—is calculated for every other token. This allows the model to understand longer texts as well.</p>
            ${figurePlaceholder(6, "en", "Placeholder for an illustration of the self-attention mechanism in a transformer.")}
            <p>When these models become very large, with billions of parameters, and are trained on huge amounts of text—billions to trillions of tokens—we call them <span class="term">large language models</span>, such as ChatGPT, LLaMA or Mistral. These models learn to predict the most likely next token, one token at a time, with some randomness added for variation.</p>
            ${figurePlaceholder(7, "en", "Placeholder for a depiction of token-by-token prediction in a large language model.")}
            <p>Besides these generative transformers—the <span class="term">Generative Pre-trained Transformers</span>, the GPT in ChatGPT—there is also a second branch of the transformer family: encoder models such as <span class="term">BERT</span>, which mainly understand and classify text rather than generate it. Their understanding of text is often even a bit more precise, because they can consider the entire context of a sentence at once rather than processing tokens strictly one after another.</p>
            <p>BiasScanner itself is based on <span class="term">GPT</span> technology because we also want to generate explanations for the detected types of bias and propaganda. More specifically, BiasScanner is based on so-called <span class="term">fine-tunes</span>. In other words, you take a model that has already been trained on a great deal of varied text and therefore has a basic understanding of language, and then you continue training it for a specialized task—in our case, detecting and explaining bias and propaganda. ChatGPT itself, incidentally, is a fine-tune of a base GPT model that was further trained to follow instructions.</p>
            <p>The most important thing for such training is a dataset with diverse examples that represent the problem well. In our case, that means a dataset containing many different examples of bias and propaganda, correctly classified and well explained. ${sourceLink( "en")}</p>
          `,
          "bias-psychology": () => `
            <h2>3. No one is free from bias</h2>
            <p>Let us imagine someone tells us that he is about to move to Paris. The moment we hear the name of the city—<span class="term">Paris</span>—images appear in our mind’s eye. Some are probably romantic, like the Eiffel Tower rising above the city, or Parisians walking past cafés in the cobbled streets of Montmartre with a baguette under one arm and a beret on their head. Other images may be less pleasant: some people think of hotels with bedbugs or sewage in the Seine. We ask ourselves what we know about the people of Paris. Somewhere we may have heard that Parisians are arrogant; somewhere else that they are especially stylish.</p>
            ${figurePlaceholder(8, "en", "Placeholder for an image collage showing different mental images of Paris.")}
            <p>Depending on which images come to mind, our reaction will differ. Are we happy for the person, or can we not understand at all why anyone would voluntarily live in such a city? Either way, the individual images in our head combine into an overall picture of Paris. But where do these images come from, and is Paris really just their sum?</p>
            <p>Some of us may have seen films like <em>Midnight in Paris</em> or series like <em>Emily in Paris</em>. Others may have had many reports about the city pushed into their social-media feeds around the 2024 Olympic Games. Perhaps we know someone who has been there, or we have visited the city ourselves. Depending on what we have seen on screens, heard from others, or experienced personally, our picture of Paris will differ. Did Hollywood show us a romantic version of Paris? ${sourceLink( "en")} Did Russian disinformation campaigns deliberately exaggerate the bedbug issue before the Games? ${sourceLink( "en")} Did our acquaintance simply have bad luck and happen to meet especially arrogant Parisians? Was the trash collection on strike while he was there? Did we, by contrast, simply get lucky and encounter only the nicest Parisians? Did we have especially good timing and spend time only in the prettiest corners?</p>
            <p>Paris is a city with millions of inhabitants and thousands of streets, all with their differences. And today it is already a little different from yesterday. That is the core problem of opinion formation: most things in the world are too complex, too confusing and too constantly changing for any individual person to fully grasp them. Our own experiences, if we even have them, are always just one fragment of the whole. The information we receive second-hand—from acquaintances, the news or social media—is likewise always just one aspect, one perspective, that has already passed through someone else’s filter.</p>
            <p>Out of all these fragments we build a simplified model of the real world in our heads, the <span class="term">“pseudo-environment”</span>, as Walter Lippmann called it. ${sourceLink( "en")} This pseudo-environment relies heavily on <span class="term">“stereotypes”</span>, strongly simplified, generalized prejudices and assumptions about the world. While today we mainly use the word “stereotypes” for clichés about groups of people, Lippmann also meant general, heavily simplified assumptions about politics, economics and society. One example is the still widespread idea that government finances basically work like those of a private household. ${sourceLink( "en")}</p>
            ${figurePlaceholder(9, "en", "Placeholder for an illustration of the pseudo-environment as a simplified map of reality.")}
            <p>In the best case, this pseudo-environment is a usable approximation of the real world, good enough to make sensible decisions on its basis. In the worst case, a person’s worldview has very little to do with the actual world, which causes problems when decisions are made for a world that does not really exist. If two pseudo-environments differ too much, this also makes it harder to resolve conflicts and find compromises. After all, it is difficult to find a common path if people are using different maps. Lippmann put it this way: people “live in the same world, but they think and feel in different ones.”</p>
            <p>To make matters worse, most people are firmly convinced that their own opinions are not the result of stereotypes, prejudice or second-hand perspectives. No—their opinion is “common sense” or the result of “doing their own research.” “Ideologues” or manipulated “sheep” are always the others.</p>
            <p>This shows up not only in the beer-tent speeches of assorted politicians, but also in surveys in which a majority says it is not very worried that the media they themselves consume may be biased—while expressing concern about the media consumed by “most other people.” ${sourceLink( "en")} Experiments from Yale University also show that support for exactly the same policy depends strongly on whether one’s own political side supports or rejects it. At the same time, most participants were sure that not they themselves, but only the other camp, was so easily influenced. ${sourceLink( "en")}</p>
            ${figurePlaceholder(10, "en", "Placeholder for a visualization of motivated reasoning and partisan perception.")}
            <p>The phenomenon behind this is called <span class="term">motivated reasoning</span>. We do not like admitting—to ourselves or to others—that our opinions may not actually be the result of independent, rational reflection. By now it is well established that we often use our reason primarily to give supposedly rational explanations after the fact for positions we adopted mainly because of bias. Often we first “feel” an opinion and only afterwards look for the argument to support it, not the other way around. That is why it can be so hard to persuade someone with arguments: their position was often not formed on the basis of arguments in the first place.</p>
            <p>This is especially true when an issue has particular emotional or identity-related importance for us. ${sourceLink( "en")} Someone who regards Paris as just another city can demonstrably still be influenced by new information about it. But someone with a strong personal connection to Paris, positive or negative, or someone who sees Paris as a political symbol of something they deeply believe in, will be much less open to influence.</p>
            <p>A conservative person from the countryside might, for example, see Paris as a symbol of a multicultural, left-liberal France that for that very reason alone must be a lawless monstrosity. At the same time, someone who wishes for a car-free city but lives in a place still far from that ideal might project their hopes and wishes onto Paris, especially in light of the city’s recent efforts to become more pedestrian-friendly.</p>
            <p>In addition, we usually do not actively think through most of the information and stimuli reaching us every day. Most of the time we are in a kind of autopilot mode, because active thinking is exhausting work for the brain, and the brain tries to avoid it whenever possible. The cognitive psychologist Daniel Kahneman, who did extensive research on this, called this autopilot <span class="term">“System 1”</span> and active thinking <span class="term">“System 2”</span>. ${sourceLink( "en")} System 1 is much faster, and without the ability to automate many actually complex tasks once we have enough practice, we would be overwhelmed in everyday life.</p>
            <p>For example, holding a conversation in a foreign language about our favorite film while simultaneously driving a vehicle would be much harder if we constantly had to think actively about what this word means again, how that grammar works, which films we have even seen in our life, how shifting gears works, and so on—instead of being able to rely on learned routines and patterns.</p>
            <p>However, System 1 is also far more error-prone and reaches its limits when unexpected difficulties arise—for example, when we cannot remember a word. In such situations, System 2 kicks back in. In fact, experiments have shown that with apparently simple trick questions, using a hard-to-read font can force the activation of System 2 and thereby lead to more correct answers than an easy-to-read font, where System 1 is more likely to be used.</p>
            <p>This is a problem for our news consumption insofar as it usually runs through System 1. Which headline we click, which opinion we like or dislike, which information we believe, which article we share—we normally do not consciously think through any of that, but act on autopilot. And because it all happens without any immediately felt friction, there is usually little reason for System 2 to become active and say, for example: “Wait a second, I may broadly agree and the story may interest me, but this headline is clearly trying to manipulate me—no thanks.”</p>
            <p>This is where <span class="term">BiasScanner</span> comes in: by consciously highlighting the techniques behind media bias and propaganda while an article is being read, we want to create the friction needed to activate System 2. In doing so, we also build on <span class="term">inoculation theory</span>. It argues that attitudes can be made resistant to persuasion attempts in a way similar to how the body is made immune to disease through vaccination. ${sourceLink( "en")} Just as a vaccine introduces a weakened form of a virus to stimulate the immune system and build defenses against stronger attacks, this theory assumes that exposing people to weakened forms of opposing arguments together with refutations strengthens their ability to resist more persuasive challenges in the future. Existing research suggests that this method may be more effective than pure fact-checking, especially when people engage not just once but regularly and actively with media bias and propaganda while reading the news. ${sourceLink( "en")}</p>
            <blockquote class="quote-box">“The Party told you to reject the evidence of your eyes and ears. It was their final, most essential command.” – George Orwell, <em>1984</em> ${sourceLink( "en")}</blockquote>
            <p>That is not mere exaggeration meant to emphasize the totalitarian ambition of propaganda. Taken to the extreme, bias can indeed go so far that we cannot—or do not want to—believe our own eyes when what we see conflicts with the world inside our head.</p>
            <p>Let us look at the two images below and ask ourselves: which image shows more people, the left one or the right one?</p>
            ${figurePlaceholder(11, "en", "Placeholder for the comparison of the crowd sizes at two inaugurations.")}
            <p>For most of us, the answer probably seems obvious: the right one, of course. Older readers may instantly recognize the images, because at the time this was a major media topic. They show the inauguration of U.S. President Donald Trump in 2017 (right) and that of his predecessor Barack Obama in 2009 (left). Trump and his administration falsely insisted that Trump’s inauguration had drawn more attendees than Obama’s, a view many Republican supporters adopted.</p>
            <p>In an experiment conducted a few months after the election, both groups were shown both images without being told which president was in them. ${sourceLink( "en")} Participants were asked which image contained more people. Among those who had voted Democratic in 2016, 2% chose the left image. Among Trump voters, 15% did. It becomes even more interesting when looking at which Trump voters especially chose the obviously wrong picture. They were mainly those who saw themselves as strong supporters and at the same time followed enough political news to know that the left image showed the inauguration of “their” president. In that group, the share saying the left image showed more people rose to 26%. Whether they actually saw more people there or simply did not want to admit the truth out of loyalty to Trump cannot be known. But there are now experiments using brain scanners that suggest strong bias can indeed affect the brain regions responsible, for example, for spatial perception. ${sourceLink( "en")} So it is entirely possible that some Trump voters, once they recognize the image and thus the answer that fits their worldview, genuinely believe they see more people in the left picture than in the right one. Because sometimes the brain simply cannot allow what must not be true.</p>
          `,
          history: () => `
            <h2>4. Media bias is as old as media itself</h2>
            <p>Media bias is as old as media itself. Ever since humanity began documenting important events, those records have been shaped by the subjective experiences and perspectives of their creators as well as by the social context in which they lived.</p>
            <p>The Victory Stele of Naram-Sin, produced in the 23rd century BCE and considered one of the earliest known artifacts that can be viewed as a news report, combines carved images and cuneiform writing to describe—but at the same time glorify—the victory of the Akkadian king Naram-Sin over the Lullubi people. ${sourceLink( "en")}</p>
            ${figurePlaceholder(12, "en", "Placeholder for an image of the Victory Stele of Naram-Sin.")}
            <p>The Sumerian King List, a collection of writings from the 21st century BCE listing Sumerian kings, the cities they ruled and the length of their reigns—often absurdly long spans such as 1,500 years—is now primarily regarded as a work commissioned by rulers to legitimize their claim to power by spreading the idea that there had always been a single city in which kingship was exercised. ${sourceLink( "en")}</p>
            ${figurePlaceholder(13, "en", "Placeholder for an image of the Sumerian King List.")}
            <p>The <em>Acta Diurna</em>, widely regarded as one of the earliest forms of a public newspaper and circulated between 59 BCE and 235 CE, was published by the Roman government to inform the public about important events as the government wanted them to be seen. Incidentally, these reports supposedly ended with the phrase “publicare et propagare,” already hinting at the relationship between media and the later term propaganda. ${sourceLink( "en")}</p>
            <p>For most of history, news media served less to inform the public as well as possible than as a communication channel from society’s rulers to the different groups beneath them.</p>
            <p>This did not change immediately when the first modern newspapers appeared in the 17th century. Even if it was no longer the government directly passing information to subjects, censorship, limited access to unbiased information sources and often close ties to interest groups generally meant that the new privately owned newspapers did not make much effort to be objective and unbiased.</p>
            <p>In fact, the very idea that journalism could and should be objective and unbiased in any meaningful sense is a relatively recent invention that emerged in the mid-to-late 19th century, partly because of the business interests of news agencies. In a speech before the U.S. Congress in 1856, Lawrence Gobright, head of the Associated Press (AP) office in Washington, said that AP’s job was to transmit facts without commenting on them, so that the newspapers—the real customers of the agencies—could then “make their own comments on the facts submitted to them.” ${sourceLink( "en")}</p>
            <p>A deeper discussion of the media and its influence on public opinion began in the early 20th century, strongly shaped by the obvious success of large-scale propaganda during the First World War. Walter Lippmann and Edward Bernays, who would later write two of the most influential books in this field, both worked for the Committee on Public Information, a U.S. government agency created after the country entered the war in order to influence public opinion in favor of it.</p>
            <p>In 1922, Lippmann wrote <em>Public Opinion</em>, a foundational work on how public opinion in a society is shaped and distorted by the limited human capacity to process, represent and communicate the real world. ${sourceLink( "en")} He argued that this limitation forces people to rely on a reduced mental picture of reality, with major consequences for democracy.</p>
            <p>At the same time that ideas of objectivity and fairness were being formally codified in journalism for the first time—through early ethical codes adopted by journalists’ associations, such as the American Society of Newspaper Editors’ <em>Canons of Journalism</em> from 1923 ${sourceLink( "en")}—totalitarian ideologies such as fascism and Stalinism were preparing to push propaganda to an entirely new level encompassing all areas of society. Increasingly, new technologies such as radio, film and television were used in the process.</p>
            <p>Just as the invention of the printing press in the 16th century had enabled the rapid spread of Luther’s theses and those of other reformers to mass audiences through pamphlets and caricatures, these new media too quickly proved central to the spread of propaganda in the 20th century.</p>
            ${figurePlaceholder(14, "en", "Placeholder for an image montage of the printing press, radio, film and television.")}
            <p>In the 21st century, that role is increasingly being taken over by the internet and especially by social media, which can hardly be imagined away from today’s information landscape. Human beings in the 21st century are probably bombarded daily with more information—more or less deserving of the label “news”—than ever before in history. As this happens, classical media organizations are steadily losing relevance and interpretive authority; they are on their way to becoming just one voice among many. ${sourceLink( "en")} Instead of media organizations deciding which topics we learn about and from which perspective—and us at least theoretically deciding which newspaper to read or which channel to switch on—today the algorithm decides whether we even get to see those media perspectives at all. Confirmation of our existing views is no longer something we have to actively seek out; it is passively served to us.</p>
            ${figurePlaceholder(15, "en", "Placeholder for a depiction of algorithmic feeds and social-media gatekeeping.")}
            <p>While false reports themselves are nothing new, and images, documents and reports have been forged in the past as well, the rise of generative AI now enables an entirely new speed and scale in creating and spreading such content. What effect that will have on opinion formation over the course of the 21st century remains to be seen.</p>
