<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BiasScanner: Bias, Propaganda and Automated Detection</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    :root {
      --brand-red: #e0251b;
      --brand-red-dark: #b91d15;
      --brand-orange: #ff6b00;
      --brand-orange-soft: #fff2e7;
      --text: #2a2f38;
      --muted: #667085;
      --bg: #fffaf7;
      --bg-2: #fff5ef;
      --panel: rgba(255, 255, 255, 0.84);
      --panel-strong: rgba(255, 255, 255, 0.94);
      --border: rgba(255, 138, 76, 0.22);
      --border-strong: rgba(255, 107, 0, 0.28);
      --shadow-sm: 0 10px 24px rgba(31, 41, 55, 0.06);
      --shadow-md: 0 18px 50px rgba(31, 41, 55, 0.10);
      --shadow-lg: 0 28px 70px rgba(224, 37, 27, 0.12);
      --radius: 22px;
      --radius-sm: 14px;
      --max-width: 1120px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255, 107, 0, 0.08), transparent 32%),
        radial-gradient(circle at top right, rgba(224, 37, 27, 0.08), transparent 28%),
        linear-gradient(180deg, #fffdfb 0%, var(--bg) 28%, var(--bg-2) 100%);
      min-height: 100vh;
    }

    a {
      color: inherit;
    }

    .sticky-shell {
      position: sticky;
      top: 0;
      z-index: 1000;
      backdrop-filter: blur(16px);
      background: #e0251b;
      border-bottom: 1px solid rgba(255, 107, 0, 0.08);
    }

    .topbar {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 14px 18px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }

    .brand-row {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .back-link {
      width: 42px;
      height: 42px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      background: linear-gradient(180deg, #fff, #fff5ef);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
      font-size: 20px;
      flex: 0 0 auto;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .back-link:hover {
      transform: translateY(-1px);
      box-shadow: var(--shadow-md);
    }

    .title-wrap {
      min-width: 0;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--brand-red);
      margin-bottom: 4px;
    }

    .eyebrow::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--brand-red), var(--brand-orange));
      box-shadow: 0 0 0 6px rgba(255, 107, 0, 0.08);
    }

    .header-title {
      font-size: 20px;
      font-weight: 800;
      line-height: 1.2;
      color: var(--text);
      white-space: normal;
    }

    .top-controls {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .toggle-btn,
    .lang-select {
      border: 1px solid var(--border);
      background: linear-gradient(180deg, #fff, #fff6f1);
      color: var(--text);
      border-radius: 999px;
      box-shadow: var(--shadow-sm);
      height: 44px;
      padding: 0 16px;
      font: inherit;
      font-weight: 700;
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    }

    .toggle-btn {
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }

    .toggle-btn::before {
      content: "≡";
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 22px;
      height: 22px;
      border-radius: 999px;
      background: rgba(255, 107, 0, 0.12);
      color: var(--brand-red);
      font-size: 14px;
      font-weight: 800;
    }

    .toggle-btn.active {
      border-color: rgba(224, 37, 27, 0.28);
      background: linear-gradient(180deg, #fff1ea, #ffe8dc);
      color: var(--brand-red-dark);
    }

    .toggle-btn:hover,
    .lang-select:hover {
      transform: translateY(-1px);
      box-shadow: var(--shadow-md);
    }

    .select-wrap {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 0 8px 0 14px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: linear-gradient(180deg, #fff, #fff6f1);
      box-shadow: var(--shadow-sm);
      height: 44px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
    }

    .select-wrap span {
      white-space: nowrap;
    }

    .lang-select {
      border: none;
      background: transparent;
      box-shadow: none;
      padding: 0 4px 0 0;
      height: auto;
      color: var(--text);
      outline: none;
      cursor: pointer;
    }

    .toc {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 0 18px 12px;
      display: flex;
      gap: 10px;
      overflow-x: auto;
      background-color: #ff6b00;
      scrollbar-width: thin;
      scrollbar-color: rgba(255, 107, 0, 0.35) transparent;
    }

    .toc::-webkit-scrollbar {
      height: 8px;
    }

    .toc::-webkit-scrollbar-thumb {
      background: rgba(255, 107, 0, 0.25);
      border-radius: 999px;
    }

    .toc a {
      text-decoration: none;
      white-space: nowrap;
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid rgba(255, 107, 0, 0.12);
      background: rgba(255, 255, 255, 0.72);
      color: var(--muted);
      font-weight: 700;
      font-size: 14px;
      transition: all 0.2s ease;
      flex: 0 0 auto;
    }

    .toc a:hover,
    .toc a.active {
      background: linear-gradient(180deg, #fff2e8, #ffe8d9);
      color: var(--brand-red-dark);
      border-color: rgba(224, 37, 27, 0.18);
      transform: translateY(-1px);
    }

    .progress-track {
      height: 3px;
      width: 100%;
      background: rgba(255, 107, 0, 0.10);
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--brand-orange), var(--brand-red));
      box-shadow: 0 0 12px rgba(224, 37, 27, 0.45);
      transition: width 0.08s linear;
    }

    main {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 26px 18px 60px;
    }

    .hero {
      margin-bottom: 28px;
      scroll-margin-top: 180px;
    }

    .hero-card {
      position: relative;
      overflow: hidden;
      background: linear-gradient(180deg, rgba(255,255,255,0.92), rgba(255,246,241,0.92));
      border: 1px solid rgba(255, 138, 76, 0.18);
      border-radius: calc(var(--radius) + 4px);
      box-shadow: var(--shadow-lg);
      padding: 30px 30px 26px;
    }

    .hero-card::before,
    .chapter-card::before {
      content: "";
      position: absolute;
      inset: auto -80px -80px auto;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 107, 0, 0.12), rgba(255, 107, 0, 0));
      pointer-events: none;
    }

    .hero-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 14px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.02em;
      background: rgba(224, 37, 27, 0.10);
      color: var(--brand-red-dark);
      border: 1px solid rgba(224, 37, 27, 0.12);
    }

    .pill.subtle {
      background: rgba(255, 107, 0, 0.10);
      color: #8b4c16;
      border-color: rgba(255, 107, 0, 0.14);
    }

    h1, h2, h3, h4 {
      margin: 0;
      line-height: 1.18;
      letter-spacing: -0.02em;
    }

    h1 {
      font-size: clamp(32px, 5vw, 46px);
      color: var(--brand-red);
      margin-bottom: 14px;
      max-width: 880px;
    }

    h2 {
      font-size: clamp(25px, 3.2vw, 32px);
      color: var(--brand-red);
      margin-bottom: 18px;
      padding-bottom: 12px;
      border-bottom: 2px solid rgba(255, 107, 0, 0.22);
    }

    h3 {
      font-size: clamp(20px, 2.4vw, 24px);
      color: var(--brand-red);
      margin-top: 28px;
      margin-bottom: 14px;
    }

    h4 {
      font-size: 17px;
      color: var(--brand-red-dark);
      margin-bottom: 10px;
    }

    p, li {
      font-size: 16px;
      line-height: 1.8;
      color: var(--text);
    }

    p {
      margin: 0 0 16px;
    }

    em {
      font-style: italic;
    }

    section.content-section {
      margin: 26px 0;
      scroll-margin-top: 180px;
    }

    .chapter-card {
      position: relative;
      overflow: hidden;
      background: linear-gradient(180deg, var(--panel-strong), var(--panel));
      border: 1px solid rgba(255, 138, 76, 0.16);
      border-radius: var(--radius);
      box-shadow: var(--shadow-md);
      padding: 28px;
    }

    .chapter-text > *:last-child {
      margin-bottom: 0;
    }

    .lead {
      font-size: 18px;
      line-height: 1.78;
      margin-bottom: 14px;
      max-width: 920px;
    }

    .section-note {
      color: var(--muted);
      font-size: 15px;
      margin: 0;
      max-width: 780px;
    }

    .term {
      color: var(--brand-red-dark);
      font-weight: 800;
      background: linear-gradient(180deg, rgba(255, 107, 0, 0.08), rgba(255, 107, 0, 0.18));
      padding: 0 0.22em;
      border-radius: 6px;
      box-decoration-break: clone;
      -webkit-box-decoration-break: clone;
    }

    .definition-grid,
    .level-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
      gap: 16px;
      margin: 20px 0 24px;
    }

    .card,
    .info-box {
      background: linear-gradient(180deg, #fff7f1, #fffdfb);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow-sm);
    }

    .card {
      padding: 18px 18px 16px;
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    }

    .card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
      border-color: var(--border-strong);
    }

    .info-box {
      padding: 18px 18px 14px;
      margin: 20px 0;
      position: relative;
    }

    .info-box::before {
      content: "";
      position: absolute;
      top: 0;
      left: 18px;
      right: 18px;
      height: 3px;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--brand-orange), var(--brand-red));
    }

    .clean-list,
    .checklist {
      padding-left: 1.2rem;
      margin: 8px 0 0;
    }

    .checklist li,
    .clean-list li {
      margin-bottom: 10px;
    }

    .checklist li::marker {
      color: var(--brand-red);
    }

    .quote-box {
      margin: 22px 0;
      padding: 18px 20px;
      background: linear-gradient(180deg, #fff4ee, #fffaf7);
      border: 1px solid rgba(224, 37, 27, 0.14);
      border-left: 5px solid var(--brand-red);
      border-radius: 18px;
      color: #4d515a;
      font-style: italic;
      box-shadow: var(--shadow-sm);
    }

    .source-link {
      color: var(--brand-red-dark);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 3px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255, 107, 0, 0.20);
      background: rgba(255, 107, 0, 0.07);
      font-size: 13px;
      font-weight: 800;
      margin-left: 0.3rem;
      vertical-align: middle;
      transition: all 0.2s ease;
      white-space: nowrap;
    }

    .source-link:hover {
      transform: translateY(-1px);
      background: rgba(224, 37, 27, 0.08);
      border-color: rgba(224, 37, 27, 0.22);
    }

    .image-placeholder {
      margin: 24px 0;
      border-radius: 22px;
      overflow: hidden;
      border: 1px solid rgba(255, 107, 0, 0.18);
      box-shadow: var(--shadow-md);
      background: linear-gradient(180deg, #fff6ef, #fff);
    }

    .image-box {
      position: relative;
      min-height: 220px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 10px;
      text-align: center;
      padding: 30px 20px;
      color: var(--brand-red-dark);
      font-weight: 800;
      letter-spacing: 0.08em;
      background:
        radial-gradient(circle at 20% 20%, rgba(255, 107, 0, 0.16), transparent 22%),
        radial-gradient(circle at 80% 25%, rgba(224, 37, 27, 0.14), transparent 24%),
        radial-gradient(circle at 70% 78%, rgba(255, 107, 0, 0.10), transparent 28%),
        linear-gradient(135deg, rgba(224,37,27,0.06) 25%, transparent 25%) -18px 0/36px 36px,
        linear-gradient(225deg, rgba(255,107,0,0.06) 25%, transparent 25%) -18px 0/36px 36px,
        linear-gradient(315deg, rgba(224,37,27,0.06) 25%, transparent 25%) 0 0/36px 36px,
        linear-gradient(45deg, rgba(255,107,0,0.06) 25%, transparent 25%) 0 0/36px 36px,
        #fff;
    }

    .image-box::before {
      content: "🖼";
      font-size: 28px;
      line-height: 1;
    }

    .image-box small {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.72);
      border: 1px solid rgba(255, 107, 0, 0.18);
      color: #8f4311;
      font-weight: 800;
      letter-spacing: 0.06em;
    }

    .image-placeholder figcaption {
      padding: 13px 16px 15px;
      color: var(--muted);
      font-size: 14px;
      border-top: 1px solid rgba(255, 107, 0, 0.14);
      background: rgba(255, 255, 255, 0.82);
    }

    .compact-hint {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255, 107, 0, 0.08);
      border: 1px solid rgba(255, 107, 0, 0.14);
      color: #8b4c16;
      font-size: 13px;
      font-weight: 800;
      margin-bottom: 16px;
    }

    .compact-hint::before {
      content: "⚡";
      font-size: 14px;
    }

    .chapter-text {
      animation: fadeIn 0.22s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(6px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 920px) {
      .topbar {
        flex-direction: column;
        align-items: stretch;
      }

      .top-controls {
        justify-content: space-between;
      }
    }

    @media (max-width: 720px) {
      .topbar,
      .toc,
      main {
        padding-left: 14px;
        padding-right: 14px;
      }

      .hero-card,
      .chapter-card {
        padding: 22px 18px;
        border-radius: 18px;
      }

      .header-title {
        font-size: 18px;
      }

      .lead {
        font-size: 17px;
      }

      .select-wrap {
        width: 100%;
        justify-content: space-between;
      }

      .lang-select {
        width: auto;
      }

      .top-controls {
        width: 100%;
      }

      .toggle-btn {
        flex: 1 1 auto;
        justify-content: center;
      }
    }

    @media (max-width: 560px) {
      .definition-grid,
      .level-grid {
        grid-template-columns: 1fr;
      }

      .header-title {
        font-size: 17px;
      }

      .eyebrow {
        font-size: 11px;
      }
    }
  </style>
</head>

            <h2>1. Was meinen wir mit <span class="term">Medienbias</span>?</h2>
            <p>Ganz allgemein bezeichnet <span class="term">Bias</span> eine systematische Verzerrung in der Darstellung der Realität. Das kann zum Beispiel der Fall sein, wenn ein Chatbot zur Berufsberatung Mädchen deutlich seltener Berufe wie Informatikerin oder Ingenieurin vorschlägt und Jungen deutlich seltener Berufe wie Erzieher oder Sozialarbeiter, obwohl das Geschlecht noch lange nichts über die Eignung aussagt. Oder wenn wir eine neue Bekanntschaft machen und unser Gehirn sich als mentale Abkürzung erst einmal instinktiv auf vorschnelle Urteile basierend auf oberflächlichen Merkmalen verlässt, um unser Gegenüber einzuschätzen. Oder eben in den Medien, wenn ein Ereignis nicht nach bestem Wissen und Gewissen fair und auf Basis von Fakten dargestellt wird, sondern die Berichterstattung eine durch die Fakten nicht gedeckte Perspektive einnimmt oder bevorzugt. Das ist dann der <span class="term">Medienbias</span>, den BiasScanner zu entdecken trainiert ist.</p>
            <p>Man kann sich Bias also wie einen Filter vorstellen, der zwischen der Realität und unserer Wahrnehmung liegt. Die Welt, wie wir sie sehen, ist nicht immer die Welt, wie sie wirklich ist. Da prinzipiell jeder Mensch diesen Filter hat, auch Journalisten und Journalistinnen, schleichen sich hier die eigenen Perspektiven und Vorurteile gerne mal unbewusst in die Berichterstattung ein. <span class="term">Medienbias</span> ist also nicht immer Absicht; tatsächlich dürfte ein sehr großer Anteil an Bias in den Medien ohne manipulative Absichten entstehen. Es gibt aber auch Medienbias, der gezielt eingesetzt wird, um zu manipulieren und zu spalten; in diesem Fall sprechen wir von <span class="term">Propaganda</span>.</p>
            <p>Während wir damit im heutigen Sprachgebrauch hauptsächlich politisch motivierte Manipulationsversuche verstehen, war es bis ins mittlere 20. Jahrhundert tatsächlich so, dass auch Werbung, die im Grunde oft ja nichts anderes ist als Manipulation aus wirtschaftlicher Motivation, ganz offen und wertfrei als Propaganda bezeichnet wurde. Denn auch wenn Vertreter klassischer Theorien der Volkswirtschaftslehre oder Demokratietheorie bisweilen das Gegenteil behaupten, ob wir nun eine bestimmte Partei unterstützen oder das Smartphone einer bestimmten Marke kaufen, ist beides nicht einfach eine aufgeklärte, rationale Entscheidung auf Basis der besten Argumente. In beiden Fällen geht es ebenso darum, wer „unsere Knöpfe am besten“ drückt.</p>
            <p>Tatsächlich trägt das 1928 erschienene, wohl berühmteste Buch von Edward Bernays, der heute als einer der Begründer der „Public Relations“ (PR) gilt, passenderweise den einfachen Titel „Propaganda“. ${sourceLink("de")}</p>
            <p>Im Verlauf des 20. Jahrhunderts wurde das Ansehen des Begriffs „Propaganda“ jedoch durch den massenhaften, staatlich organisierten Einsatz in beiden Weltkriegen und die Verbindung mit totalitären Ideologien so negativ konnotiert, dass Unternehmen und Werbeschaffende irgendwann jede Assoziation damit vermeiden wollten.</p>

            <h3>Drei Ebenen von Medienbias</h3>

            <h2>2. BiasScanner, Taxonomie und automatisierte Erkennung</h2>
            <p>Zur Kategorisierung der einzelnen Sätze, die das System findet, haben wir schrittweise eine <span class="term">Taxonomie</span> der Bias-Typen entwickelt. Diese basiert auf einem von uns und durch eine erste Version von Scanner gesammelten Datensatz an Beispielen. An dieser Stelle noch einmal ein Dankeschön an alle, die BiasScanner fleißig genutzt haben, und natürlich besonders an die, die die Funktion zum „Spenden“ ihres Bias-Reports genutzt haben ;)</p>
            <p>Wir haben uns am <span class="term">Periodensystem der Elemente</span> orientiert, um unsere Taxonomie von Medienbias-Typen zu strukturieren. Wie das Periodensystem, das unvollständig begann und sich durch neue Entdeckungen weiterentwickelt, soll auch unsere Taxonomie erweiterbar sein und schrittweise ein vollständiges Bild aller Bias-Typen auf Satzebene bieten.</p>
            ${figurePlaceholder(1, "de", "Platzhalter für die Visualisierung der Bias-Taxonomie im Stil des Periodensystems.")}

            <div class="info-box">
              <h4>Die Anordnung folgt dem Vorbild des Periodensystems</h4>
              <ul class="clean-list">
                <li>Ähnliche Bias-Typen werden in Gruppen zusammengefasst und farblich hervorgehoben.</li>
                <li>Die Platzierung der einzelnen Gruppen basiert auf der Häufigkeit aller Bias-Typen einer Gruppe in einer Stichprobe aus unserem Datensatz.</li>
                <li>Die Reihenfolge innerhalb der Gruppen richtet sich nach der Häufigkeit.</li>
                <li>Um Gruppen optisch miteinander verbunden zu lassen, wechselt die Reihenfolge im Zickzack-Muster: ungerade Zeilen verlaufen von links nach rechts, gerade Zeilen von rechts nach links.</li>
                <li>Für jeden Typ zeigt eine von fünf Schriftgrößen die absolute Häufigkeit an.</li>
              </ul>
            </div>

            <p>Ausführliche Erklärungen dazu, was die einzelnen Typen ausmacht und wie wir das System der Bias-Elemente genau entwickelt haben, sind in unserem Artikel verfügbar. ${sourceLink( "de")}</p>

            <h3>Von Walter Lippmann zu <span class="term">NLP</span></h3>
            <p>Als der amerikanische Journalist Walter Lippmann 1920 gemeinsam mit seinem Partner Charles Merz und unter Mithilfe seiner Ehefrau mit „A Test of the News“ die erste systematische Untersuchung von Bias in der Berichterstattung durchführte, analysierte er die Berichterstattung der New York Times über die Oktoberrevolution in Russland. ${sourceLink( "de")} Dieses Vorgehen war äußerst arbeitsaufwändig: Hunderte von Artikeln mussten gelesen und mit anderen Quellen verglichen werden. Derselbe Aufwand hätte für jedes neue Thema immer wieder von Neuem betrieben werden müssen. Gleichzeitig konstatierte Lippmann: „Die Nachrichten lassen sich nicht mathematisch ausdrücken.“</p>
            <p>Und dann, ein paar Jahrzehnte später, kam der Computer: Als 1954 im Georgetown–IBM-Experiment erstmals öffentlich demonstriert wurde, dass eine Maschine Texte verarbeiten kann, indem Sätze vom Russischen ins Englische übersetzt wurden, hielt Leon Dostert, einer der beteiligten Wissenschaftler, fest: „Die Verantwortlichen dieses Experiments betrachten es nun als definitiv erwiesen, dass eine Bedeutungsübertragung durch elektronische Sprachübersetzung möglich ist.“ ${sourceLink( "de")} Dies markierte den Beginn der elektronischen Verarbeitung von Sprache durch Computer, des sogenannten <span class="term">Natural Language Processing (NLP)</span>. Mochte Lippmanns Aussage zu seiner Zeit noch gegolten haben, so schien es nun möglich, dass sich Nachrichten tatsächlich doch mathematisch ausdrücken lassen.</p>
            <p>Denn Nachrichten bestehen aus Wörtern, Wörter aus einzelnen Zeichen und Token, also kleineren Einheiten, ähnlich, aber nicht identisch mit Silben, und diese Zeichen und Token können durch Zahlen repräsentiert werden. Mit Zahlen wiederum kann automatisiert gerechnet und verglichen werden.</p>
            <p>Erste Ansätze zur Bias-Detektion haben häufig versucht, Verzerrungen zu messen, indem ein Artikel mit einer Referenz verglichen wurde. So wurde etwa gezählt, wie häufig bestimmte Thinktanks oder politische Gruppierungen zitiert werden ${sourceLink( "de")}, oder wie ähnlich die im Artikel verwendete Sprache der Sprache ausgewählter Politikerreden ist ${sourceLink( "de")}. Allerdings schränkt die Notwendigkeit eines Vergleichspunkts den Transfer auf neue Themen erheblich ein, da für jedes neue Thema diese Referenz erneut gesammelt werden muss. Eine Liste amerikanischer Thinktanks und Reden von Kongressabgeordneten sind nicht unbedingt nützlich, wenn man den Bias einer deutschsprachigen Zeitung ermitteln will.</p>

            <h3><span class="term">Word Embeddings</span></h3>
            <p>Ein weiterer Durchbruch bei der „Mathematisierung“ von Nachrichten und Texten allgemein gelang mit den sogenannten <span class="term">Word Embeddings</span>: einer Methode, Wörter als Vektoren, vereinfacht gesagt: Pfeile mit Länge und Richtung, darzustellen. Vektoren von Wörtern mit ähnlicher Bedeutung zeigen in eine ähnliche Richtung, während die Spitzen von Vektoren mit stark unterschiedlicher Bedeutung weit voneinander entfernt liegen.</p>
            ${figurePlaceholder(2, "de", "Platzhalter für eine grafische Darstellung von Wortvektoren in einem semantischen Raum.")}
            <p>Zur grafischen Darstellung dieser Vektoren wird häufig eine vereinfachte dreidimensionale Projektion verwendet, da wir Menschen in einer dreidimensionalen Welt leben und uns höhere Dimensionen in der Regel nur schwer vorstellen können. In der Praxis besitzen solche Vektoren jedoch oft mehrere hundert Dimensionen, in <span class="term">Word2Vec</span>, einem der bekanntesten Formate, zum Beispiel 300. ${sourceLink( "de")} Jede dieser Dimensionen kann eine bestimmte „Bedeutungsebene“ abbilden, etwa Tiere oder Fortbewegung, ist jedoch nicht immer unmittelbar für Menschen interpretierbar, sondern kann Zusammenhänge repräsentieren, die nur für den Computer erkennbar sind.</p>
            <p>Erzeugt werden diese Vektoren durch automatisierte statistische Verfahren, die anhand großer Textmengen erfassen, in welchen Kontexten Wörter häufig oder seltener gemeinsam auftreten.</p>
            <p>Wenn Wörter nun als Vektoren repräsentiert sind, können wir Vektorrechnung nutzen, um Informationen über die Beziehungen zwischen ihnen zu gewinnen. Der Kosinus des Winkels zwischen zwei Vektoren gibt uns beispielsweise Auskunft darüber, wie ähnlich sich zwei Begriffe in ihrer Bedeutung sind. In Word2Vec beträgt der Kosinus zwischen <em>chimpanzee</em> und <em>gorilla</em> etwa 0,61, während er zwischen <em>chimpanzee</em> und <em>bicycle</em> nur rund 0,15 beträgt.</p>
            ${figurePlaceholder(3, "de", "Platzhalter für eine Visualisierung von Kosinus-Ähnlichkeit zwischen Wortvektoren.")}
            <p>Besonders spannend wird es, wenn man beginnt, Vektoren zu addieren und zu subtrahieren. So ergibt die Summe aus dem Vektor von <em>princess</em> und <em>coronation</em> näherungsweise den Vektor von <em>queen</em>. Subtrahiert man <em>beer</em> von <em>munich</em>, erhält man <em>berlin</em>. Und <em>birds</em> sind laut Word2Vec <em>animals</em> plus <em>feathers</em>, aber minus <em>scales</em>.</p>
            ${figurePlaceholder(4, "de", "Platzhalter für eine Visualisierung von Vektor-Arithmetik mit Wortvektoren.")}

            <h3>Maschinelles Lernen, <span class="term">Transformer</span> und <span class="term">LLMs</span></h3>
            <p>Wenn man heute von KI redet, meint man damit im Grunde eigentlich <span class="term">maschinelles Lernen</span>. Das unterscheidet sich von klassischer Programmierung dadurch, dass man nicht manuell dem Computer sagt: „Wenn das passiert, dann mach das“, sondern vereinfacht gesagt zeigt man dem Computer sehr viele Beispiele von einem Input und dem dazugehörenden Output, und er muss selbst einen Weg finden, dahin zu kommen.</p>
            <p>Die gängigste Methode, um diesen Weg zu finden, sind derzeit verschiedene Formen der sogenannten <span class="term">neuronalen Netze</span>. Das sind Modelle, die von einer stark vereinfachten Vorstellung der Funktionsweise des menschlichen Gehirns inspiriert sind. Man programmiert mehrere Schichten von sogenannten Neuronen, die untereinander verbunden sind. Jedes Neuron merkt sich eine Zahl, die witzigerweise auch Bias heißt und bestimmt, wann es ein Signal, das es von einem anderen Neuron empfängt, selbst an andere Neuronen weiterleitet. Für jede Verbindung merkt es sich auch noch die sogenannten Gewichte, die bestimmen, wie stark ein Signal weitergeleitet wird. Zu Beginn sind all diese Zahlen zufällig. Im sogenannten Training werden dem Modell jetzt ganz viele Beispiele gezeigt, nach dem Prinzip: Für dieses Eingangssignal, zum Beispiel das Bild einer Katze, muss dieses Ergebnis herauskommen, in diesem Fall die Klassifizierung als Katze. Dann wird geprüft, ob das mit den gegenwärtigen Zahlen schon funktionieren würde. Wenn nicht, werden mit einem mathematischen Verfahren namens <span class="term">Backpropagation</span> diese Zahlen so angepasst, dass sie zum richtigen Ergebnis führen würden. Wird das nun nicht für eines, sondern für sehr viele Katzenbilder gemacht, lernt das Modell irgendwann, woran es generell eine Katze erkennen kann.</p>
            ${figurePlaceholder(5, "de", "Platzhalter für ein schematisches neuronales Netz mit Eingaben, Gewichten und Ausgaben.")}
            <p>Man kann diese Modelle jetzt auch mithilfe der oben beschriebenen Word Embeddings so trainieren, dass sie anstatt zu sagen, welches Tier auf einem Bild zu sehen ist, eine Vorhersage abgeben, welches nächste Wort in einem Text kommt. Einfache neuronale Netze wie die oben beschriebene Grundform stoßen dabei allerdings schnell an ihre Grenzen, da sie Schwierigkeiten haben, den Zusammenhang aller Wörter eines Satzes zu erfassen, und deshalb oft eher sinnlose Vorschläge machen. Deshalb gibt es spezielle Varianten dieser Grundform, die extra auf Text zugeschnitten sind, wie den <span class="term">Transformer</span>.</p>
            <p>Das wichtigste Feature, das dem Transformer hilft, den Kontext der Wörter eines Satzes zu berücksichtigen, ist der sogenannte <span class="term">Self-Attention-Mechanismus</span>, ein mathematisches Verfahren, bei dem für jedes Token, also die kleinen Textbausteine, mit denen Transformer arbeiten, seine Relevanz für jedes andere Token berechnet wird. Dadurch kann das Modell auch längere Texte verstehen.</p>
            ${figurePlaceholder(6, "de", "Platzhalter für eine Illustration des Self-Attention-Mechanismus in einem Transformer.")}
            <p>Wenn diese Modelle sehr groß werden, mit Milliarden Parametern, und mit sehr viel Text trainiert werden, also Milliarden bis Billionen Tokens, spricht man von <span class="term">Large Language Models</span> wie zum Beispiel ChatGPT, LLaMA oder Mistral. Diese Modelle lernen, Token für Token das wahrscheinlichste nächste Token vorherzusagen, wobei ein gewisses Zufallselement für Variation sorgt.</p>
            ${figurePlaceholder(7, "de", "Platzhalter für eine Darstellung der tokenweisen Vorhersage in einem Large Language Model.")}
            <p>Neben diesen generativen Transformern, den sogenannten <span class="term">Generative Pre-trained Transformers</span>, also dem GPT in ChatGPT, gibt es auch einen zweiten Zweig der Transformer-Familie: Encoder-Modelle wie <span class="term">BERT</span>, die Text hauptsächlich verstehen und klassifizieren, aber nicht generieren. Ihr Textverständnis ist oft sogar noch ein bisschen genauer, weil sie den gesamten Kontext eines Satzes gleichzeitig betrachten können, anstatt Token für Token in Reihenfolge zu sehen.</p>
            <p>BiasScanner selbst basiert auf der <span class="term">GPT</span>-Technologie, da wir auch Erklärungen zu den erkannten Typen von Bias und Propaganda generieren lassen wollen. Genauer gesagt basiert BiasScanner auf sogenannten <span class="term">Fine-Tunes</span>. Dabei nimmt man ein Modell, das schon mit sehr viel unterschiedlichem Text trainiert wurde und deshalb ein grundlegendes Verständnis von Sprache besitzt, und trainiert es für eine spezialisierte Aufgabe, in unserem Fall die Erkennung und Erklärung von Bias und Propaganda, nach. ChatGPT selbst ist übrigens ein Fine-Tune eines GPT-Basismodells, das darauf nachtrainiert wurde, Instruktionen zu folgen.</p>
            <p>Das Wichtigste für so ein Training ist ein Datensatz mit diversen Beispielen, die das Problem gut abbilden. In unserem Fall also ein Datensatz mit den unterschiedlichsten Beispielen von Bias und Propaganda, korrekt klassifiziert und gut erklärt. ${sourceLink( "de")}</p>
          `,
          "bias-psychology": () => `
            <h2>3. Niemand ist frei von Bias</h2>
            <p>Stellen wir uns vor, jemand erzählt uns, dass er demnächst nach Paris ziehen wird. Sobald wir den Namen der Stadt hören, <span class="term">Paris</span>, tauchen vor unserem inneren Auge Bilder auf. Einige davon sind sicher romantisch, wie der Eiffelturm, der sich über der Stadt erhebt, oder die Pariser, die mit einem Baguette unterm Arm und einer Baskenmütze auf dem Kopf an Cafés in den gepflasterten Gassen von Montmartre vorbeigehen. Andere Bilder sind vielleicht weniger schön; manche denken an Hotels mit Bettwanzen oder an Abwässer in der Seine. Wir fragen uns, was wir über die Bewohner von Paris wissen: Irgendwo haben wir vielleicht gehört, die Pariser seien arrogant, andererseits hieß es woanders, sie seien besonders stylisch.</p>
            ${figurePlaceholder(8, "de", "Platzhalter für eine Bildcollage zu den unterschiedlichen inneren Bildern von Paris.")}
            <p>Je nachdem, welche Bilder in uns aufkommen, wird unsere Reaktion unterschiedlich ausfallen. Freuen wir uns für unser Gegenüber, oder können wir überhaupt nicht nachvollziehen, warum jemand freiwillig in so einer Stadt leben möchte? So oder so, die einzelnen Bilder in unserem Kopf fügen sich zu einem Gesamtbild von Paris zusammen. Doch woher kommen diese Bilder, und ist Paris wirklich einfach ihre Summe?</p>
            <p>Manche von uns haben vielleicht Filme wie <em>Midnight in Paris</em> oder Serien wie <em>Emily in Paris</em> gesehen. Anderen sind anlässlich der Olympischen Spiele 2024 zahlreiche Berichte über die Stadt in den Social-Media-Feed gespült worden. Vielleicht kennen wir auch jemanden, der schon einmal dort war, oder wir haben die Stadt selbst besucht. Je nachdem, was wir auf dem Bildschirm gesehen, von anderen gehört oder selbst erlebt haben, wird unser Bild von Paris anders ausfallen. Hat uns Hollywood eine romantische Version von Paris gezeigt? ${sourceLink( "de")} Haben russische Desinformationskampagnen das Thema Bettwanzen im Vorfeld der Spiele bewusst übertrieben? ${sourceLink( "de")} Hat unser Bekannter einfach Pech gehabt und zufällig besonders arrogante Pariser getroffen? Streikte die Müllabfuhr gerade, als er dort war? Hatten wir im Gegenzug einfach Glück und sind nur den nettesten Parisern begegnet? Hatten wir besonders gutes Timing und waren nur an den schönsten Ecken unterwegs?</p>
            <p>Paris ist eine Stadt mit Millionen von Einwohnern und Tausenden Straßen, alle mit ihren Unterschieden. Und schon heute ist sie wieder ein bisschen anders als gestern. Das ist die Kernproblematik der Meinungsbildung: Die allermeisten Dinge auf der Welt sind zu komplex, zu unübersichtlich und zu sehr im Wandel begriffen, als dass ein einzelner Mensch sie vollständig erfassen könnte. Unsere eigenen Erfahrungen, wenn wir sie überhaupt haben, sind immer nur ein Ausschnitt des Ganzen. Auch die Informationen, die wir aus zweiter Hand erhalten, von Bekannten, aus den Nachrichten oder von Social Media, sind immer nur ein Aspekt, eine Perspektive, die bereits durch den Filter anderer gelaufen ist.</p>
            <p>Aus all diesen Bruchstücken bauen wir uns ein vereinfachtes Modell der echten Welt in unserem Kopf zusammen, die <span class="term">„Pseudo-Umwelt“</span>, wie der Journalist Walter Lippmann es nannte. ${sourceLink( "de")} Diese Pseudo-Umwelt stützt sich stark auf <span class="term">„Stereotype“</span>, also stark vereinfachte, verallgemeinerte Vorurteile und Annahmen über die Welt. Während wir das Wort „Stereotype“ heute vor allem für gruppenbezogene Klischees verwenden, meinte Lippmann damit auch generelle, stark vereinfachte Annahmen über Politik, Wirtschaft und Gesellschaft. Ein Beispiel ist die noch immer verbreitete Vorstellung, dass Staatsfinanzen prinzipiell so funktionieren wie die eines privaten Haushalts. ${sourceLink( "de")}</p>
            ${figurePlaceholder(9, "de", "Platzhalter für eine Illustration der Pseudo-Umwelt als vereinfachte Karte der Realität.")}
            <p>Im Idealfall ist diese Pseudo-Umwelt eine brauchbare Annäherung an die reale Welt, gut genug, um auf ihrer Basis sinnvolle Entscheidungen zu treffen. Im schlimmsten Fall hat das Weltbild eines Menschen nur wenig mit der echten Welt zu tun, was zu Problemen führt, wenn man Entscheidungen für eine Welt trifft, die es so gar nicht gibt. Sind zwei Pseudo-Umwelten zu unterschiedlich, erschwert das ebenso die Lösung von Konflikten und das Finden von Kompromissen. Schließlich ist es schwer, einen gemeinsamen Weg zu finden, wenn man unterschiedliche Karten verwendet. Lippmann schrieb dazu: Die Menschen „leben in derselben Welt, aber sie denken und fühlen in verschiedenen Welten“.</p>
            <p>Hinzu kommt, dass die allermeisten Menschen fest davon überzeugt sind, dass ihre Meinung nicht das Ergebnis von Stereotypen, Vorurteilen oder Perspektiven aus zweiter Hand ist. Nein, die eigene Meinung ist der „gesunde Menschenverstand“ oder das Ergebnis „eigener Recherche“. „Ideologen“ oder manipulierte „Schlafschafe“, das sind immer die anderen.</p>
            <p>Das zeigt sich nicht nur in Bierzeltreden diverser Politiker, sondern auch in Umfragen, in denen eine Mehrheit angibt, sich wenig Sorgen darüber zu machen, dass die eigenen konsumierten Medien einen Bias haben, wohl aber die Medien, die „die meisten anderen“ konsumieren. ${sourceLink( "de")} Experimente der Yale-Universität zeigen zudem, dass die Unterstützung für dieselbe Maßnahme maßgeblich davon abhängt, ob die eigene politische Seite sie befürwortet oder ablehnt. Gleichzeitig waren sich die meisten Teilnehmer sicher, dass nicht sie, sondern nur das andere Lager so beeinflussbar sei. ${sourceLink( "de")}</p>
            ${figurePlaceholder(10, "de", "Platzhalter für eine Visualisierung von motivated reasoning und parteiischer Wahrnehmung.")}
            <p>Das Phänomen dahinter nennt sich <span class="term">motivated reasoning</span>. Wir geben weder uns selbst noch anderen gerne zu, dass unsere Meinung vielleicht doch nicht das Ergebnis eigenständiger, rationaler Überlegungen ist. Es ist mittlerweile gut belegt, dass wir unseren Verstand oft vor allem dazu einsetzen, Positionen, die wir primär aufgrund von Bias eingenommen haben, im Nachhinein vermeintlich rational zu erklären. Oft „fühlen“ wir zuerst eine Meinung und suchen dann hinterher das Argument dafür, nicht umgekehrt. Deshalb kann es auch so schwer sein, jemanden mit Argumenten zu überzeugen, weil er oder sie die eigene Haltung oft gar nicht auf Basis von Argumenten gebildet hat.</p>
            <p>Dies ist insbesondere der Fall, wenn ein Thema für uns einen besonderen emotionalen oder identitätsstiftenden Wert hat. ${sourceLink( "de")} Wer Paris als eine Stadt wie jede andere betrachtet, lässt sich tatsächlich noch nachweisbar durch neue Informationen über die Stadt beeinflussen. Wer jedoch eine besondere persönliche Verbindung zu Paris hat, ob positiv oder negativ, oder wer in Paris ein politisches Symbol für etwas sieht, wovon er zutiefst überzeugt ist, wird deutlich schwerer zugänglich sein.</p>
            <p>Ein konservativer Mensch vom Land könnte in Paris zum Beispiel ein Symbol für ein multikulturelles, linksliberales Frankreich sehen, das für ihn allein deshalb schon ein gesetzloser Moloch sein muss. Gleichzeitig könnte jemand, der sich eine autofreie Stadt wünscht, aber in einer Stadt lebt, die noch weit davon entfernt ist, angesichts der jüngsten Bemühungen von Paris, fußgängerfreundlicher zu werden, entsprechend seine Hoffnungen und Wünsche unkritisch in Paris hineinprojizieren.</p>
            <p>Zusätzlich denken wir über die meisten Informationen und Reize, die uns tagtäglich erreichen, in der Regel gar nicht wirklich aktiv nach. Die meiste Zeit verbringen wir tatsächlich in einer Art Autopilot, da aktives Nachdenken für unser Gehirn eine anstrengende Tätigkeit ist, die es nach Möglichkeit zu vermeiden sucht. Der Kognitionspsychologe Daniel Kahneman, der viel zu diesem Thema geforscht hat, nannte diesen Autopiloten <span class="term">„System 1“</span> und das aktive Nachdenken <span class="term">„System 2“</span>. ${sourceLink( "de")} System 1 ist deutlich schneller, und ohne diese Möglichkeit, viele eigentlich komplexe Aufgaben weitgehend zu automatisieren, sobald wir darin genug Übung haben, wären wir im Alltag ständig überfordert.</p>
            <p>Ein Gespräch in einer Fremdsprache über unseren Lieblingsfilm zu führen, während wir gleichzeitig ein Fahrzeug steuern, wäre zum Beispiel deutlich schwerer, wenn wir dabei ständig aktiv darüber nachdenken müssten, was jetzt dieses Wort noch mal heißt, wie diese Grammatik funktioniert, welche Filme wir denn überhaupt in unserem Leben schon gesehen haben, wie das mit dem Schalten noch mal geht und so weiter, statt auf gelernte Abläufe und Muster zurückgreifen zu können.</p>
            <p>Allerdings ist System 1 auch deutlich anfälliger für Fehler und gerät an seine Grenzen, wenn unvorhergesehene Schwierigkeiten auftauchen, zum Beispiel, wenn uns ein Wort nicht einfällt. In solchen Situationen greift dann wieder System 2. Tatsächlich gibt es auch Experimente, die zeigen, dass bei vermeintlich einfachen Trickaufgaben die Verwendung einer schwer zu lesenden Schriftart die Aktivierung von System 2 erzwingt und so zu mehr richtigen Lösungen führt als in einer einfach lesbaren Schriftart, wo eher System 1 zur Lösung genutzt wird.</p>
            <p>Für unseren Medienkonsum ist das insoweit problematisch, als dass dieser in der Regel über System 1 läuft. Welche Schlagzeile wir anklicken, welche Meinung wir gut oder schlecht finden, welche Informationen wir glauben, welchen Artikel wir teilen: Über all das denken wir in der Regel nicht bewusst nach, sondern handeln eben auch auf Autopilot. Und da das alles ohne für uns direkt spürbare Reibung abläuft, gibt es in der Regel wenig Anlass für System 2, aktiv zu werden und zum Beispiel zu sagen: „Moment mal, ich sehe das zwar prinzipiell ähnlich und mich interessiert die Geschichte, aber diese Schlagzeile soll mich doch eindeutig manipulieren, nein, lass mal.“</p>
            <p>Hier setzt jetzt <span class="term">BiasScanner</span> an, indem wir durch das bewusste Hervorheben der Techniken hinter Medienbias und Propaganda, während der Artikel gelesen wird, die nötige Reibung für System 2 schaffen wollen. Dabei bauen wir auch auf der <span class="term">Inoculation Theory</span> auf. Diese postuliert, dass Einstellungen auf ähnliche Weise gegen Überzeugungsversuche immun gemacht werden können, wie der Körper durch medizinische Impfungen gegen Krankheiten immun gemacht wird. ${sourceLink( "de")} Genauso wie ein Impfstoff eine abgeschwächte Form eines Virus einführt, um das Immunsystem zu stimulieren und Abwehrkräfte gegen stärkere Angriffe aufzubauen, geht diese Theorie davon aus, dass die Konfrontation von Personen mit abgeschwächten Formen gegensätzlicher Argumente zusammen mit Widerlegungen ihre Fähigkeit stärkt, in Zukunft überzeugenderen Herausforderungen zu widerstehen. Bisherige Forschungsergebnisse deuten darauf hin, dass diese Methode effektiver sein könnte als reine Faktenchecks, insbesondere dann, wenn man sich nicht nur einmalig, sondern regelmäßig aktiv mit Medienbias und Propaganda auseinandersetzt, während man Nachrichten liest. ${sourceLink( "de")}</p>
            <blockquote class="quote-box">„Die Partei befahl, die Erkenntnis deiner Augen und Ohren zurückzuweisen, es war ihr letzter, wichtigster Befehl.“ – George Orwell, <em>1984</em> ${sourceLink( "de")}</blockquote>
            <p>Das ist keine bloße Übertreibung, um den totalitären Anspruch von Propaganda zu betonen. In letzter Konsequenz kann Bias tatsächlich so weit gehen, dass wir unseren eigenen Augen nicht glauben können oder wollen, wenn das, was wir sehen, im Widerspruch zu der Welt in unserem Kopf steht.</p>
            <p>Werfen wir einen Blick auf die beiden Bilder hier unten und fragen uns: Auf welchem Bild sind mehr Menschen zu sehen, links oder rechts?</p>
            ${figurePlaceholder(11, "de", "Platzhalter für den Vergleich der Menschenmengen bei zwei Amtseinführungen.")}
            <p>Die Antwort dürfte für die meisten von uns eindeutig ausfallen: rechts, natürlich! Die Älteren unter uns haben vielleicht sofort erkannt, was die Bilder zeigen, schließlich war das Thema damals groß in den Medien. Es handelt sich um die Amtseinführung von US-Präsident Donald Trump im Jahr 2017 (rechts) und die seines Vorgängers Barack Obama im Jahr 2009 (links). Trump und seine Regierung bestanden fälschlicherweise darauf, dass Trumps Amtseinführung mehr Besucher hatte als die von Obama, eine Sichtweise, die viele Anhänger der Republikaner übernahmen.</p>
            <p>In einem Experiment wurden einige Monate nach der Wahl beiden Gruppen tatsächlich beide Bilder gezeigt, ohne die Information, welcher Präsident darauf zu sehen war. ${sourceLink( "de")} Die Teilnehmer wurden gefragt, auf welchem Bild mehr Menschen zu sehen seien. Unter denen, die 2016 die Demokraten gewählt hatten, wählten 2&nbsp;% das linke Bild. Unter den Trump-Wählern waren es 15&nbsp;%. Noch interessanter wird es, wenn man sich ansieht, welche Trump-Wähler sich besonders für das offensichtlich falsche Bild entschieden. Es waren vor allem diejenigen, die sich als starke Unterstützer sahen und gleichzeitig genug politische Nachrichten verfolgten, um zu wissen, dass das linke Bild die Amtseinführung „ihres“ Präsidenten zeigte. Hier stieg der Anteil derer, die angaben, das linke Bild zeige mehr Menschen, auf 26&nbsp;%. Ob sie dort wirklich mehr Menschen sahen oder aus Loyalität zu Trump die Wahrheit nicht zugeben wollten, lässt sich nicht sagen. Mittlerweile gibt es jedoch Experimente mit Hirnscannern, die Hinweise darauf geben, dass starker Bias tatsächlich die Regionen unseres Gehirns beeinflussen kann, die etwa für räumliche Wahrnehmung zuständig sind. ${sourceLink( "de")} Es ist also durchaus möglich, dass manche Trump-Wähler auf dem linken Bild, sobald sie die Abbildung und damit die nach ihrem Weltbild richtige Antwort erkennen, mehr Personen zu sehen glauben als auf dem rechten Bild. Weil für unser Gehirn manchmal einfach nicht sein kann, was nicht sein darf.</p>
          `,
          history: () => `
            <h2>4. Medienbias ist so alt wie die Medien selbst</h2>
            <p>Medienbias ist so alt wie die Medien selbst. Seitdem die Menschheit damit begann, bedeutende Ereignisse zu dokumentieren, wurden diese Aufzeichnungen von den subjektiven Erfahrungen und Perspektiven ihrer Schöpfer sowie vom gesellschaftlichen Kontext, in dem sie lebten, geprägt.</p>
            <p>Die Siegesstele von Naram-Sin, die im 23. Jahrhundert v.&nbsp;Chr. hergestellt wurde und als eines der frühesten bekannten Artefakte gilt, das als Nachrichtenbericht betrachtet werden kann, enthält eine Kombination aus geschnitzten Bildern und Keilschrift, die den Sieg des akkadischen Königs Naram-Sin über das Volk der Lullubi nicht nur beschreibt, sondern gleichermaßen preist. ${sourceLink( "de")}</p>
            ${figurePlaceholder(12, "de", "Platzhalter für eine Abbildung der Siegesstele von Naram-Sin.")}
            <p>Die sumerische Königsliste, eine Sammlung von Schriften aus dem 21. Jahrhundert v.&nbsp;Chr., die sumerische Könige, die von ihnen regierten Städte und die Dauer ihrer Regierungszeit auflistet, oft mit unrealistisch langen Zeitspannen wie 1.500 Jahren, wird heute in erster Linie als ein Werk angesehen, das von Herrschern in Auftrag gegeben wurde, um ihren Machtanspruch zu legitimieren, indem sie die Vorstellung verbreiteten, dass es schon immer eine einzige Stadt gegeben habe, in der die Königsherrschaft ausgeübt wurde. ${sourceLink( "de")}</p>
            ${figurePlaceholder(13, "de", "Platzhalter für eine Abbildung der sumerischen Königsliste.")}
            <p>Die <em>Acta Diurna</em>, die weithin als eine der frühesten Formen einer öffentlichen Zeitung angesehen werden und zwischen 59&nbsp;v.&nbsp;Chr. und 235&nbsp;n.&nbsp;Chr. zirkulierten, wurden von der römischen Regierung veröffentlicht, um die Öffentlichkeit über wichtige Ereignisse zu informieren, wie sie von der Regierung gesehen werden sollten. Nebenbei bemerkt: Diese Berichte endeten angeblich mit dem Satz „publicare et propagare“, was bereits auf die Beziehung zwischen den Medien und dem später geprägten Begriff Propaganda hindeutet. ${sourceLink( "de")}</p>
            <p>Während des größten Teils der Geschichte dienten die Nachrichtenmedien weniger der bestmöglichen Information der Öffentlichkeit als vielmehr als Kommunikationskanal der Herrscher einer Gesellschaft zu den verschiedenen Gruppen unter ihnen.</p>
            <p>Dies änderte sich nicht sofort, als im 17. Jahrhundert die ersten modernen Zeitungen erschienen. Auch wenn es nicht mehr die Regierung war, die Informationen direkt an ihre Untertanen weitergab, bedeuteten Zensur, eingeschränkter Zugang zu unvoreingenommenen Informationsquellen und oft eine enge Verbindung zu Interessengruppen im Allgemeinen, dass die neuen, in Privatbesitz befindlichen Zeitungen sich nicht allzu sehr darum bemühten, objektiv und unvoreingenommen zu sein.</p>
            <p>Tatsächlich ist die bloße Vorstellung, dass Journalismus in irgendeinem Sinne des Wortes objektiv und unvoreingenommen sein könnte und sollte, eine relativ neue Erfindung, die Mitte bis Ende des 19. Jahrhunderts entstand, teilweise aufgrund der Geschäftsinteressen von Nachrichtenagenturen. In einer Rede vor dem US-Kongress im Jahr 1856 erklärte Lawrence Gobright, Chef der Agentur Associated Press (AP) in Washington, dass es die Aufgabe der AP sei, Fakten zu vermitteln, ohne sie zu kommentieren, damit die Zeitungen, die die eigentlichen Kunden der Agenturen waren, dann „ihre eigenen Kommentare zu den ihnen übermittelten Fakten abgeben“ könnten. ${sourceLink( "de")}</p>
            <p>Eine tiefgreifendere Diskussion über die Medien und ihren Einfluss auf die öffentliche Meinung begann zu Beginn des 20. Jahrhunderts, stark beeinflusst durch den offensichtlichen Erfolg groß angelegter Propagandamaßnahmen während des Ersten Weltkriegs. Walter Lippmann und Edward Bernays, die später zwei der einflussreichsten Bücher auf diesem Gebiet verfassten, arbeiteten beide für das Committee on Public Information, eine US-amerikanische Regierungsbehörde, die nach dem Eintritt des Landes in den Ersten Weltkrieg gegründet wurde, um die öffentliche Meinung zugunsten des Krieges zu beeinflussen.</p>
            <p>Lippmann schrieb 1922 das Buch <em>Public Opinion</em>, das als grundlegendes Werk darüber gilt, wie die öffentliche Meinung in einer Gesellschaft durch die begrenzte Fähigkeit des Menschen, die reale Welt zu verarbeiten, darzustellen und zu kommunizieren, geprägt und verzerrt wird. ${sourceLink( "de")} Er argumentierte, dass diese Begrenzung dazu zwingt, sich auf ein verkürztes mentales Bild der Realität zu verlassen, was erhebliche Auswirkungen auf die Demokratie hat.</p>
            <p>Während im Journalismus nun erstmals Vorstellungen von Objektivität und Fairness formalisiert wurden, etwa in den ersten Ethikkodizes, die von Journalistenverbänden verabschiedet wurden, wie den <em>Canons of Journalism</em> der American Society of Newspaper Editors aus dem Jahr 1923 ${sourceLink( "de")}, schickten sich gleichzeitig totalitäre Ideologien wie der Faschismus oder der Stalinismus an, Propaganda auf ein neues, alle Bereiche der Gesellschaft umfassendes Level zu heben. Dabei kamen zunehmend neue Technologien zum Einsatz, wie das Radio, der Film und das Fernsehen.</p>
            <p>So wie einst die Erfindung der Druckerpresse im 16. Jahrhundert die schnelle Verbreitung der Thesen Luthers und anderer Reformatoren durch Flugblätter und Karikaturen an ein Massenpublikum ermöglichte, erwiesen sich auch diese neuen Medien schnell als zentral für die Verbreitung von Propaganda im 20. Jahrhundert.</p>
            ${figurePlaceholder(14, "de", "Platzhalter für eine Bildmontage zu Druckerpresse, Radio, Film und Fernsehen.")}
            <p>Im 21. Jahrhundert wird diese Rolle zusehends vom Internet und hier insbesondere von Social Media übernommen, das aus unserer heutigen Informationslandschaft kaum mehr wegzudenken ist. Der Mensch im 21. Jahrhundert wird wohl täglich mit mehr Informationen, die mal mehr und mal weniger den Titel Nachrichten verdienen, überschüttet als jemals zuvor in der Geschichte der Menschheit. Dabei verlieren die klassischen Medienhäuser zusehends an Relevanz und Deutungshoheit; sie sind auf dem Weg, nur noch eine Stimme unter vielen zu werden. ${sourceLink( "de")} Anstatt dass Medienhäuser entscheiden, über welche Themen und aus welcher Perspektive wir informiert werden, und wir uns zumindest theoretisch entscheiden können, diese oder jene Zeitung zu lesen oder diesen oder jenen Sender einzuschalten, entscheidet heute der Algorithmus, ob wir die Perspektiven dieser Medienhäuser überhaupt noch zu Gesicht bekommen. Die Bestätigung der eigenen Meinung ist dabei nichts mehr, was wir aktiv suchen müssen, sie wird uns passiv serviert.</p>
            ${figurePlaceholder(15, "de", "Platzhalter für eine Darstellung algorithmischer Feeds und Social-Media-Gatekeeping.")}
            <p>Während Falschmeldungen an sich nichts Neues sind und auch in der Vergangenheit bereits Bilder, Dokumente und Berichte gefälscht wurden, ermöglicht das Aufkommen generativer KI nun eine völlig neue Geschwindigkeit und Dimension in der Erstellung und Verbreitung solcher Inhalte. Welche Auswirkungen dies auf die Meinungsbildung im weiteren Verlauf des 21. Jahrhunderts haben wird, bleibt abzuwarten.</p>
          `,

            <h2>5. Ursachen von Bias in den Medien</h2>

            <h3>Publikumsnachfrage und kognitive Muster</h3>
            <p>Es gibt verschiedene Ursachen für Bias in den Medien. In einer Marktwirtschaft ist die Nachfrage des Publikums ein wichtiger Treiber: Menschen bevorzugen oft Nachrichten, die ihre eigene Weltsicht bestätigen. Das schafft einen Markt für Medien, die genau diese Voreingenommenheit bedienen, und es gibt wenig Anreiz, diese Ansichten zu hinterfragen. ${sourceLink( "de")} Ähnlich funktionieren „Filterblasen“ in sozialen Medien: Algorithmen zeigen Nutzern vor allem Inhalte, die zu ihren bestehenden Meinungen passen. Wie oben beschrieben, hängt diese Nachfrage oft mit dem Wunsch zusammen, kognitive Anstrengung zu vermeiden. ${sourceLink( "de")} Widersprüchliche Meinungen oder Fakten können Stress auslösen, besonders wenn sie die eigene Identität oder Überzeugungen infrage stellen. Während unser Gehirn diese Form von Stress tunlich vermeiden will, zeigen Studien und Experimente paradoxerweise gleichzeitig eine klare Präferenz für negativ formulierte Schlagzeilen und Artikel über negative Ereignisse, obwohl jeder, der schon einmal am Doomscrollen war, wohl wissen wird, dass wir uns dadurch nicht besser fühlen. ${sourceLink( "de")} Eine Theorie besagt, dass dies mit der Evolutionsbiologie zusammenhängt: In der Vergangenheit, als die menschliche Umwelt tatsächlich voller Gefahren wie wilder Tiere war, war es vorteilhaft, sich mit diesen Bedrohungen auseinanderzusetzen, statt sie zu ignorieren. ${sourceLink( "de")} Allerdings hat sich die Welt seitdem stark verändert. Unser Gehirn war nie darauf ausgelegt, täglich in Echtzeit mit Informationen über alle Katastrophen überflutet zu werden, egal ob sie uns direkt betreffen oder wir direkt Einfluss darauf nehmen können.</p>

            <h3>Journalisten, Eigentümer und Organisationslogik</h3>
            <p>Man kann das Verhältnis zwischen dem Bias der Medien und dem Bias ihres Publikums als eine „Henne-Ei“-Situation beschreiben, da die Ansichten des Publikums, die bestätigt werden wollen, ja nicht spontan entstehen, sondern selbst im Kontext des Einflusses der Massenmedien geformt werden. Die Medien sind nicht einfach nur „Opfer“ des Bias ihres Publikums, sondern prägen diesen aktiv mit, manchmal absichtlich, manchmal unabsichtlich. Dies geschieht beispielsweise durch den persönlichen Hintergrund der Journalisten, die in Medienorganisationen arbeiten und oft keine repräsentative Teilmenge der Bevölkerung darstellen. Im Vergleich zur Gesamtbevölkerung stammen deutsche Journalisten zum Beispiel deutlich häufiger aus akademischen Elternhäusern und haben seltener einen Migrationshintergrund, was sich dann auch in der Auswahl der Themen und Perspektiven niederschlägt. ${sourceLink( "de")}</p>
            <p>Ebenso kann die Agenda der Eigentümer eine große Rolle spielen: Viele Medien befinden sich zum Beispiel im Besitz von Milliardären, für die ein Medienimperium nicht nur eine lukrative Einnahmequelle sein kann, sondern auch eine Möglichkeit, ihre enormen finanziellen Ressourcen einzusetzen, um die Gesellschaft in ihrem Sinne zu beeinflussen. ${sourceLink( "de")}</p>
            ${figurePlaceholder(16, "de", "Platzhalter für eine Visualisierung von Medieneigentum, Macht und Einfluss.")}
            <p>Interessanterweise zeigt sich ein scheinbarer Widerspruch zwischen Journalisten und Medienbesitzern: Während Journalisten im Schnitt politisch leicht links orientiert sind (wenn auch oft eher in sozialen als wirtschaftlichen Fragen) ${sourceLink( "de")}, haben die Eigentümer der reichweitenstärksten Medien als Vermögende in der Regel ein Interesse daran, gegen linke Positionen wie etwa eine höhere Besteuerung von Vermögen zu agitieren. Stattdessen fördern sie eher rechte oder liberale Stimmen, deren Politik Vermögenden tendenziell mehr Vorteile bietet. ${sourceLink( "de")}</p>
            <p>Ein Beispiel hierfür ist Mathias Döpfner, CEO und Eigentümer des Axel-Springer-Verlags, zu dem unter anderem Bild, Welt und Politico gehören. Im Bundestagswahlkampf 2021 wies er den damaligen Chefredakteur Julian Reichelt in einer später geleakten SMS an, die FDP zu „stärken“, damit diese in der sich abzeichnenden Ampelkoalition möglichst selbstbewusst auftreten könne. ${sourceLink( "de")}</p>
            <p>Natürlich findet in der Praxis eine gewisse Selektion statt: Kurzfristig ist es nicht ungewöhnlich dass Journalisten in Redaktionen arbeiten, mit denen sie nicht auf einer Linie liegen, aber langfristig gibt es eine Tendez, sich eher eine Anstellung bei Medien zu suchen, die zu ihrer politischen Ausrichtung passen, und Medien bevorzugen gegebenfalls Journalisten, die „zur Marke“ passen. ${sourceLink( "de")} Zudem befinden sich nicht alle Medien im Privatbesitz einzelner Vermögender, manche sind genossenschaftlich oder öffentlich-rechtlich organisiert.</p>
            <p>Gleichzeitig bemühen sich Journalisten, die ihren Beruf ernst nehmen, nach bestem Wissen und Gewissen fair zu bleiben. Auch nehmen nicht alle privaten Eigentümer direkten Einfluss auf redaktionelle Entscheidungen. Letztlich ist die politische Einstellung der Journalisten vor allem bei Medien relevant, die ohnehin eine klare Schlagseite haben, unabhängig davon, woher diese kommt. ${sourceLink( "de")} Bei Medien, die ernsthaft um Objektivität bemüht sind, tritt sie dagegen deutlich in den Hintergrund.</p>
            <p>In autoritär regierten Staaten tritt dagegen der Einfluss der privaten Besitzverhältnisse und Überzeugungen zugunsten der vorgegebenen Linie der Regierung zurück.</p>

            <h3>Zugang, Werbung und politischer Druck</h3>
            <p>Die Beziehung zwischen all diesen Faktoren kann recht komplex sein. Die anfängliche Entscheidung von Fox News, den Sieg von Joe Biden bei den US-Wahlen 2020 zu bestätigen, führte beispielsweise zu einem Verlust von Zuschauern, die sich, möglicherweise auch deshalb, weil Fox News vor der Wahl immer wieder Beiträge hatte, die vor angeblichem Wahlbetrug der Demokraten warnten, Sendern zuwandten, die die falsche, aber nachgefragte Erzählung verbreiteten, die Wahl sei manipuliert worden. ${sourceLink( "de")} Letztendlich gab Fox News dem Marktdruck nach und verbreitete ebenfalls Falschmeldungen über die Sicherheit von Wahlmaschinen. Daraufhin wurde der Sender wegen Verleumdung verklagt und musste im Rahmen eines Vergleichs eine erhebliche Zahlung leisten.</p>
            ${figurePlaceholder(17, "de", "Platzhalter für eine Visualisierung zu Fox News, Marktdruck und Wahlbetrugsnarrativen.")}
            <p>Neben diesen Faktoren hat sich auch der Wunsch, in der Gunst der Objekte der Berichterstattung zu bleiben, als relevanter Faktor erwiesen. Journalisten möchten möglicherweise keinen Zugang zu Interviewpartnern verlieren, indem sie zu kritisch erscheinen, oder sie entwickeln durch wiederholten Kontakt persönliche Sympathien. ${sourceLink( "de")}</p>
            <p>Es hat sich ebenso gezeigt, dass der Vorwurf an Journalisten, sie seien bei einem Thema parteiisch, ob berechtigt oder nicht, tatsächlich dazu führen kann, dass sie übersteuern und bewusst Narrative der Seite übernehmen, von der diese Kritik kommt, um vermeintlich ihre Neutralität zu beweisen. ${sourceLink( "de")} So hatten deutsche Medien beispielsweise lange Zeit in ihrer Berichterstattung bis auf Ausnahmen prinzipiell auf die Nennung der Herkunft von Tatverdächtigen komplett verzichtet, was ihnen nach den Übergriffen in der Kölner Silvesternacht 2015 den Vorwurf einbrachte, sie würden absichtlich die migrantische Herkunft der Täter verschweigen. Um dem zu begegnen, begannen deutsche Medien zum einen häufiger, die Herkunft zu nennen, nach einer Auswertung aus dem Jahr 2025 in jedem dritten Zeitungsbericht und jedem vierten Fernsehbericht über Gewaltkriminalität. ${sourceLink( "de")} Sie nennen die Herkunft aber nicht prinzipiell häufiger, sondern vor allem dann, wenn es sich um eine ausländische Herkunft handelt. In TV-Berichten werden zu 95&nbsp;% Ausländer erwähnt, wenn die Herkunft thematisiert wird. In Zeitungsberichten sind es 91&nbsp;%. In der aktuellen Kriminalstatistik sind etwa 34&nbsp;% der Tatverdächtigen Ausländer. Das heißt: Sofern die Herkunft genannt wird, kommen in der Berichterstattung über Gewaltkriminalität fast nur Ausländer vor, obwohl sie in der Realität nur etwa ein Drittel der Tatverdächtigen ausmachen.</p>
            ${figurePlaceholder(18, "de", "Platzhalter für eine Grafik zur Nennung von Herkunft in der Kriminalitätsberichterstattung.")}
            <p>Werbung, was ja als eine Form von Propaganda betrachtet werden kann, ist ein interessanter Fall, da Unternehmen und Organisationen sowohl potenzielle Kunden für Werbeflächen in einem Medium als auch potenzielle Objekte der Berichterstattung sind. Tatsächlich wurde gezeigt, dass Zeitungen tendenziell positiver über Werbepartner berichten, auch über die eigentliche bezahlte Anzeige hinaus; schließlich will man seine Kunden nicht durch einen zu kritischen Ton verschrecken. ${sourceLink( "de")} Darüber hinaus kann Werbung auch Anreiz für ein Medium sein, sich mit radikalen, extremistischen oder einfach nur potenziell kontroversen Inhalten zurückzuhalten, da Werbekunden oft eine Assoziation mit solchen Inhalten vermeiden wollen. ${sourceLink( "de")}</p>
            <p>Abseits von privaten Akteuren nutzen auch Staaten und Regierungen zuweilen Werbung als Mittel, um Medien zu einer genehmeren Berichterstattung zu drängen, insbesondere in mehr oder weniger funktionierenden Demokratien, wo direkte Druckmittel und staatliche Gewalt begrenzt sind. ${sourceLink( "de")} Je nach Grad der Autorität und der Stärke unabhängiger Institutionen können Regierungen in solchen Systemen auf weitere Arten Einfluss nehmen, darunter die Vorenthaltung oder Zuteilung direkter Finanzmittel oder die Anwendung von Zensur, entweder direkt erzwungen oder durch eine Kultur der Selbstzensur, die durch rechtlichen oder gewaltsamen Druck auf Journalisten und Medien entsteht. Dabei stehen nicht nur dem Staat solche Mittel zur Verfügung: Wenn eine Regierung nicht in der Lage oder willens ist, Medienschaffende vor Bedrohungen durch nichtstaatliche Akteure wie Terrorgruppen, kriminelle Organisationen oder mächtige Unternehmen zu schützen, können diese ebenfalls Druck ausüben. ${sourceLink( "de")}</p>

            <div class="info-box">
              <h4>Warum das demokratietheoretisch problematisch ist</h4>
              <p>In einer liberalen Demokratie, die auf dem Ideal einer gut informierten Bürgerschaft beruht, die vielfältige Perspektiven berücksichtigt, auf faktenbasierte Argumentation reagiert, wenn sie politische Meinungen bildet, und bereit bleibt, mit denen Kompromisse zu schließen, die zu anderen Schlussfolgerungen gelangen, sind diese Erkenntnisse ernüchternd. Diese Sorge wird noch größer, wenn man die Treiber von Medienvoreingenommenheit betrachtet. Wenn der Einfluss der Massenmedien wirksam ist und die Akteure mit der größten Fähigkeit, diesen Einfluss zu gestalten, diejenigen sind, die bereits erhebliche Macht besitzen, darunter Regierungen, einflussreiche politische Organisationen, Unternehmen oder wohlhabende Einzelpersonen, untergräbt das Ergebnis direkt ein weiteres demokratisches Ideal, nämlich das Prinzip, dass jeder die gleiche Möglichkeit haben sollte, seine Stimme zu erheben und für seine Position einzutreten.</p>
            </div>
          `,
