          causes: () => `
            <h2>5. Causes of bias in the media</h2>

            <h3>Audience demand and cognitive patterns</h3>
            <p>There are various causes of bias in the media. In a market economy, audience demand is an important driver: people often prefer news that confirms their own worldview. That creates a market for media that cater precisely to that predisposition, and there is little incentive to challenge such views. ${sourceLink( "en")} “Filter bubbles” on social media work in a similar way: algorithms mainly show users content that fits their existing opinions. As described above, this demand is often connected to the desire to avoid cognitive effort. ${sourceLink( "en")} Contradictory views or facts can trigger stress, especially when they call our identity or convictions into question. While our brain tries hard to avoid this kind of stress, studies and experiments paradoxically also show a clear preference for negatively framed headlines and articles about negative events—even though anyone who has ever been doomscrolling probably knows this does not make us feel better. ${sourceLink( "en")} One theory says that this is related to evolutionary biology: in the past, when the human environment really was full of dangers such as wild animals, it was advantageous to engage with threats rather than ignore them. ${sourceLink( "en")} The world, however, has changed dramatically since then. Our brain was never designed to be flooded in real time every day with information about every catastrophe, whether or not it affects us directly or whether we can influence it directly.</p>

            <h3>Journalists, owners and organizational logic</h3>
            <p>The relationship between the bias of the media and the bias of its audience can be described as a “chicken-and-egg” situation, because the views of the audience that want to be confirmed do not arise spontaneously; they are themselves shaped in the context of mass-media influence. The media are not simply “victims” of their audience’s bias but actively shape that bias, sometimes intentionally, sometimes unintentionally. This happens, for example, through the personal backgrounds of journalists working in media organizations, who often are not a representative subset of the population. Compared with the population as a whole, German journalists, for instance, much more often come from academic family backgrounds and less often have a migration background, which also affects the selection of topics and perspectives. ${sourceLink( "en")}</p>
            <p>The agenda of owners can also play a major role: many media outlets are owned by billionaires, for whom a media empire can be not only a lucrative source of income but also a way of using their enormous financial resources to shape society in their own interests. ${sourceLink( "en")}</p>
            ${figurePlaceholder(16, "en", "Placeholder for a visualization of media ownership, wealth and influence.")}
            <p>Interestingly, there is an apparent contradiction between journalists and media owners: while journalists on average lean slightly to the left politically (though more so on social than economic issues) ${sourceLink( "en")}, the owners of the highest-reach media outlets, being wealthy, generally have an interest in agitating against left-wing positions such as higher taxes on wealth. Instead, they are more likely to promote right-wing or liberal voices whose policies tend to benefit wealthy people more. ${sourceLink( "en")}</p>
            <p>One example is Mathias Döpfner, CEO and owner of the Axel Springer publishing group, which includes Bild, Welt and Politico. During the 2021 German federal election campaign, he instructed then editor-in-chief Julian Reichelt in a later leaked text message to “strengthen” the FDP so that it could act as confidently as possible in the emerging governing coalition. ${sourceLink( "en")}</p>
            <p>Of course, in practice some selection takes place: While in the short term, it is not uncommon for journalists to work for newsrooms they do not align with politically, in the long term, they are more likely to seek jobs at media outlets that fit their political orientation, and media outlets might prefer journalists who fit “the brand.” ${sourceLink( "en")} Moreover, not all media are privately owned by individual wealthy people; some are organized as cooperatives or public-service institutions.</p>
            <p>At the same time, journalists who take their profession seriously do try, to the best of their knowledge and conscience, to remain fair. Nor do all private owners directly intervene in editorial decisions. Ultimately, journalists’ political orientation matters mainly for outlets that already have a clear slant, regardless of where it primarily comes from.  ${sourceLink( "en")} For media that seriously strive for objectivity, it recedes much more into the background.</p>
            <p>In authoritarian states, by contrast, the influence of private ownership structures and convictions gives way to the government line that has to be followed.</p>

            <h3>Access, advertising and political pressure</h3>
            <p>The relationship among all these factors can be quite complex. Fox News’s initial decision to confirm Joe Biden’s victory in the 2020 U.S. election, for example, led to a loss of viewers, who may also have been primed by Fox’s pre-election segments warning of supposed Democratic voter fraud and then turned to channels spreading the false but demanded narrative that the election had been manipulated. ${sourceLink( "en")} In the end, Fox News yielded to market pressure and likewise spread false claims about the security of voting machines. It was then sued for defamation and had to pay a substantial settlement.</p>
            ${figurePlaceholder(17, "en", "Placeholder for a visualization of Fox News, market pressure and election-fraud narratives.")}
            <p>Another relevant factor is the desire to remain in the good graces of the subjects of reporting. Journalists may not want to lose access to interview partners by appearing too critical, or they may develop personal sympathies through repeated contact. ${sourceLink( "en")}</p>
            <p>It has also been shown that accusing journalists of being biased on a given issue—whether justified or not—can actually lead them to overcorrect and consciously adopt narratives from the very side making the accusation in order to supposedly prove their neutrality. ${sourceLink( "en")} German media, for example, had for a long time generally refrained—apart from exceptions—from mentioning the origin of suspects in their reporting, which after the assaults on New Year’s Eve in Cologne in 2015 led to accusations that they were deliberately concealing the migrant background of the perpetrators. In response, German media began to mention origin more often—according to a 2025 analysis, in every third newspaper report and every fourth television report on violent crime. ${sourceLink( "en")} But they do not mention origin more often across the board; they mention it above all when it is foreign origin. In TV reports, foreigners are mentioned in 95% of the cases in which origin is discussed; in newspaper reports the figure is 91%. In the current crime statistics, about 34% of suspects are foreigners. That means that whenever origin is mentioned, reporting on violent crime features foreigners almost exclusively, even though in reality they account for only about a third of suspects.</p>
            ${figurePlaceholder(18, "en", "Placeholder for a chart about the mention of origin in crime reporting.")}
            <p>Advertising—something that can itself be viewed as a form of propaganda—is an interesting case, because companies and organizations are both potential customers for advertising space and potential objects of reporting. It has in fact been shown that newspapers tend to report more positively on advertising partners, beyond the paid ad itself; after all, you do not want to scare off customers by sounding too critical. ${sourceLink( "en")} In addition, advertising can incentivize a medium to hold back when it comes to radical, extremist or simply potentially controversial content, because advertisers often want to avoid association with such material. ${sourceLink( "en")}</p>
            <p>Beyond private actors, states and governments also sometimes use advertising as a means to pressure media into friendlier reporting, especially in more or less functioning democracies where direct coercion and state violence are limited. ${sourceLink( "en")} Depending on the degree of authority and the strength of independent institutions, governments in such systems may influence the media in other ways as well, including withholding or allocating direct funding or applying censorship—either directly enforced or through a culture of self-censorship created by legal or violent pressure on journalists and media organizations. And these tools are not available only to the state: if a government is unable or unwilling to protect media workers from threats by non-state actors such as terrorist groups, criminal organizations or powerful corporations, those actors can exert pressure as well. ${sourceLink( "en")}</p>
            <div class="info-box">
              <h4>Why this is a problem for democratic theory</h4>
              <p>In a liberal democracy built on the ideal of a well-informed citizenry that considers diverse perspectives, responds to fact-based argument when forming political opinions, and remains willing to compromise with those who reach different conclusions, these findings are sobering. This concern becomes even greater when one looks at the drivers of media bias. If mass-media influence is real, and the actors best able to shape that influence are those who already possess substantial power—including governments, influential political organizations, companies or wealthy individuals—then the result directly undermines another democratic ideal: the principle that everyone should have the same opportunity to raise their voice and advocate for their position.</p>
            </div>
          `,
          effects: () => `
            <h2>6. How bias and propaganda work</h2>

            <h3>Persuasion</h3>
            <p>There is, first of all, the type of propaganda people often imagine: propaganda whose primary goal is to persuade its audience of a specific message. The bias types described here can indeed serve as useful tools for that. But it is not actually easy to persuade someone of something through communication alone, especially when the issue is very important to them, they hold a strong opinion, and they believe they know a great deal about it. ${sourceLink( "en")}</p>
            <p>Research shows that new beliefs are mainly formed on issues the recipient more or less does not care about and that do not touch them personally. Most people are quite ready to accept that Thomas Edison did not invent the light bulb—he actually improved an existing invention and brought it to mass market—even if they believed the opposite before. But on issues such as migration, welfare, security or tax policy, that is very different. ${sourceLink( "en")} Because such issues are so politicized, they are too tightly bound up with people’s identities. Admitting to oneself or to others that one is wrong even on a single point, with all the implications that entails, threatens one’s entire picture of the world and one’s place in it—something to be avoided if possible.</p>
            <p>A persuasive message is therefore often one that connects to beliefs already in place and is perceived as their continuation—not as a contradiction. A contradiction can even trigger the so-called <span class="term">backfire effect</span>: when people are confronted with a position that opposes their beliefs, even if it is highly logical and well argued, they often harden their stance further as a defense mechanism. ${sourceLink( "en")}</p>
            ${figurePlaceholder(19, "en", "Placeholder for a visualization of persuasion, resistance and the backfire effect.")}
            <p>Media are generally much more effective at determining which topics matter in public discourse than at directly changing opinions on those topics, although state media in autocracies may have an advantage here because they do not face competition from contradictory perspectives. ${sourceLink( "en")} Since certain issues are strongly associated by the public with certain parties—so-called <span class="term">topic ownership</span> ${sourceLink( "en")}—and these parties especially benefit when “their” issue dominates discussion, the media can still exert major indirect influence in this way. Such an effect on election outcomes has been empirically demonstrated, for example, for Fox News in the United States: wherever the conservative channel launched and found an audience, Republicans measurably benefited. ${sourceLink( "en")}</p> 

            <h3>Polarization</h3>
            <p>If bias and propaganda reinforce existing beliefs in both directions—either by confirming them through content or by provoking people to harden them as a reaction to contradiction—the expected result is an intensification of social divisions and lines of conflict, something repeatedly demonstrated in studies. ${sourceLink( "en")}</p>
            <p>If an issue is already sufficiently polarizing, the reporting on it does not even have to be especially divisive itself; even good, fact-based and fair journalism can further fuel polarization simply by increasing the attention the issue receives. ${sourceLink( "en")}</p>
            <p> This effect is amplified by the <span class="term"> Illusory Truth Effect </span>: Itruth eddectf one is generally susceptible to a message, its truthfulness is rated higher if it is repeated again and again. ${sourceLink( "en")}</p>
            <p>It would be wrong, however, to see this politicization merely as a side effect of persuasion attempts; often the division itself is precisely the goal. <em>Divide et impera</em>—divide and rule—as people already said in antiquity. It is well documented that Russian propaganda campaigns in the United States produced and distributed both pro- and anti-Black-Lives-Matter content. ${sourceLink( "en")} In some cases, pro and anti events in the same city were even promoted at the same time in order to generate confrontation.</p>
            ${figurePlaceholder(20, "en", "Placeholder for a depiction of polarized counter-protests and divide-and-rule strategies.")}
            <p>Of course, this strategy is not used only between states in “information warfare.” Within a society as well, it can benefit those in power when groups that ought to have an interest in showing solidarity with one another instead turn on each other.</p>
            <p>Analyses of political advertising campaigns in the United States show, for example, that Republicans, especially in areas badly hit by job outsourcing as globalization increased, emphasized in their voter outreach issues that mattered greatly to the identity of many white workers in those regions—often now unemployed—such as gun ownership, abortion, conservative values in general and opposition to immigration. ${sourceLink( "en")} Economic questions such as taxes, trade or the welfare state were pushed into the background. Those topics, by contrast, were emphasized more by Democrats.</p>
            <p>The Republican strategy can therefore be understood as an attempt, in the face of worsening economic conditions, to prevent their voters from turning toward the Democrats, whose economic and social policies might have benefited them more. Instead, Republicans stressed what distinguished these voters from Democrats at the level of identity in order to keep them on board.</p>
            <blockquote class="quote-box">“The propagandist’s purpose is to make one set of people forget that certain other sets of people are human.” – Aldous Huxley ${sourceLink( "en")}</blockquote>
            <p>This <span class="term">dehumanization</span> of the supposed opponent is what makes the worst forms of organized violence of which humanity is capable possible in the first place. No war and no genocide would be conceivable if it were not possible to make people forget the humanity of those who do not belong to “their” group. ${sourceLink( "en")}</p>

            <h3>Cynicism</h3>
            <p>Sometimes propaganda does not even try to spread an alleged truth. Instead, the goal may be to dissolve the very concept of truth. ${sourceLink( "en")} One day one version of events is pushed, the next day a completely different one. By the time one lie has been corrected, two new ones are already circulating. Faced with this flood, truth soon appears to be just one story among many. “You hear so much—who even knows what is true? Everyone lies anyway.”</p>
            ${figurePlaceholder(21, "en", "Placeholder for a visualization of information overload, relativization and cynicism.")}
            <p>For a regime or movement to which power matters more than any actual conviction, this form of propaganda may even be more useful. Anyone who no longer believes in any truth cannot later turn away, disappointed, from “their” truth.</p>
            <p>Accordingly, propaganda that no longer cares about truth is not really bothered by fact-checking either. Russian foreign propaganda in the context of “Operation Overload,” for example, repeatedly contacted fact-checking organizations on purpose, posing as “concerned citizens” who wanted this or that false claim examined. ${sourceLink( "en")} After all, far more people will see the correction than ever saw the original lie.</p>
            <p>There is now research showing that even a successful fact-check—one in which people afterwards know what is true and what is false—cannot prevent the lie from still exerting some effect on beliefs. ${sourceLink( "en")}</p>

            <h3>Intimidation</h3>
            <p>From the outside, propaganda in many dictatorships often looks simply absurdly ridiculous: giant golden statues, embarrassing hymns of praise and elections supposedly won with 99% of the vote. Part of this absurdity is, of course, just the result of the narcissism of violent rulers who have lost touch with reality. But there is also a system behind it: publicly proclaiming a lie so absurd and stupid that everyone immediately recognizes it as one, and at the same time forcing everyone to participate publicly in that lie, is a demonstration of power. Resistance against a government capable of making an entire society “sing the lie” ${sourceLink( "en")} often appears pointless. ${sourceLink( "en")}</p>
            ${figurePlaceholder(22, "en", "Placeholder for a depiction of absurd propaganda in dictatorships.")}
            <p>Dictatorships often try, for example through networks of informants, to ensure that this lie extends even into private life, until each person wonders whether they are alone in their opposition. Yet history has shown that private life is ultimately much harder to control than public life. In private, real convictions hibernate, waiting for cracks in the façade; and once that façade breaks, things can move very quickly—as in the story “The Emperor’s New Clothes.” ${sourceLink( "en")}</p>
            <p>Historically, Nicolae Ceaușescu’s last public speech can be understood as symbolic of this dynamic. The Romanian dictator cultivated an extreme cult of personality, had himself celebrated as the “Genius of the Carpathians,” and staged mass rallies with tens of thousands of cheering supporters. In his final speech, intended to display strength in the face of protests in Timișoara, he addressed around 100,000 bused-in spectators. When individual boos suddenly began and quickly spread across the square like an avalanche, Ceaușescu faltered, the TV broadcast was cut off, and the planned display of power turned into mass protest that led to his fall a few days later. ${sourceLink( "en")}</p>
            <p>In fact, it is especially dictatorships that otherwise make no effort at all to preserve even the appearance of democracy that rely on such absurd propaganda. According to an analysis of propaganda from different autocracies, the typical state media in autocracies that retain some democratic elements of legitimacy, such as elections—which of course are anything but free and fair—show bias levels roughly comparable to “Fox News.” ${sourceLink( "en")} That is, a channel that is clearly extremely partisan and not ashamed to spread explicit propaganda, but propaganda that viewers are in fact supposed to believe. Media in totalitarian states, according to that analysis, are about four times more partisan, up to a level that can slide into the absurd.</p>
            <p>The nature of a regime’s economy can also shape the kind of propaganda and bias it uses: autocratic governments that derive their income primarily from selling natural resources such as oil tend to exercise even stricter control over every form of critical reporting than dictatorships that are less resource-rich. ${sourceLink( "en")} The most common theory is that dictatorships that cannot simply finance themselves through a single resource are more dependent on the bureaucracy functioning reasonably well and therefore have more of an interest in allowing, for example, corruption cases to be exposed through the media.</p>

            <h3>Can there be such a thing as good propaganda?</h3>
            <p>If bias and propaganda fundamentally work, then a basic question naturally arises: can there be such a thing as good propaganda? In other words, communication that, instead of trying to persuade in the spirit of enlightenment through rational argument and facts, consciously uses the techniques discussed here in order to advance goals that an enlightened society would usually call “good.” Of course, in the end it always remains somewhat subjective what counts as “good”; that discussion would go too far here. But if one truly has a cause worthy of that label, would it then be a mistake to refuse to use these effective methods and risk the success of one’s cause—or is that very form of manipulative communication already a mistake in itself, whether for principled ethical reasons or because one considers the normalization of such methods too dangerous?</p>
            <p>Because propaganda can in fact do more than spread disinformation, bring extremists to power and split a society apart. It can also help improve public health ${sourceLink( "en")}, slow the rise of extremists ${sourceLink( "en")}, and emphasize commonalities ${sourceLink( "en")}.</p>
            <blockquote class="quote-box">“The only difference between ‘propaganda’ and ‘education,’ really, is the point of view. Advocacy of what we believe in is education. Advocacy of what we don’t believe in is propaganda.”<br><br>“Propaganda will never die out. Intelligent men must realize that propaganda is the modern instrument by which they can fight for productive ends and help bring order out of chaos.” – Edward Bernays ${sourceLink( "en")}</blockquote>
            ${figurePlaceholder(23, "en", "Placeholder for a visualization of the ethical tension between enlightenment and manipulative communication.")}
            <p>Most of the other authors cited here—from Lippmann to Huxley to Orwell—see this much more critically. BiasScanner cannot answer who is ultimately right, even though I of course have my own personal opinion on it. Our goal is to draw attention to the topic and help users recognize and understand bias and propaganda, so that they can decide for themselves how they want to deal with them.</p>
          `,
          "social-media": () => `
            <h2>7. Bias, propaganda and social media</h2>

            <h3>The algorithm as the new gatekeeper</h3>
            <p>As discussed above, in the 21st century the role of the “gatekeeper” between us and the news is increasingly shifting away from the traditional media and especially toward social media. Here the algorithm enters the picture as a new, automated source of bias. And in the design of the algorithm, the familiar factors matter once again: above all, the market-based interplay of supply and demand. Social-media platforms have an interest in keeping users on the platform for as long as possible so that as much paid advertising as possible can be shown to them. That is why content that generates especially high engagement is prioritized—and, as with traditional media, this tends to be emotionally charged content and content that confirms the user’s worldview. ${sourceLink( "en")}</p>
            <p>Then there is the agenda of the owners, who even more often than in traditional media are billionaires. It is not always possible to trace how strongly active intervention takes place for political reasons, but in the case of Elon Musk’s “Twitter,” now “X,” an analysis by the University of Queensland found that his own tweets and those of other right-wing accounts appeared far more frequently in recommendations after Musk officially declared in July 2024 that he would support Donald Trump in the upcoming election. ${sourceLink( "en")}</p>
            ${figurePlaceholder(24, "en", "Placeholder for a depiction of algorithmic recommendations and platform power.")}
            <p>More generally, experiments repeatedly show that across platforms, users are by default recommended significantly more right-wing content than left-wing content. But that may also simply be because the political right usually has a better “social media game” and is especially good at producing the kind of content that performs well on these platforms. If, for example, one compares the ratio of social-media advertising budget to total reactions collected during the German federal election campaign of 2025, the AfD comes out with the best ratio, while the Greens would be the least efficient—although the Left Party also made up ground. ${sourceLink( "en")}</p>
            <p>Because people tend to be more receptive to messages that are not immediately recognizable as propaganda ${sourceLink( "en")}, but appear to come from “people like you and me,” not only official party accounts but also supposedly independent accounts are used on social media to multiply a message. A strategy long known outside social media as <span class="term">astroturfing</span>. ${sourceLink( "en")}</p>

            <h3>Political narratives inside entertainment</h3>
            <p>Related to this is the spread of political narratives through supposedly apolitical entertainment. That is not new either: books, films and video games have always conveyed a certain picture of the world, often unintentionally, but often also deliberately. Through social media, formats such as podcasts now also play a greater role—formats that do not primarily see themselves as political, but as entertainment. This supposed distance from politics, which hosts often even believe themselves, together with the intimate character of the medium, makes such formats effective tools for spreading narratives. Media Matters examined this phenomenon in the United States in 2024 and identified a strong dominance of right-leaning formats here as well: nine of the ten most-followed online formats with a discernible political orientation leaned to the right. ${sourceLink( "en")}</p>
            ${figurePlaceholder(25, "en", "Placeholder for a visualization of podcasts, entertainment and political influence.")}
            <p>Another striking detail: one third of these formats with a recognizable political orientation categorize themselves as apolitical, especially often—72% of the time—when they are in fact politically right-wing.</p>

            <h3>The German media landscape</h3>
            <p>Depending on whom you ask, the media in Germany are either clearly left-wing or clearly right-wing. ${sourceLink( "en")} Unsurprisingly, how one sees this depends primarily on where one stands oneself. For that reason, BiasScanner tries not to measure bias on the left-right spectrum but more concretely through the kind of language being used.</p>
            <p>Before 2019, Medienkompass once tried to summarize these positions through a large survey, according to the logic that if one half sees a medium as left-wing and the other half as right-wing, it probably corresponds to the middle of society. ${sourceLink( "en")} At the beginning of 2025, I combined that survey—which asked not only about political orientation but also about the perceived quality of journalism—with reach figures for various media outlets in order to get an overview of how the German media landscape as a whole might be classified. According to these figures, the overall picture is of a German media landscape that is politically center-right and not necessarily of especially high quality. By far the highest-circulation daily newspaper was BILD, which is famously as right-leaning as it is sensationalist. Its web offering was likewise the most visited online news portal, although here the gap to other sites such as the much more centrist and higher-quality Tagesschau and t-online—which was not included in the Medienkompass survey like some other newer media but is generally placed around the center to center-left—was not as large as in print. On television, public-service formats still led the field, while on YouTube a Springer brand once again came out on top in reach, namely Welt TV.</p>
            ${figurePlaceholder(26, "en", "Placeholder for an overview graphic of the German media landscape.")}
            <p>The big question remains: what can we do to at least try to inform ourselves as well as possible instead of allowing ourselves to be manipulated?</p>

          "practical-tips": () => `
            <h2>8. What can we do?</h2>
            <p>One approach we are trying with BiasScanner, as mentioned above, is based on <span class="term">inoculation theory</span>. The idea is to build up a certain resistance by confronting people with forms of bias and propaganda in a controlled setting. If, for example, you later recognize certain patterns that you have already seen while experimenting with BiasScanner, that can help you not be impressed by them.</p>
            <p>But we also want to encourage critical reflection and engagement with media more generally. Anyone who does not simply regard news as “the news,” but as something that can be analyzed, discussed and critically questioned with a certain distance, will probably not be influenced by it quite so easily.</p>
            <p>At the same time, it should be clear that none of us goes through life completely free of bias and able to see the world exactly as it is—and that is okay. What matters is that we are aware of this and still try, in good faith and to the best of our knowledge, to move somehow closer to “the truth.” Here are a few ideas worth keeping in mind:</p>

            <div class="info-box">
              <h4>Practical guiding principles</h4>

                <li>Always remember: the world shown in the media is not a direct copy of the real world, but a version that has passed through many filters.</li>

                <li>Allow yourself and others to change their minds. We are all wrong all the time, and that is okay. Far too often we hold on to something only because it is too difficult for our identity to admit—to ourselves and others—that we were wrong. We should therefore all work toward a social environment in which such an admission can happen without high social costs.</li>
                <li>Always ask yourself: does this news item want to inform me, or does it want to tell me what to think or feel? Where does this message come from, and why am I seeing it?</li>

                <li><span class="term">Transformers</span> capture context much better.</li>
                <li>BiasScanner uses <span class="term">GPT fine-tunes</span> to detect and explain bias.</li>
              </ul>
            </div>

            <p>The quality of the system depends heavily on the quality and diversity of the training dataset.</p>
          `,
          "bias-psychology": () => `
            <div class="compact-hint">Shorter version</div>
            <h2>3. No one is free from bias</h2>
            <p>When we think of a place like Paris, we immediately form images and assumptions based on films, news, social media, stories from others and our own experiences. Out of these fragments we build a simplified picture of the world.</p>
            <p>Walter Lippmann called this simplified picture the <span class="term">pseudo-environment</span>. It helps us navigate complexity, but it can also mislead us when it diverges too much from reality.</p>
            <p>Another key mechanism is <span class="term">motivated reasoning</span>: people often defend what already feels right instead of first reasoning their way toward a view. This becomes especially strong when identity, emotion or group loyalty are involved.</p>

            <div class="info-box">
              <h4>Why media matter here</h4>
              <ul class="clean-list">
                <li>We consume a lot of news in “autopilot mode” (<span class="term">System 1</span>).</li>
                <li>Manipulative wording often creates too little friction to trigger conscious checking.</li>
                <li>BiasScanner tries to create that friction.</li>
                <li><span class="term">Inoculation theory</span> suggests that recognizing manipulative patterns early can make people more resistant later.</li>
              </ul>
            </div>

            <p>The well-known inauguration-crowd example shows how strongly bias can even affect perception itself.</p>
          `,
          history: () => `
            <div class="compact-hint">Shorter version</div>
            <h2>4. Media bias is as old as media itself</h2>
            <p>Very early forms of “news” were never just neutral records. They often also glorified rulers, justified power or spread political narratives.</p>
            <p>The idea that journalism should be objective is historically quite recent and only became more formalized in the 19th and early 20th centuries.</p>
            <p>In the 20th century, totalitarian movements used radio, film and television to spread propaganda on a mass scale. In the 21st century, the internet—especially social media—has taken over much of that gatekeeping role.</p>
            <p>Today, algorithms often help decide which perspectives we even encounter at all.</p>
          `,
          causes: () => `
            <div class="compact-hint">Shorter version</div>
            <h2>5. Causes of bias in the media</h2>
            <p>Media bias has many causes. One major driver is <span class="term">audience demand</span>: people often prefer information that confirms what they already believe. Platforms and outlets respond to that because such content attracts attention and money.</p>
            <p>Other important factors include journalists’ social backgrounds, owners’ interests, commercial pressure, the wish to preserve access to sources, advertising and in some systems direct government pressure.</p>

            <div class="info-box">
              <h4>Main drivers</h4>
              <ul class="clean-list">
                <li>Confirmation sells well.</li>
                <li>Newsrooms are often not fully representative of society.</li>
                <li>Ownership can amplify political and economic interests.</li>
                <li>Accusations of bias can trigger overcorrection.</li>
                <li>Advertising and state pressure can shape reporting too.</li>
              </ul>
            </div>

            <p>From a democratic perspective, this is troubling because the actors with the most power often have the greatest ability to shape what gets heard.</p>
          `,
          effects: () => `
            <div class="compact-hint">Shorter version</div>
            <h2>6. How bias and propaganda work</h2>

            <h3>Persuasion</h3>
            <p>Propaganda can persuade people, especially when it builds on beliefs already in place. On strongly identity-linked issues, however, direct persuasion is often difficult.</p>

            <h3>Polarization</h3>
            <p>Bias deepens social divisions by confirming one side’s assumptions and hardening reactions on the other side. Often, that division is the real goal.</p>

            <h3>Cynicism</h3>
            <p>Some propaganda does not try to establish one truth, but to destroy trust in truth itself. If everything seems equally doubtful, power becomes easier to hold.</p>

            <h3>Intimidation</h3>
            <p>In dictatorships, absurd and obviously false propaganda can function as a display of power: being forced to publicly repeat a lie demonstrates domination.</p>

            <h3>Can there be good propaganda?</h3>
            <p>That leads to an uncomfortable question: may manipulative techniques ever be justified for good ends? BiasScanner does not answer that question, but aims to make such techniques visible.</p>
          `,
          "social-media": () => `
            <div class="compact-hint">Shorter version</div>
            <h2>7. Bias, propaganda and social media</h2>
            <p>On social media, the <span class="term">algorithm</span> has become the new gatekeeper. It tends to prioritize content that triggers emotion and engagement, which often means content that polarizes or confirms existing views.</p>
            <p>Owner interests, unofficial amplification accounts, <span class="term">astroturfing</span>, and political narratives embedded in supposedly non-political entertainment formats all add to the problem.</p>

            <div class="info-box">
              <h4>What social media changes</h4>
              <ul class="clean-list">
                <li>Algorithms help decide which perspectives are visible.</li>
                <li>Right-leaning content often performs especially strongly.</li>
                <li>Political messaging is frequently spread through “ordinary” or entertainment-style accounts.</li>
                <li>Perceptions of the media landscape differ sharply depending on one’s own political position.</li>
              </ul>
            </div>

            <p>BiasScanner therefore tries to assess bias more concretely through language patterns, not only through left-right labels.</p>
          `,
          "practical-tips": () => `
            <div class="compact-hint">Shorter version</div>
            <h2>8. What can we do?</h2>
            <p>No one is fully free from bias. That makes it all the more important to approach media with some distance instead of consuming it passively.</p>

            <div class="info-box">
              <h4>Practical guiding principles</h4>
              <ul class="checklist">
                <li>Remember that media always show a filtered version of reality.</li>
                <li>Do not believe something just because it fits your worldview.</li>
                <li>Allow yourself and others to change their minds.</li>
                <li>Ask whether a text wants to inform you or steer you.</li>
                <li>Take breaks—constant doomscrolling helps no one.</li>
                <li>Do not let yourself be incited against other people.</li>
                <li>Step back and ask which forms of bias are present in a text.</li>
              </ul>
            </div>
          `
        }
      }
    };

    const sectionKeys = [
      "definitions",
      "detection",
      "bias-psychology",
      "history",
      "causes",
      "effects",
      "social-media",
      "practical-tips"
    ];

    function getTranslation(key, lang) {
      return translations[key]?.[lang] ?? translations[key]?.en ?? "";
    }

    function getContent(lang, mode, key) {
      const value =
        content[lang]?.[mode]?.[key] ??
        content[lang]?.full?.[key] ??
        content.en?.[mode]?.[key] ??
        content.en?.full?.[key] ??
        "";
      return typeof value === "function" ? value() : value;
    }

    const languageSelect = document.getElementById("language-site");
    const compactToggle = document.getElementById("compact-toggle");
    const modeBadge = document.getElementById("mode-badge");
    const modeDescription = document.getElementById("mode-description");
    const progressBar = document.getElementById("progress-bar");

    const savedLanguage = localStorage.getItem("biasscanner-language");
    const savedMode = localStorage.getItem("biasscanner-mode");

    const state = {
      lang: savedLanguage && ["en", "de"].includes(savedLanguage) ? savedLanguage : "en",
      mode: savedMode === "compact" ? "compact" : "full"
    };

    languageSelect.value = state.lang;

    function renderUI() {
      document.documentElement.lang = state.lang;
      document.title = getTranslation("page.title", state.lang);

      document.querySelectorAll("[data-translate]").forEach((el) => {
        const key = el.getAttribute("data-translate");
        el.innerHTML = getTranslation(key, state.lang);
      });

      modeBadge.textContent = getTranslation(`main.mode.${state.mode}`, state.lang);
      modeDescription.textContent = getTranslation(`main.mode-description.${state.mode}`, state.lang);

      compactToggle.textContent = getTranslation(
        state.mode === "compact" ? "controls.compact.on" : "controls.compact.off",
        state.lang
      );
      compactToggle.classList.toggle("active", state.mode === "compact");
      compactToggle.setAttribute("aria-pressed", String(state.mode === "compact"));

      document.querySelectorAll("[data-section]").forEach((el) => {
        const key = el.getAttribute("data-section");
        el.innerHTML = getContent(state.lang, state.mode, key);
      });
    }

    function updateProgress() {
      const scrollTop = window.scrollY || document.documentElement.scrollTop;
      const scrollHeight = document.documentElement.scrollHeight - window.innerHeight;
      const progress = scrollHeight > 0 ? (scrollTop / scrollHeight) * 100 : 0;
      progressBar.style.width = `${Math.min(100, Math.max(0, progress))}%`;
    }

    function setupSectionObserver() {
      const navLinks = document.querySelectorAll(".toc a");
      const sections = document.querySelectorAll("section.content-section");

      const observer = new IntersectionObserver(
        (entries) => {
          entries.forEach((entry) => {
            if (entry.isIntersecting) {
              navLinks.forEach((link) => {
                link.classList.toggle(
                  "active",
                  link.getAttribute("data-nav") === entry.target.id
                );
              });
            }
          });
        },
        {
          root: null,
          rootMargin: "-26% 0px -58% 0px",
          threshold: 0.01
        }
      );

      sections.forEach((section) => observer.observe(section));
    }

    compactToggle.addEventListener("click", () => {
      state.mode = state.mode === "full" ? "compact" : "full";
      localStorage.setItem("biasscanner-mode", state.mode);
      renderUI();
    });

    languageSelect.addEventListener("change", () => {
      state.lang = languageSelect.value;
      localStorage.setItem("biasscanner-language", state.lang);
      renderUI();
    });

    window.addEventListener("scroll", updateProgress, { passive: true });
    window.addEventListener("resize", updateProgress);

    renderUI();
    updateProgress();
    setupSectionObserver();
  </script>
</body>
</html>
