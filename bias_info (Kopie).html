    <section id="what-can-we-do" class="article-section">
      <span class="kicker">Was tun?</span>
      <h2>Was können wir tun?</h2>

      <p>Die große Frage bleibt: Was können wir tun, um zumindest zu versuchen, uns bestmöglich zu informieren, anstatt uns manipulieren zu lassen?</p>

      <p>Ein Ansatz, den wir zum Beispiel mit BiasScanner versuchen, beruht wie oben erwähnt auf der <strong class="term">Inoculation Theory</strong>. Die Idee ist, durch Konfrontation mit Formen von Bias und Propaganda in einem kontrollierten Setting eine gewisse Resistenz aufzubauen. Wenn man beispielsweise später gewisse Muster, die man beim Spielen mit BiasScanner bereits schon einmal gesehen hat, wiedererkennt, kann das helfen, sich davon nicht beeindrucken zu lassen.</p>

      <p>Zum anderen wollen wir aber auch das kritische Nachdenken und die Auseinandersetzung mit Medien ganz grundsätzlich fördern. Wer die Nachrichten nicht einfach als „die Nachrichten“ betrachtet, sondern als etwas, das man mit einer gewissen Distanz analysieren, diskutieren und kritisch hinterfragen kann, der lässt sich davon wohl auch nicht so einfach beeinflussen.</p>

      <p>Dabei sollte klar sein, dass keiner von uns völlig ohne Bias durchs Leben geht und die Welt so sehen kann, wie sie ist – aber das ist okay. Wichtig ist, dass wir uns dessen bewusst sind und trotzdem versuchen, uns der „Wahrheit“ irgendwie nach bestem Wissen und Gewissen anzunähern. Hier sind ein paar Ideen, die wir dafür im Hinterkopf behalten können:</p>

      <div class="tip-box">
        <ul class="tip-list">
          <li>Immer daran denken: Die Welt, welche in den Medien gezeigt wird, ist keine direkte Abbildung der echten Welt, sondern eine Version, die durch viele Filter gelaufen ist.</li>
          <li>Seid skeptisch. Macht nicht den Fehler, etwas zu glauben, nur weil es in das eigene Weltbild passt.</li>
          <li>Erlaubt euch und anderen, die Meinung zu ändern. Wir alle irren uns ständig, und das ist okay. Viel zu häufig halten wir an etwas nur deswegen fest, weil es zu schwierig für die eigene Identität ist, uns und anderen einzugestehen, dass wir Unrecht hatten. Wir sollten uns also alle um ein gesellschaftliches Umfeld bemühen, in dem so ein Eingeständnis ohne hohe soziale Kosten passieren kann.</li>
          <li>Fragt euch immer: Will dieser Nachrichtenbeitrag mich informieren oder will er mir sagen, was ich zu denken oder zu fühlen habe? Woher kommt diese Nachricht und wieso bekomme ich sie zu sehen?</li>
          <li>Gönnt euch eine Pause. Ihr müsst nicht permanent up to date mit den neuesten Einzelheiten aller Krisen, Konflikte und Tragödien auf der Welt sein. Doomscrolling hilft niemandem – im Gegenteil.</li>
          <li>Lasst euch nicht gegen andere Menschen aufhetzen. Das hat noch nie zu etwas Gutem geführt. Erkennt solche Versuche und lasst euch nicht darauf ein.</li>
          <li>Distanziert euch von dem Nachrichtenbeitrag und schaut von außen darauf, ob und wie Arten von Bias darin vorkommen. Nutzt auch gerne BiasScanner zum ersten Einstieg 😉</li>
        </ul>
      </div>

    <section id="intro" class="article-section">
      <span class="kicker">Foundations</span>
      <h2>What is media bias?</h2>

      <p class="lead">Perhaps the most important thing right at the beginning: What exactly are we talking about when we talk about <strong class="term">media bias</strong>?</p>

      <p>In very general terms, <strong class="term">bias</strong> refers to a systematic distortion in the representation of reality. That can be the case, for example, when a career-advice chatbot suggests jobs like computer scientist or engineer to girls much less often, and jobs like educator or social worker to boys much less often, even though gender says very little about suitability. Or when we meet someone new and our brain, as a mental shortcut, instinctively relies on hasty judgments based on superficial characteristics in order to assess the other person. Or, in the media, when an event is not presented as fairly as possible and on the basis of facts, but when the reporting adopts or privileges a perspective that is not justified by the facts. That is the kind of <strong class="term">media bias</strong> that BiasScanner is trained to detect.</p>

      <p>You can think of bias as a filter that lies between reality and our perception. The world as we see it is not always the world as it really is. Since, in principle, every human being has such a filter, including journalists, their own perspectives and prejudices often slip into reporting unconsciously. So media bias is not always intentional; in fact, a very large share of bias in the media is probably created without manipulative intent. But there is also media bias that is used deliberately to manipulate and divide, and in that case we speak of <strong class="term">propaganda</strong>.</p>

      <p>Whereas in everyday language today we mainly mean politically motivated attempts at manipulation, it was actually the case until the middle of the 20th century that advertising, which at bottom is often nothing other than manipulation for economic reasons, was openly and neutrally described as propaganda. Because even if representatives of classical theories of economics or democratic theory sometimes claim the opposite, whether we support a particular political party or buy the smartphone of a particular brand, neither is simply an enlightened, rational decision based on the best arguments. In both cases, it is also about who “pushes our buttons best.”</p>

      <p>In fact, the probably most famous book by Edward Bernays, published in 1928, who is now regarded as one of the founders of <strong class="term">public relations</strong> (PR), appropriately bears the simple title <em>Propaganda</em>. <a href="#" class="source-link">Source</a></p>

      <p>Over the course of the 20th century, however, the reputation of the term “propaganda” became so negatively charged because of its massive, state-organized use in both World Wars and its connection with totalitarian ideologies that companies and advertisers eventually wanted to avoid any association with it.</p>

      <div class="definition-box">
        <p><strong>So we can define the terms as follows:</strong></p>
        <p><strong>Media bias:</strong> The tendency to report a news story, consciously or unconsciously, in a way that reinforces an already existing narrative instead of offering an objective representation of the facts.</p>
        <p><strong>Propaganda:</strong> The deliberate use of <strong class="term">(media) bias</strong> to manipulate public opinion.</p>
      </div>

    <section id="taxonomy" class="article-section">
      <span class="kicker">Structure</span>
      <h2>Bias on three levels and the taxonomy of bias types</h2>

      <p><strong class="term">Media bias</strong> can, in principle, appear on three levels:</p>

      <h3>Publication level</h3>
      <p>This refers to the overall bias of a medium, whether a newspaper, a TV channel, or a social-media page. What topics are covered at all, and how much? Which actual or supposed experts are regularly given a voice?</p>

      <h3>Article level</h3>
      <p>Here the focus is on the overall bias of an individual article or contribution: Which perspective on the topic is ultimately taken overall? Which narratives are supported, and which details are emphasized?</p>

      <h3>Sentence level</h3>
      <p>Which point of view is pushed in a single sentence or in a connected group of sentences, and how exactly does that happen?</p>

      <div class="info-box">
        <p><strong>Important for BiasScanner:</strong> BiasScanner is primarily trained to detect <strong>bias on the article and sentence level</strong>. The publication level matters too, but it requires a different form of analysis because it concerns patterns across many pieces rather than isolated formulations.</p>
      </div>

      <p>BiasScanner is explicitly trained to search for bias on the article and sentence level. To categorize the individual sentences the system finds, we gradually developed a <strong class="term">taxonomy</strong> of bias types. This taxonomy is based on a dataset of examples collected by us and by an early version of Scanner. At this point, another thank-you to everyone who used BiasScanner so diligently, and especially to those who used the feature to “donate” their bias report ;).</p>

      <p>We took inspiration from the periodic table of elements to structure our taxonomy of media-bias types. Like the periodic table, which began incomplete and evolved through new discoveries, our taxonomy is also meant to be expandable and to gradually offer a complete picture of all bias types on the sentence level.</p>

      <figure class="image-placeholder">
        <div class="image-box">Placeholder for image: taxonomy / “periodic table” of bias types</div>
        <figcaption>You can later insert your visualization of the bias taxonomy here.</figcaption>
      </figure>

      <p>The arrangement follows the model of the periodic table:</p>
      <ul class="tip-list">
        <li>Similar bias types are grouped together and highlighted by color.</li>
        <li>The placement of each group is based on the frequency of all bias types within that group in a sample from our dataset.</li>
        <li>The order within each group is determined by frequency.</li>
        <li>To keep groups visually connected, the order alternates in a zigzag pattern: odd rows run from left to right, even rows from right to left.</li>
        <li>For each type, one of five font sizes indicates absolute frequency.</li>
      </ul>

      <p>Detailed explanations of what characterizes each type and how exactly we developed the system of bias elements are available in our article. <a href="#" class="source-link">Source</a></p>
    </section>

    <section id="automation" class="article-section">
      <span class="kicker">Automated detection</span>
      <h2>From Lippmann to the Transformer</h2>

      <p>When the American journalist Walter Lippmann, together with his partner Charles Merz and with the help of his wife, conducted the first systematic investigation of bias in reporting in 1920 with <em>A Test of the News</em>, he analyzed the New York Times’ coverage of the October Revolution in Russia. <a href="#" class="source-link">Source</a></p>

      <p>This procedure was extremely labor-intensive: hundreds of articles had to be read and compared with other sources. The same effort would have had to be repeated from scratch for every new topic. At the same time, Lippmann stated: “News is not susceptible of mathematical statement.”</p>

      <p>And then, a few decades later, came the computer: In the 1954 Georgetown–IBM experiment, it was demonstrated publicly for the first time that a machine could process text by translating sentences from Russian into English. Leon Dostert, one of the scientists involved, noted: “The people responsible for this experiment consider it definitely established that meaning transfer by electronic translation is possible.” <a href="#" class="source-link">Source</a></p>

      <p>This marked the beginning of the electronic processing of language by computers, so-called <strong class="term">natural language processing</strong> (NLP). While Lippmann’s statement may still have applied in his own time, it now seemed possible that news really could be expressed mathematically after all.</p>

      <p>Because news consists of words, words consist of characters and <strong class="term">tokens</strong> (smaller units, similar to but not identical with syllables), and these characters and tokens can be represented by numbers. And with numbers, you can calculate and compare automatically.</p>

      <p>Early approaches to bias detection often tried to measure distortions by comparing an article with a reference point. For example, researchers counted how often certain think tanks or political groups were cited <a href="#" class="source-link">Source</a>, or how similar the language used in the article was to the language of speeches by selected politicians <a href="#" class="source-link">Source</a>. However, the need for a reference point severely limits transfer to new topics, because that reference has to be collected again for every new topic. A list of American think tanks and speeches by members of Congress is not necessarily useful if you want to detect the bias of a German-language newspaper.</p>

      <h3>Word embeddings</h3>

      <p>Another breakthrough in the “mathematization” of news, and of text in general, came with so-called <strong class="term">word embeddings</strong>: a method of representing words as <strong class="term">vectors</strong> (simplified: arrows with length and direction). Vectors of words with similar meaning point in similar directions, while the tips of vectors with very different meanings lie far apart.</p>

      <figure class="image-placeholder">
        <div class="image-box">Placeholder for image: visualization of word embeddings</div>
        <figcaption>You can insert a vector-based representation of word relationships here.</figcaption>
      </figure>

      <p>For graphic display of these vectors, a simplified three-dimensional projection is often used, because we humans live in a three-dimensional world and usually find higher dimensions hard to imagine. In practice, however, such vectors often have several hundred dimensions; in <strong>Word2Vec</strong>, one of the best-known formats, for example 300. <a href="#" class="source-link">Source</a></p>

      <p>Each of these dimensions can represent a certain “layer of meaning,” such as animals or motion, but is not always directly interpretable for humans; it can also represent relationships that are only detectable for the computer.</p>

      <p>These vectors are generated by automated statistical procedures that capture the contexts in which words frequently or less frequently occur together across large amounts of text.</p>

      <p>Once words are represented as vectors, we can use <strong class="term">vector arithmetic</strong> to gain information about the relationships between them. The cosine of the angle between two vectors, for example, tells us how similar two terms are in meaning. In Word2Vec, the cosine between <em>chimpanzee</em> and <em>gorilla</em> is about 0.61, whereas between <em>chimpanzee</em> and <em>bicycle</em> it is only around 0.15.</p>

      <figure class="image-placeholder">
        <div class="image-box">Placeholder for image: cosine similarity between word vectors</div>
        <figcaption>You can add a simple semantic-similarity graphic here.</figcaption>
      </figure>

      <p>It becomes especially interesting when you start adding and subtracting vectors. The sum of the vector for <em>princess</em> and <em>coronation</em>, for example, roughly yields the vector for <em>queen</em>. If you subtract <em>beer</em> from <em>munich</em>, you get <em>berlin</em>. And according to Word2Vec, <em>birds</em> are <em>animals</em> plus <em>feathers</em>, but minus <em>scales</em>.</p>

      <figure class="image-placeholder">
        <div class="image-box">Placeholder for image: vector addition and subtraction</div>
        <figcaption>You can insert an example of semantic vector arithmetic here.</figcaption>
      </figure>

      <h3>Machine learning, neural networks, and Transformers</h3>

      <p>When people talk about <strong class="term">AI</strong> today, what they mostly mean is machine learning. It differs from classical programming in that you do not manually tell the computer, “If this happens, then do that.” Instead, roughly speaking, you show the computer many examples of an input and the corresponding output, and it has to find its own way of getting there.</p>

      <p>The most common method for finding that path today is various forms of so-called <strong class="term">neural networks</strong>. These are models inspired by a highly simplified idea of how the human brain works. You program several layers of so-called neurons that are connected to one another. Each neuron stores a number that, amusingly enough, is also called a <em>bias</em>, and that determines when it passes on a signal it receives from another neuron. For every connection, it also stores so-called <strong class="term">weights</strong>, which determine how strongly a signal is passed on.</p>

      <p>At the beginning, all of these numbers are random. During training, the model is shown many examples according to the principle: for this input signal, for example the image of a cat, this output must come out, in this case classification as a cat. Then it is checked whether this would already work with the current numbers. If not, a mathematical procedure called <strong class="term">backpropagation</strong> adjusts these numbers so that they would lead to the correct result. If you do this not for one cat image but for many, the model eventually learns what generally makes a cat recognizable.</p>

      <figure class="image-placeholder">
        <div class="image-box">Placeholder for image: neural network / training / backpropagation</div>
        <figcaption>You can add a diagram of neural-network training here.</figcaption>
      </figure>

      <p>You can also train these models, with the help of the word embeddings described above, so that instead of saying which animal is visible in an image, they predict which next word comes in a text. Simple neural networks like the basic form described above quickly run into limits here, because they struggle to capture the relationship among all the words in a sentence and therefore often produce rather nonsensical suggestions. That is why there are special variants of this basic form tailored specifically to text, such as the <strong class="term">Transformer</strong>.</p>

      <p>The most important feature that helps the Transformer take the context of words in a sentence into account is the so-called <strong class="term">self-attention mechanism</strong>, a mathematical procedure in which, for each token, its relevance to every other token is calculated. This allows the model to understand longer texts as well.</p>

      <figure class="image-placeholder">
        <div class="image-box">Placeholder for image: self-attention in a Transformer</div>
        <figcaption>You can insert an illustration of self-attention here.</figcaption>
      </figure>

      <p>When these models become very large, with billions of parameters, and are trained on vast amounts of text, meaning billions to trillions of tokens, we speak of <strong class="term">large language models</strong> such as <strong>ChatGPT</strong>, <strong>LLaMA</strong>, or <strong>Mistral</strong>. These models learn to predict the most likely next token, token by token, with a certain element of randomness to create variation.</p>

      <figure class="image-placeholder">
        <div class="image-box">Placeholder for image: scale of large language models</div>
        <figcaption>You can add a graphic about model size, parameters, or training data here.</figcaption>
      </figure>

      <p>Alongside these generative Transformers, the so-called <strong class="term">Generative Pre-trained Transformers</strong> (the GPT in ChatGPT), there is also a second branch of the Transformer family: <strong class="term">encoder models</strong> such as <strong>BERT</strong>, which mainly understand and classify text rather than generate it. Their text understanding is often even a bit more precise, because they can consider the entire context of a sentence at once instead of processing it token by token in sequence.</p>

      <p>BiasScanner itself is based on GPT technology, because we also want to generate explanations for the detected types of bias and propaganda. More precisely, BiasScanner is based on so-called <strong class="term">fine-tunes</strong>. In other words, you take a model that has already been trained on a great deal of diverse text and therefore has a basic understanding of language, and then train it further for a specialized task, in our case the detection and explanation of bias and propaganda. ChatGPT itself, incidentally, is a fine-tune of the base GPT model, which was further trained to follow instructions.</p>

      <p>The most important thing for such training is a dataset with diverse examples that represent the problem well. In our case, that means a dataset containing many different examples of bias and propaganda, correctly classified and well explained. <a href="#" class="source-link">Source</a></p>

      <div class="info-box">
        <p><strong>How BiasScanner works in practice:</strong> a pre-trained language model is further trained on a specialized dataset of examples of <strong>bias</strong> and <strong>propaganda</strong>. This allows it not only to detect problematic passages, but also to explain which <strong>bias type</strong> is present and why.</p>
      </div>
    </section>

    <section id="psychology" class="article-section">
      <span class="kicker">Psychology</span>
      <h2>No one is free of bias</h2>

      <p>Let us imagine that someone tells us they are about to move to Paris. The moment we hear the name of the city, images appear in our mind’s eye. Some are surely romantic, such as the Eiffel Tower rising above the city, or Parisians carrying a baguette under their arm and wearing a beret as they walk past cafés in the cobbled streets of Montmartre. Other images may be less beautiful; some people think of hotels with bedbugs or sewage in the Seine. We ask ourselves what we know about the people of Paris: perhaps somewhere we heard that Parisians are arrogant, elsewhere that they are especially stylish.</p>

      <figure class="image-placeholder">
        <div class="image-box">Placeholder for image: associations with Paris</div>
        <figcaption>You can insert an illustrative collage or graphic about stereotypes and associations here.</figcaption>
      </figure>

      <p>Depending on which images arise in us, our reaction will be different. Are we happy for the person, or can we not understand at all why anyone would voluntarily want to live in such a city? Either way, the individual images in our head come together into an overall picture of Paris. But where do these images come from, and is Paris really just the sum of them?</p>

      <p>Some of us may have seen films like <em>Midnight in Paris</em> or series like <em>Emily in Paris</em>. Others may have had numerous reports about the city pushed into their social-media feed on the occasion of the 2024 Olympic Games. Perhaps we know someone who has been there, or we have visited the city ourselves. Depending on what we saw on screen, heard from others, or experienced ourselves, our image of Paris will differ. Did Hollywood show us a romantic version of Paris? <a href="#" class="source-link">Source</a> Did Russian disinformation campaigns deliberately exaggerate the bedbug issue ahead of the Games? <a href="#" class="source-link">Source</a> Was our acquaintance simply unlucky and happened to meet especially arrogant Parisians? Was the garbage collection on strike while they were there? Did we, by contrast, just get lucky and only meet the nicest Parisians? Did we have especially good timing and only spend time in the most beautiful corners?</p>

      <p>Paris is a city with millions of inhabitants and thousands of streets, all with their differences. And even today, it is already a little different from yesterday. That is the core problem of opinion formation: most things in the world are too complex, too confusing, and too constantly changing for any one person to fully grasp them. Our own experiences, if we even have them, are always only a slice of the whole. The information we receive second-hand, from acquaintances, the news, or social media, is also always only one aspect, one perspective, that has already passed through the filter of others.</p>

      <p>Out of all these fragments, we build a simplified model of the real world in our heads, the <strong class="term">“pseudo-environment”</strong>, as the journalist Walter Lippmann called it. <a href="#" class="source-link">Source</a> This pseudo-environment relies heavily on <strong class="term">stereotypes</strong>, strongly simplified, generalized assumptions and prejudices about the world. While today we use the word “stereotype” mainly for clichés about groups, Lippmann also meant general, heavily simplified assumptions about politics, economics, and society. One example is the still widespread idea that state finances basically work like those of a private household. <a href="#" class="source-link">Source</a></p>

      <figure class="image-placeholder">
        <div class="image-box">Placeholder for image: pseudo-environment / simplified world model</div>
        <figcaption>You can add a graphic about Lippmann’s “pseudo-environment” here.</figcaption>
      </figure>

      <p>In the best case, this pseudo-environment is a useful approximation of the real world, good enough to make meaningful decisions on its basis. In the worst case, a person’s worldview has very little to do with the real world, which causes problems when decisions are made for a world that does not actually exist. If two pseudo-environments are too different, that also makes conflict resolution and compromise more difficult. After all, it is hard to find a common path if people are using different maps. Lippmann wrote that people “live in the same world, but they think and feel in different ones.”</p>

      <p>On top of that, most people are firmly convinced that their opinion is not the result of stereotypes, prejudices, or second-hand perspectives. No, their own opinion is “common sense” or the result of “doing their own research.” “Ideologues” or manipulated “sheeple” are always the others.</p>

      <p>This is reflected not only in the speeches of various politicians but also in surveys in which a majority say they worry little about their own media having a bias, but do worry about the media that “most other people” consume. <a href="#" class="source-link">Source</a> Experiments at Yale University also show that support for exactly the same measure depends heavily on whether one’s own political side supports it or opposes it. At the same time, most participants were sure that not they themselves but only the other camp was so easily influenced. <a href="#" class="source-link">Source</a></p>

      <figure class="image-placeholder">
        <div class="image-box">Placeholder for image: bias in oneself vs. bias in others</div>
        <figcaption>You can add an infographic about the bias blind spot or motivated reasoning here.</figcaption>
      </figure>

      <p>The phenomenon behind this is called <strong class="term">motivated reasoning</strong>. We do not like admitting to ourselves or others that our opinion may not actually be the result of independent, rational reflection. It is now well established that we often use our reasoning mainly to explain positions that we primarily adopted because of bias after the fact and make them sound rational. Often we first “feel” an opinion and only afterwards look for an argument for it, not the other way around. That is why it can be so hard to convince someone with arguments: often they did not form their stance on the basis of arguments in the first place.</p>

      <p>This is especially the case when a topic has particular emotional or identity-related value for us. <a href="#" class="source-link">Source</a> Someone who sees Paris as just another city can still be measurably influenced by new information about it. But someone who has a special personal connection to Paris, whether positive or negative, or who sees Paris as a political symbol of something they deeply believe in, will be much less accessible.</p>

      <p>A conservative person from the countryside might, for example, see Paris as a symbol of a multicultural, left-liberal France that therefore must already be a lawless monster. At the same time, someone who longs for a car-free city but lives in a city that is still far from that may project their hopes and wishes uncritically onto Paris in light of the city’s recent efforts to become more pedestrian-friendly.</p>

      <h3>System 1 and System 2</h3>

      <p>In addition, we usually do not actively think about most of the information and stimuli that reach us every day. Most of the time we actually spend in a kind of autopilot, because active thinking is a demanding activity for our brain that it tries to avoid if possible. The cognitive psychologist Daniel Kahneman, who researched this topic extensively, called this autopilot <strong class="term">“System 1”</strong> and active thinking <strong class="term">“System 2”</strong>. <a href="#" class="source-link">Source</a> System 1 is much faster, and without the ability to automate many tasks that are actually complex once we have enough practice in them, we would be constantly overwhelmed in everyday life.</p>

      <p>Holding a conversation in a foreign language about our favorite movie while simultaneously driving a vehicle, for example, would be much harder if we constantly had to think actively about what this or that word means again, how this grammar works, which films we have actually seen in our life, how shifting gears works, and so on, instead of relying on learned routines and patterns.</p>

      <p>However, System 1 is also much more prone to error and reaches its limits when unexpected difficulties arise, for example when we cannot think of a word. In such situations, System 2 takes over again. In fact, there are experiments showing that with supposedly simple trick questions, using a hard-to-read font can force the activation of System 2 and thus lead to more correct answers than in an easy-to-read font, where people are more likely to rely on System 1.</p>

      <p>This is problematic for our media consumption insofar as it usually runs through System 1. Which headline we click, which opinion we find good or bad, which information we believe, which article we share—we usually do not consciously think about any of that, but act on autopilot. And because all of this happens without any directly perceptible friction for us, there is usually little reason for System 2 to become active and say something like: “Wait a minute, I broadly agree with this and the story interests me, but this headline is clearly trying to manipulate me—no thanks.”</p>

      <div class="info-box">
        <p><strong>Core idea:</strong> if media consumption mostly runs through <strong>System 1</strong>, then conscious friction is needed so that <strong>System 2</strong> becomes active. This is exactly where BiasScanner comes in by making manipulative patterns visible inside the text.</p>
      </div>

      <p>This is where BiasScanner comes in, by consciously highlighting the techniques behind media bias and propaganda while an article is being read in order to create the friction that System 2 needs. In doing so, we also draw on <strong class="term">inoculation theory</strong>. This theory suggests that attitudes can be made resistant to persuasion attempts in a way similar to how medical vaccinations make the body resistant to disease. <a href="#" class="source-link">Source</a></p>

      <p>Just as a vaccine introduces a weakened form of a virus to stimulate the immune system and build defenses against stronger attacks, the theory assumes that exposing people to weakened forms of opposing arguments together with rebuttals strengthens their ability to resist more persuasive challenges in the future. Existing research suggests that this method may be more effective than pure fact-checking, especially if people engage not just once but regularly and actively with media bias and propaganda while reading the news. <a href="#" class="source-link">Source</a></p>

      <div class="quote-box">
        <p>In his book <strong>1984</strong>, George Orwell wrote about the fictional totalitarian state of Oceania: “The Party told you to reject the evidence of your eyes and ears. It was their final, most essential command.” <a href="#" class="source-link">Source</a></p>
      </div>

      <p>That is not mere exaggeration to emphasize the totalitarian ambition of propaganda. Taken to its conclusion, bias can really go so far that we cannot or do not want to believe our own eyes when what we see contradicts the world in our heads.</p>

      <p>Let us look at the two images below and ask ourselves: In which image are more people visible, left or right?</p>

      <figure class="image-placeholder">
        <div class="image-box">Placeholder for image: Obama 2009 vs. Trump 2017 inaugurations</div>
        <figcaption>You can later insert the two comparison images here.</figcaption>
      </figure>

      <p>For most of us, the answer will seem obvious: right, of course. Older readers may immediately recognize what the images show, because the issue was big in the media at the time. They show the inauguration of US President Donald Trump in 2017 (right) and that of his predecessor Barack Obama in 2009 (left). Trump and his government falsely insisted that Trump’s inauguration had more attendees than Obama’s, a view many Republican supporters adopted.</p>

      <p>In one experiment, both groups were actually shown both images a few months after the election, without being told which president appeared in them. <a href="#" class="source-link">Source</a> Participants were asked in which picture more people could be seen. Among those who had voted Democratic in 2016, 2% chose the left image. Among Trump voters, it was 15%. It becomes even more interesting when one looks at which Trump voters were especially likely to choose the obviously wrong image. They were mainly those who saw themselves as strong supporters and at the same time followed enough political news to know that the left image showed the inauguration of “their” president. Here the share of those who said the left picture showed more people rose to 26%.</p>

      <p>Whether they really saw more people there or simply did not want to admit the truth out of loyalty to Trump cannot be said. But by now there are experiments with brain scanners that suggest strong bias can actually influence the regions of our brain responsible, for example, for spatial perception. <a href="#" class="source-link">Source</a> So it is entirely possible that some Trump voters, once they recognize the image and therefore the answer that fits their worldview, really believe they see more people in the left picture than in the right one. Because for our brain, sometimes what must not be true simply cannot be true.</p>
    </section>

    <section id="history" class="article-section">
      <span class="kicker">History</span>
      <h2>Bias is as old as media itself</h2>

      <p><strong class="term">Media bias</strong> is as old as media itself. Ever since humanity began documenting significant events, these records have been shaped by the subjective experiences and perspectives of their creators, as well as by the social context in which they lived.</p>

      <p>The Victory Stele of Naram-Sin, produced in the 23rd century BCE and considered one of the earliest known artifacts that can be viewed as a news report, contains a combination of carved images and cuneiform that not only describes but also praises the victory of the Akkadian king Naram-Sin over the Lullubi people. <a href="#" class="source-link">Source</a></p>

      <figure class="image-placeholder">
        <div class="image-box">Placeholder for image: Victory Stele of Naram-Sin</div>
        <figcaption>You can insert a historical image or illustration of the stele here.</figcaption>
      </figure>

      <p>The Sumerian King List, a collection of writings from the 21st century BCE listing Sumerian kings, the cities they ruled, and the lengths of their reigns—often unrealistically long spans such as 1,500 years—is now primarily regarded as a work commissioned by rulers to legitimize their claim to power by promoting the notion that there had always been a single city in which kingship was exercised. <a href="#" class="source-link">Source</a></p>

      <figure class="image-placeholder">
        <div class="image-box">Placeholder for image: Sumerian King List</div>
        <figcaption>You can add an image or photo of the king list here.</figcaption>
      </figure>

      <p>The Acta Diurna, widely regarded as one of the earliest forms of a public newspaper and circulated between 59 BCE and 235 CE, was published by the Roman government to inform the public about important events as the government wanted them to be seen. Incidentally, these reports allegedly ended with the phrase “publicare et propagare,” already hinting at the relationship between media and the later-coined term propaganda. <a href="#" class="source-link">Source</a></p>

      <p>For most of history, news media served less to inform the public as well as possible than as a communication channel from the rulers of a society to the different groups beneath them.</p>

      <p>This did not change immediately when the first modern newspapers appeared in the 17th century. Even if it was no longer the government directly passing information to its subjects, censorship, limited access to unbiased information sources, and often close ties to interest groups generally meant that the new privately owned newspapers did not make much effort to be objective and unbiased.</p>

      <p>In fact, the very idea that journalism could and should be objective and unbiased in any meaningful sense is a relatively recent invention that emerged in the mid to late 19th century, partly because of the business interests of news agencies. In a speech before the US Congress in 1856, Lawrence Gobright, head of the <em>Associated Press</em> in Washington, said that AP’s task was to convey facts without commenting on them, so that the newspapers, the agencies’ actual customers, could then “make their own comments on the facts transmitted to them.” <a href="#" class="source-link">Source</a></p>

      <p>A deeper discussion of the media and its influence on public opinion began at the start of the 20th century, heavily influenced by the obvious success of large-scale propaganda efforts during the First World War. Walter Lippmann and Edward Bernays, who would later write two of the most influential books in this field, both worked for the Committee on Public Information, a US government agency created after the country entered the First World War in order to shape public opinion in favor of the war.</p>

      <p>Lippmann wrote the book <em>Public Opinion</em> in 1922, which is regarded as a foundational work on how public opinion in a society is shaped and distorted by the limited human ability to process, represent, and communicate the real world. <a href="#" class="source-link">Source</a> He argued that this limitation forces people to rely on a shortened mental picture of reality, with major consequences for democracy.</p>

      <p>While ideas of objectivity and fairness were now being formalized in journalism for the first time, for example in the earliest ethical codes adopted by journalists’ associations, such as the <em>Canons of Journalism</em> of the American Society of Newspaper Editors from 1923 <a href="#" class="source-link">Source</a>, totalitarian ideologies such as fascism and Stalinism were simultaneously taking propaganda to a new level that encompassed all areas of society. New technologies such as radio, film, and television increasingly came into play.</p>

      <p>Just as the invention of the printing press in the 16th century made the rapid spread of Luther’s theses and those of other reformers possible through pamphlets and caricatures aimed at a mass audience, these new media also quickly proved central to the spread of propaganda in the 20th century.</p>

      <figure class="image-placeholder">
        <div class="image-box">Placeholder for image: printing press / radio / film / television / propaganda</div>
        <figcaption>You can insert a historical montage of media technologies and propaganda here.</figcaption>
      </figure>

      <p>In the 21st century, this role is increasingly being taken over by the internet, and especially by <strong class="term">social media</strong>, which can hardly be separated from today’s information landscape. Human beings in the 21st century are probably flooded daily with more information, more or less deserving of the title “news,” than ever before in human history. Meanwhile, traditional media companies are steadily losing relevance and interpretive authority; they are on their way to becoming just one voice among many. <a href="#" class="source-link">Source</a></p>

      <p>Instead of media companies deciding which topics and perspectives we are informed about, and us being able, at least in theory, to decide whether to read this or that newspaper or watch this or that channel, today the <strong class="term">algorithm</strong> decides whether we even get to see the perspectives of those media outlets at all. The confirmation of our existing opinion is no longer something we actively have to seek out; it is passively served to us.</p>

      <figure class="image-placeholder">
        <div class="image-box">Placeholder for image: algorithmic feed / social-media gatekeeping</div>
        <figcaption>You can add a visualization of platform feeds or recommendation algorithms here.</figcaption>
      </figure>

      <p>While false reports themselves are nothing new, and in the past images, documents, and reports were already being forged, the rise of generative AI now enables an entirely new speed and scale in the creation and distribution of such content. What effect this will have on opinion formation over the course of the 21st century remains to be seen.</p>
    </section>

    <section id="causes" class="article-section">
      <span class="kicker">Causes</span>
      <h2>Why does bias emerge in the media?</h2>

      <p>There are various causes of bias in the media. In a market economy, <strong class="term">audience demand</strong> is an important driver: people often prefer news that confirms their own worldview. That creates a market for media that caters to exactly this bias, and there is little incentive to challenge these views. <a href="#" class="source-link">Source</a></p>

      <p><strong class="term">Filter bubbles</strong> in social media work similarly: algorithms primarily show users content that fits their existing opinions. As described above, this demand is often tied to the desire to avoid cognitive effort. <a href="#" class="source-link">Source</a> Contradictory opinions or facts can trigger stress, especially if they call one’s own identity or beliefs into question.</p>

      <p>While our brain tries hard to avoid this kind of stress, studies and experiments paradoxically show a clear preference for negatively framed headlines and articles about negative events, even though anyone who has ever been doomscrolling probably knows that this does not make us feel better. <a href="#" class="source-link">Source</a> One theory says this has to do with evolutionary biology. <a href="#" class="source-link">Source</a> In the past, when the human environment was actually full of threats such as wild animals, it was advantageous to engage with those dangers rather than ignore them. But the world has changed dramatically since then. Our brains were never designed to be flooded every day in real time with information about every catastrophe, whether or not it affects us directly or whether or not we can influence it.</p>

      <p>The relationship between media bias and the bias of its audience can be described as a <strong class="term">“chicken-and-egg” situation</strong>, because the views of the audience that want to be confirmed do not arise spontaneously but are themselves shaped in the context of mass-media influence. Media are not simply “victims” of the bias of their audience; they actively help shape it, sometimes intentionally, sometimes unintentionally.</p>

      <p>This happens, for example, through the personal background of the journalists who work in media organizations and often do not constitute a representative subset of the population. Compared with the general population, German journalists, for example, more often come from academic families and less often have a migration background, which is then reflected in the selection of topics and perspectives. <a href="#" class="source-link">Source</a></p>

      <p>The <strong class="term">agenda of owners</strong> can also play a major role: many media outlets are, for example, owned by billionaires for whom a media empire can be not only a lucrative source of income but also a way of using enormous financial resources to influence society in their preferred direction. <a href="#" class="source-link">Source</a></p>

      <figure class="image-placeholder">
        <div class="image-box">Placeholder for image: media ownership / concentration of power</div>
        <figcaption>You can insert a graphic about media ownership and influence structures here.</figcaption>
      </figure>

      <p>Interestingly, there is an apparent contradiction between journalists and media owners: while journalists are on average slightly left-leaning politically <a href="#" class="source-link">Source</a>, the owners of the most far-reaching media, as wealthy individuals, usually have an interest in agitating against left-wing positions such as higher taxation of wealth. Instead, they tend to promote right-wing or liberal voices whose policies generally offer greater advantages to the wealthy. <a href="#" class="source-link">Source</a></p>

      <p>One example is Mathias Döpfner, CEO and owner of the Axel Springer publishing group, which includes <em>Bild</em>, <em>Welt</em>, and <em>Politico</em>. During the 2021 German federal election campaign, he instructed then editor-in-chief Julian Reichelt in a later leaked text message to “strengthen” the FDP so that it could appear as self-confident as possible in the emerging traffic-light coalition. <a href="#" class="source-link">Source</a></p>

      <p>Of course, in practice there is a certain amount of selection: journalists are more likely to seek employment at outlets that match their political orientation, and media outlets prefer journalists who “fit the brand.” <a href="#" class="source-link">Source</a> In addition, not all media are owned privately by wealthy individuals; some are organized cooperatively or as public broadcasters.</p>

      <p>At the same time, journalists who take their profession seriously do try, to the best of their knowledge and conscience, to remain fair. Not all private owners directly interfere in editorial decisions. Ultimately, the political orientation of journalists is mainly relevant for media that already have a clear slant. <a href="#" class="source-link">Source</a> In media that are seriously committed to objectivity, it recedes much more into the background.</p>

      <p>In authoritarian states, by contrast, the influence of private ownership and convictions gives way to the officially prescribed line of the government.</p>

      <p>The relationship among all these factors can be quite complex. Fox News’ initial decision to confirm Joe Biden’s victory in the 2020 US election, for example, led to a loss of viewers who, possibly also because Fox News had repeatedly aired stories before the election warning of alleged Democratic voter fraud, turned to broadcasters that spread the false but in-demand narrative that the election had been manipulated. <a href="#" class="source-link">Source</a> In the end, Fox News gave in to market pressure and also spread false claims about the security of voting machines. The broadcaster was then sued for defamation and had to make a substantial payment as part of a settlement.</p>

      <figure class="image-placeholder">
        <div class="image-box">Placeholder for image: Fox News / election narratives / market pressure</div>
        <figcaption>You can add a matching graphic or screenshot collage here.</figcaption>
      </figure>

      <p>Alongside these factors, the desire to remain in the good graces of the subjects of reporting has also proven to be relevant. Journalists may not want to lose access to interview partners by appearing too critical, or they may develop personal sympathies through repeated contact. <a href="#" class="source-link">Source</a></p>

      <p>It has also been shown that accusing journalists of being biased on a topic, whether justified or not, can actually lead them to overcorrect and consciously adopt narratives from the side from which the criticism comes in order to supposedly prove their neutrality. <a href="#" class="source-link">Source</a></p>

      <p>For example, German media had for a long time generally refrained—except in special cases—from naming the origin of criminal suspects in their reporting, which after the assaults in Cologne on New Year’s Eve 2015 led to accusations that they were deliberately concealing the migrant background of the perpetrators. In response, German media began to mention origin more often, according to a 2025 evaluation in every third newspaper report and every fourth TV report on violent crime. <a href="#" class="source-link">Source</a></p>

      <p>But they do not mention origin more often across the board; they do so above all when the origin is foreign. In TV reports, foreigners are mentioned in 95% of cases when origin is addressed. In newspaper reports, it is 91%. In the current crime statistics, about 34% of suspects are foreigners; that means that if origin is mentioned, reporting on violent crime features almost only foreigners, even though in reality they make up only about a third of suspects.</p>

      <figure class="image-placeholder">
        <div class="image-box">Placeholder for image: statistical distortion in mentions of origin</div>
        <figcaption>You can insert a chart comparing statistics and media coverage here.</figcaption>
      </figure>

      <p><strong class="term">Advertising</strong>, which can itself be regarded as a form of propaganda, is an interesting case because companies and organizations are both potential customers for advertising space in a medium and potential subjects of coverage. Indeed, it has been shown that newspapers tend to report more positively about advertising partners, even beyond the actual paid advertisement, since after all one does not want to scare customers away with an overly critical tone. <a href="#" class="source-link">Source</a></p>

      <p>Beyond that, advertising can also give a medium an incentive to hold back on radical, extremist, or simply potentially controversial content, because advertisers often want to avoid being associated with such content. <a href="#" class="source-link">Source</a></p>

      <p>Apart from private actors, states and governments also sometimes use advertising as a means of pressuring media into more favorable coverage, especially in more or less functioning democracies where direct coercive tools and state violence are limited. <a href="#" class="source-link">Source</a></p>

      <p>Depending on the degree of authority and the strength of independent institutions, governments in such systems can influence media in other ways too, including withholding or allocating direct funds or applying censorship, either directly enforced or through a culture of self-censorship created by legal or violent pressure on journalists and media outlets. And such means are not available only to the state. If a government is unwilling or unable to protect media workers from threats by non-state actors such as terrorist groups, criminal organizations, or powerful companies, these actors can also exert pressure accordingly. <a href="#" class="source-link">Source</a></p>

      <div class="info-box">
        <p>In a liberal democracy based on the ideal of a well-informed citizenry that considers diverse perspectives, responds to fact-based argument when forming political opinions, and remains willing to compromise with those who reach different conclusions, these findings are sobering.</p>
        <p>This concern becomes even greater when one looks at the drivers of media bias. If the influence of mass media is real, and the actors most capable of shaping that influence are those who already possess considerable power—including governments, influential political organizations, corporations, or wealthy individuals—the result directly undermines another democratic ideal: the principle that everyone should have the same opportunity to make their voice heard and advocate for their position.</p>
      </div>
    </section>

    <section id="effects" class="article-section">
      <span class="kicker">Effects</span>
      <h2>How bias and propaganda work</h2>

      <p>In principle, bias and propaganda operate on three levels: on the level of <strong class="term">persuasion</strong>, on the level of <strong class="term">polarization</strong>, and on the level of <strong class="term">cynicism</strong>.</p>

      <h3>Persuasion</h3>

      <p>First, there is propaganda as it is often imagined: with the primary goal of persuading its audience of a specific message. The bias types described here can indeed be a suitable means for that. However, it is not at all easy to truly convince someone of something through mere communication, especially not when the topic is very important to that person, when they hold a strong opinion, and when they believe they know a great deal about it. <a href="#" class="source-link">Source</a></p>

      <p>Research shows that new beliefs are formed mainly on topics that the recipient more or less does not care about and that do not affect them on a personal level. Most people quickly accept that Thomas Edison did not invent the light bulb—he actually improved an existing invention and brought it to the mass market—even if they previously believed the opposite. With topics such as migration, welfare, security, or tax policy, however, meaning issues that are politically charged, things look very different. <a href="#" class="source-link">Source</a></p>

      <p>Because these topics are so politicized, they are too closely tied to one’s identity. Admitting to oneself or others that one might be wrong even on one point threatens one’s whole picture of the world and one’s place in it, something people try to avoid if possible.</p>

      <p>A persuasive message is therefore often above all one that connects to beliefs that already exist and is perceived as their continuation—not as a contradiction. A contradiction can even produce the so-called <strong class="term">backfire effect</strong>: when people are confronted with a position that opposes their beliefs, even if it is highly logical and well argued, they often entrench themselves even further as a defensive reaction. <a href="#" class="source-link">Source</a></p>

      <figure class="image-placeholder">
        <div class="image-box">Placeholder for image: backfire effect / reactance</div>
        <figcaption>You can insert a simple illustration of the backfire effect or reactance here.</figcaption>
      </figure>

      <p>More generally, media are much more effective at setting the topics that matter in public discourse than at directly shaping people’s opinions on those topics. Even though state media in autocracies, because there is no competition from contradictory perspectives, may have an advantage here. <a href="#" class="source-link">Source</a> Since certain topics are strongly associated among the public with certain parties—the so-called <strong class="term">topic ownership</strong> <a href="#" class="source-link">Source</a>—and those parties benefit especially from discussion of “their” issue, media can nevertheless exert a strong indirect influence.</p>

      <p>Such an influence on election results has, for example, been empirically demonstrated for American Fox News: wherever the conservative broadcaster launched and found an audience, Republicans measurably benefited. <a href="#" class="source-link">Source</a></p>

      <h3>Polarization</h3>

      <p>If bias and propaganda operate in both directions of existing beliefs, either by confirming them through their content or by provoking a defensive hardening through contradiction, the expected outcome is an intensification of social divides and lines of conflict. This is a result that studies repeatedly demonstrate. <a href="#" class="source-link">Source</a></p>

      <p>If a topic is already polarizing enough, the reporting on it does not even have to be especially divisive itself. Even good, fact-based, fair journalism can further fuel division simply by increasing attention to the issue. <a href="#" class="source-link">Source</a></p>

      <p>However, it would be wrong to see this politicization only as a by-product of persuasion attempts. Often, this very division is the goal. “Divide et impera,” divide and rule, as the saying already had it in antiquity. It is well documented how Russian propaganda campaigns in the US produced and spread both pro- and anti-Black-Lives-Matter content. <a href="#" class="source-link">Source</a> In some cases, pro and anti events in the same city were promoted at the same time in order to create confrontation.</p>

      <figure class="image-placeholder">
        <div class="image-box">Placeholder for image: polarization / divide et impera / BLM campaigns</div>
        <figcaption>You can add a visualization of polarizing narratives here.</figcaption>
      </figure>

      <p>Of course, this strategy is not used only between states in “information war.” Within a society, too, it can benefit those in power if groups that would actually have an interest in showing solidarity with one another instead turn against each other.</p>

      <p>Analyses of political advertising campaigns in the US show, for example, that Republicans, especially in areas hard hit by the outsourcing of jobs in the context of growing globalization, emphasized in their voter outreach those issues that mattered to the identity of many white workers in those regions who were now often unemployed: gun ownership, abortion, conservative values in general, and opposition to immigration. <a href="#" class="source-link">Source</a></p>

      <p>Economic issues such as taxes, trade, or the welfare state moved into the background. These topics, by contrast, were emphasized more strongly by Democrats. The Republican strategy can thus be understood as an attempt, in the face of a deteriorating economic situation, to prevent their voters from turning to Democrats, whose economic and social policies might actually have benefited them more. Instead, they emphasized what distinguished these voters from Democrats at the level of identity in order to keep them on board.</p>

      <p>In its most extreme form, the function of propaganda may be the most harmful. The author Aldous Huxley once wrote: “The propagandist’s purpose is to make one set of people forget that certain other sets of people are human.” <a href="#" class="source-link">Source</a> This <strong class="term">dehumanization</strong> of the supposed enemy is what makes the worst forms of organized violence of which humanity is capable possible in the first place. No war and no genocide would be conceivable if it were not possible to make people forget the humanity of those who do not belong to “their” group. <a href="#" class="source-link">Source</a></p>

      <h3>Cynicism</h3>

      <p>Sometimes propaganda does not even try to spread an alleged truth. Instead, the goal can also be to dissolve the very concept of <strong class="term">truth</strong>. <a href="#" class="source-link">Source</a> One day one version of events is pushed, the next day a completely different one. By the time one lie is corrected, two new ones are already in circulation. Faced with this flood, truth soon appears to be just one story among many. “You hear so much—who even knows what is really true? They all lie anyway.”</p>

      <figure class="image-placeholder">
        <div class="image-box">Placeholder for image: information overload / erosion of truth</div>
        <figcaption>You can insert a visualization of the “firehose of falsehood” or cynicism here.</figcaption>
      </figure>

      <p>For a regime or movement for which power matters more than any actual conviction, this kind of propaganda can be even more useful. Whoever no longer believes in any truth can no longer become disillusioned and turn away from “their” truth either.</p>

      <p>A propaganda that no longer cares about truth is therefore not especially disturbed by a fact-check either. In fact, Russian foreign propaganda, in the context of “Operation Overload,” repeatedly contacted fact-checking organizations on purpose and posed as “concerned citizens” who wanted one or another false report to be checked. <a href="#" class="source-link">Source</a> After all, far more people see a correction than the original lie.</p>

      <p>By now there is research showing that even a successful fact-check—that is, one after which people know what is true and what is false—still cannot prevent the lie from having some effect on beliefs. <a href="#" class="source-link">Source</a></p>

      <h3>Intimidation</h3>

      <p>From the outside, propaganda in many dictatorships often appears simply absurd and laughable: giant golden statues, embarrassing songs of praise, and elections supposedly won with 99% of the vote. This absurdity is, of course, partly just the result of the narcissism of violent rulers who have long since lost touch with reality. But there is also a system behind it: publicly proclaiming a lie so absurd and stupid that everyone immediately recognizes it as such, while simultaneously forcing everyone to publicly participate in it, is a demonstration of power. Resistance against a government that can force an entire society to “sing the lie” often appears pointless. <a href="#" class="source-link">Source</a></p>

      <figure class="image-placeholder">
        <div class="image-box">Placeholder for image: absurd propaganda / cult of personality / intimidation</div>
        <figcaption>You can add a graphic or montage about cults of personality and propaganda spectacle here.</figcaption>
      </figure>

      <p>Dictatorships often try, for example through networks of informants, to guarantee that this lie extends even into private life, until everyone begins to wonder whether they are not alone in their opposition. But history has shown that the private sphere is ultimately much harder to control than the public one. In private, true convictions hibernate, waiting for cracks in the façade, and once the façade breaks, everything can move very quickly—like in the story of “The Emperor’s New Clothes.” <a href="#" class="source-link">Source</a></p>

      <p>Historically, Nicolae Ceaușescu’s final public speech can be understood as symbolic of this dynamic. The Romanian dictator cultivated an extreme cult of personality, had himself celebrated as the “Genius of the Carpathians,” and staged mass rallies with tens of thousands of cheering supporters. In his final speech, meant to demonstrate strength in the face of the protests in Timișoara, he spoke before around 100,000 bussed-in spectators. When isolated boos suddenly arose and quickly spread across the square like an avalanche, Ceaușescu faltered, the TV transmission broke off, and what had been intended as a show of power became mass protests that led to his downfall only days later. <a href="#" class="source-link">Source</a></p>

      <p>In fact, it is especially dictatorships that otherwise make no effort at all even to preserve the appearance of democracy that rely on such absurd propaganda. According to one analysis of propaganda from different autocracies, the typical state media in autocracies that preserve some elements of democratic legitimacy, such as elections—which are of course anything but free and fair—roughly correspond, in their level of bias, to “Fox News.” <a href="#" class="source-link">Source</a> That is, to a channel that is clearly extremely partisan and not above spreading obvious propaganda, but propaganda that viewers are still actually meant to believe. Media in totalitarian states, however, are according to that analysis around four times more partisan, to a level that can slide into the absurd.</p>

      <p>The nature of a regime’s economy can also shape the type of propaganda and bias it uses: autocratic governments whose income comes primarily from the sale of natural resources such as oil tend to control every form of critical reporting even more strictly than less resource-rich dictatorships. <a href="#" class="source-link">Source</a> The most common theory explains this by arguing that dictatorships that cannot simply finance themselves through a single resource depend more strongly on the bureaucracy functioning reasonably well and therefore have some interest in cases of corruption, for example, being uncoverable through the media.</p>

      <h3>Can there be good propaganda?</h3>

      <p>If bias and propaganda fundamentally work, then of course the basic question arises whether there can be such a thing as <strong class="term">good propaganda</strong>. That is, communication that, instead of trying to persuade in the spirit of enlightenment through rational argument and facts, consciously uses the techniques discussed here in order to advance goals that an enlightened society would generally describe as “good.”</p>

      <p>Of course, what is “good” always remains subjective to some degree, and the discussion would go too far here. But if one truly has a cause that deserves that label, would it then be a mistake to refuse to use these effective methods and thereby risk the success of the cause? Or is such a form of manipulative communication already a mistake in itself—whether for principled ethical reasons or because one considers the normalization of these methods too dangerous?</p>

      <p>In fact, propaganda can spread not only disinformation, bring extremists to power, and divide a society, but can also help improve public health <a href="#" class="source-link">Source</a>, slow the rise of extremists <a href="#" class="source-link">Source</a>, and emphasize common ground. <a href="#" class="source-link">Source</a></p>

      <p>Edward Bernays, already mentioned above, once wrote: “The only difference between ‘propaganda’ and ‘education,’ really, is in the point of view. The advocacy of what we believe in is education. The advocacy of what we do not believe in is propaganda.” And: “Propaganda will never die out. Intelligent men must realize that propaganda is the modern instrument by which they can fight for productive ends and help to bring order out of chaos.” <a href="#" class="source-link">Source</a></p>

      <figure class="image-placeholder">
        <div class="image-box">Placeholder for image: ethical question of “good propaganda”</div>
        <figcaption>You can add a visual contrast between enlightenment and manipulation here.</figcaption>
      </figure>

      <p>Most of the other authors cited here, from Lippmann to Huxley to Orwell, view this much more critically. Who is ultimately right is not something BiasScanner can answer, even though I of course have my own personal opinion about it. Our goal is to draw attention to the topic and help users recognize and understand bias and propaganda, and to enable them to decide for themselves how they want to deal with it.</p>
    </section>

    <section id="social-media" class="article-section">
      <span class="kicker">Digital present</span>
      <h2>Bias, propaganda, and social media</h2>

      <p>As mentioned above, in the 21st century the role of the “gatekeeper” between us and the news is increasingly shifting away from traditional media and toward <strong class="term">social media</strong> in particular. Here the <strong class="term">algorithm</strong> enters the picture as a new, automated source of bias.</p>

      <p>The familiar factors also play a role in how the algorithm is designed: first, the market-based interplay of supply and demand. Social-media platforms have an interest in keeping users on the platform as long as possible so that as much paid advertising as possible can be shown to them. Therefore, content with which users interact especially strongly is prioritized—and, as with traditional media, those are emotionalizing contents and those that confirm the user’s worldview. <a href="#" class="source-link">Source</a></p>

      <p>Then there is the agenda of the owners, who even more often than in traditional media are billionaires. It is not always possible to trace how much active intervention occurs on the basis of political agenda, but in the case of Elon Musk and “Twitter,” now “X,” for example, an analysis by the Queensland University found that his own tweets and those of other right-wing accounts appeared much more frequently in recommendations after Elon Musk officially declared in July 2024 that he supported Donald Trump in the coming election. <a href="#" class="source-link">Source</a></p>

      <figure class="image-placeholder">
        <div class="image-box">Placeholder for image: social-media recommendations / platform bias / X</div>
        <figcaption>You can insert a platform graphic or a visualization of recommendation structures here.</figcaption>
      </figure>

      <p>More generally, experiments repeatedly show that by default, users across platforms are recommended far more right-wing content than left-wing content. But that may also simply be because the political right generally has a better “social media game” and is especially good at producing the kinds of content that perform well on these platforms. If one compares, for example, the ratio between social-media ad budget and accumulated reactions in the campaign for the 2025 German federal election, the AfD shows the best ratio, while the Greens appear the least efficient. At the same time, however, The Left also managed to gain ground. <a href="#" class="source-link">Source</a></p>

      <p>Since people tend to be more receptive to messages that are not immediately recognizable as propaganda <a href="#" class="source-link">Source</a>, but instead appear to come from “ordinary people like you and me,” social media uses not only official party accounts but also supposedly independent accounts to multiply a message. A strategy that outside social media has long been known as <strong class="term">astroturfing</strong>. <a href="#" class="source-link">Source</a></p>

      <p>Closely related to this is the spread of political narratives in the form of supposedly apolitical entertainment. This is also nothing new; books, films, or video games, for example, have always conveyed a certain picture of the world, often unintentionally, but often deliberately as well. Through social media, podcasts now increasingly come into play too—formats that do not primarily see themselves as political but as entertainment. This supposed distance from politics, which the hosts often even believe in themselves, as well as the intimate character of the format, make such formats effective tools for spreading narratives.</p>

      <p><em>Media Matters</em> examined this phenomenon for the US in 2024 and identified a strong dominance of right-wing formats here as well: 9 out of the 10 most-followed online formats with a discernible political orientation leaned right. <a href="#" class="source-link">Source</a></p>

      <figure class="image-placeholder">
        <div class="image-box">Placeholder for image: political podcasts / entertainment as narrative carrier</div>
        <figcaption>You can add a visualization of podcast or creator networks here.</figcaption>
      </figure>

      <p>What is also striking is that one third of these formats with a recognizable political orientation categorize themselves as apolitical—especially often, namely in 72% of cases, when they are actually politically right-wing.</p>

      <h3>The German media landscape</h3>

      <p>Depending on whom you ask, the media in Germany are clearly left-wing or clearly right-wing. <a href="#" class="source-link">Source</a> Unsurprisingly, how one sees this depends primarily on where one stands oneself. For this reason, BiasScanner tries not to measure bias using the left-right spectrum, but rather through concrete kinds of language that are used.</p>

      <p>The Medienkompass once tried, before 2019, to summarize these positions using a large survey, according to the logic that if one half sees a medium as left-wing and the other half sees it as right-wing, it probably corresponds to the center of society. <a href="#" class="source-link">Source</a></p>

      <p>At the beginning of 2025, I combined that survey, which asked not only about orientation but also about perceived journalistic quality, with figures on the reach of different media in order to get an overview of how the German media landscape as a whole might be classified. Taken together, these numbers suggest a German media landscape that is politically center-right and not necessarily of particularly high journalistic quality.</p>

      <p>By far the highest-circulation daily newspaper was <em>BILD</em>, which is well known to be as right-leaning as it is sensationalist. Its website was likewise the most-visited online news portal, although here the gap to other websites such as the much more centrist and higher-quality <em>Tagesschau</em> and <em>t-online</em>—which, like other newer media, was not part of the Medienkompass survey but is generally placed around the center to center-left—was not as large as in print. On television, public-service broadcasting formats still led the field, while on YouTube <em>Welt TV</em>, once again a Springer brand, had the greatest reach.</p>

    <section id="what-can-we-do" class="article-section">
      <span class="kicker">What now?</span>
      <h2>What can we do?</h2>

      <p>The big question remains: what can we do to at least try to inform ourselves as well as possible instead of allowing ourselves to be manipulated?</p>

      <p>One approach that we try, for example with BiasScanner, is based, as mentioned above, on <strong class="term">inoculation theory</strong>. The idea is to build up a certain resistance by confronting people with forms of bias and propaganda in a controlled setting. If later on you recognize certain patterns that you have already seen while experimenting with BiasScanner, that can help you not be impressed by them.</p>

      <p>At the same time, we also want to promote critical thinking and engagement with media more generally. Anyone who does not simply view the news as “the news” but as something that can be analyzed, discussed, and critically questioned with a certain distance is probably not influenced by it so easily either.</p>

      <p>It should be clear that none of us goes through life completely free of bias or can see the world exactly as it is—but that is okay. What matters is that we are aware of this and still try, to the best of our knowledge and conscience, to somehow move closer to the “truth.” Here are a few ideas we can keep in mind:</p>

      <div class="tip-box">
        <ul class="tip-list">
          <li>Always remember: the world shown in the media is not a direct image of the real world, but a version that has passed through many filters.</li>
          <li>Be skeptical. Do not make the mistake of believing something just because it fits your own worldview.</li>
          <li>Allow yourselves and others to change their minds. We are all wrong all the time, and that is okay. Far too often we cling to something only because it is too difficult for our identity to admit to ourselves and others that we were wrong. We should therefore all strive for a social environment in which such an admission can happen without high social costs.</li>
          <li>Always ask yourselves: Is this news item trying to inform me, or is it trying to tell me what to think or feel? Where does this news come from, and why am I seeing it?</li>
          <li>Give yourselves a break. You do not have to be permanently up to date on the latest details of every crisis, conflict, and tragedy in the world. Doomscrolling helps no one—quite the opposite.</li>
          <li>Do not let yourselves be incited against other people. That has never led to anything good. Recognize such attempts and do not go along with them.</li>
          <li>Distance yourselves from the news item and look at it from the outside: whether and how different kinds of bias appear in it. Feel free to use BiasScanner as a first step 😉</li>
        </ul>
      </div>
    </section>

        "header.title": "Bias, Propaganda und ihre automatisierte Erkennung",
        "main.title": "Bias, Propaganda und BiasScanner verstehen",
        "nav.intro": "Grundlagen",
        "nav.taxonomy": "Taxonomie",
        "nav.automation": "Automatisierung",
        "nav.psychology": "Psychologie",
        "nav.history": "Geschichte",
        "nav.causes": "Ursachen",
        "nav.effects": "Wirkungen",
        "nav.social-media": "Social Media",
        "nav.what-can-we-do": "Was tun?"
      }
    };

    const articleTemplates = {
      en: "article-en",
      de: "article-de"
    };

    function updateLanguage(selectedLanguage) {
      document.querySelectorAll("[data-translate]").forEach(element => {
        const key = element.getAttribute("data-translate");
        if (translations[selectedLanguage] && translations[selectedLanguage][key]) {
          element.textContent = translations[selectedLanguage][key];
        }
      });

      const articleTarget = document.getElementById("article-content");
      const templateId = articleTemplates[selectedLanguage];
      const template = document.getElementById(templateId);

      if (articleTarget && template) {
        articleTarget.innerHTML = template.innerHTML;
      }

      document.documentElement.lang = selectedLanguage;
      updateProgressBar();
    }

    function updateProgressBar() {
      const progressBar = document.getElementById("progress-bar");
      const scrollTop = window.scrollY;
      const docHeight = document.documentElement.scrollHeight - window.innerHeight;
      const progress = docHeight > 0 ? (scrollTop / docHeight) * 100 : 0;
      progressBar.style.width = progress + "%";
    }

    const languageSelect = document.getElementById("language-site");
    updateLanguage(languageSelect.value);

    languageSelect.addEventListener("change", () => {
      updateLanguage(languageSelect.value);
    });

    window.addEventListener("scroll", updateProgressBar);
    window.addEventListener("load", updateProgressBar);
    window.addEventListener("resize", updateProgressBar);
  </script>
</body>
</html>
