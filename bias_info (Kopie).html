  <template id="article-de">
    <section id="intro" class="article-section">
      <span class="kicker">Grundlagen</span>
      <h2>Was ist Medienbias?</h2>

      <p class="lead">Das vielleicht Wichtigste gleich vornweg: Worüber reden wir eigentlich, wenn wir über <strong class="term">Medienbias</strong> sprechen?</p>

      <p>Ganz allgemein bezeichnet <strong class="term">Bias</strong> eine systematische Verzerrung in der Darstellung der Realität. Das kann zum Beispiel der Fall sein, wenn ein Chatbot zur Berufsberatung Mädchen deutlich seltener Berufe wie Informatikerin oder Ingenieurin vorschlägt und Jungen deutlich seltener Berufe wie Erzieher oder Sozialarbeiter, obwohl das Geschlecht noch lange nichts über die Eignung aussagt. Oder wenn wir eine neue Bekanntschaft machen und unser Gehirn sich als mentale Abkürzung erst einmal instinktiv auf vorschnelle Urteile basierend auf oberflächlichen Merkmalen verlässt, um unser Gegenüber einzuschätzen. Oder eben in den Medien, wenn ein Ereignis nicht nach bestem Wissen und Gewissen fair und auf Basis von Fakten dargestellt wird, sondern die Berichterstattung eine durch die Fakten nicht gedeckte Perspektive einnimmt oder bevorzugt. Das ist dann der <strong class="term">Medienbias</strong>, den BiasScanner zu entdecken trainiert ist.</p>

      <p>Man kann sich Bias also wie einen Filter vorstellen, der zwischen der Realität und unserer Wahrnehmung liegt. Die Welt, wie wir sie sehen, ist nicht immer die Welt, wie sie wirklich ist. Da prinzipiell jeder Mensch diesen Filter hat, auch Journalisten und Journalistinnen, schleichen sich hier die eigenen Perspektiven und Vorurteile gerne mal unbewusst in die Berichterstattung ein. Medienbias ist also nicht immer Absicht; tatsächlich dürfte ein sehr großer Anteil an Bias in den Medien ohne manipulative Absichten entstehen. Es gibt aber auch Medienbias, der gezielt eingesetzt wird, um zu manipulieren und zu spalten; in diesem Fall sprechen wir von <strong class="term">Propaganda</strong>.</p>

      <p>Während wir damit im heutigen Sprachgebrauch hauptsächlich politisch motivierte Manipulationsversuche verstehen, war es bis in die Mitte des 20. Jahrhunderts tatsächlich so, dass auch Werbung, die im Grunde oft ja nichts anderes ist als Manipulation aus wirtschaftlicher Motivation, ganz offen und wertfrei als Propaganda bezeichnet wurde. Denn auch wenn Vertreter klassischer Theorien der Volkswirtschaftslehre oder der Demokratietheorie bisweilen das Gegenteil behaupten: Ob wir nun eine bestimmte Partei unterstützen oder das Smartphone einer bestimmten Marke kaufen, ist beides nicht einfach eine aufgeklärte, rationale Entscheidung auf Basis der besten Argumente. In beiden Fällen geht es ebenso darum, wer „unsere Knöpfe am besten“ drückt.</p>

      <p>Tatsächlich trägt das 1928 erschienene, wohl berühmteste Buch von Edward Bernays, der heute als einer der Begründer der <strong class="term">Public Relations</strong> (PR) gilt, passenderweise den einfachen Titel „Propaganda“. <a href="#" class="source-link">Quelle</a></p>

      <p>Im Verlauf des 20. Jahrhunderts wurde das Ansehen des Begriffs „Propaganda“ jedoch durch den massenhaften, staatlich organisierten Einsatz in beiden Weltkriegen und die Verbindung mit totalitären Ideologien so negativ konnotiert, dass Unternehmen und Werbeschaffende irgendwann jede Assoziation damit vermeiden wollten.</p>

      <div class="definition-box">
        <p><strong>Zusammengefasst können wir also definieren:</strong></p>
        <p><strong>Medienbias:</strong> Die Neigung, eine Nachricht, ob bewusst oder unbewusst, so zu berichten, dass sie eine bereits bestehende Erzählung untermauert, anstatt eine objektive Darstellung eines Sachverhalts zu bieten.</p>
        <p><strong>Propaganda:</strong> Der bewusste Einsatz von <strong class="term">(Medien)Bias</strong>, um die öffentliche Meinung zu manipulieren.</p>
      </div>
    </section>

    <section id="taxonomy" class="article-section">
      <span class="kicker">Struktur</span>
      <h2>Bias auf drei Ebenen und die Taxonomie der Bias-Typen</h2>

      <p><strong class="term">Medienbias</strong> kann sich prinzipiell auf drei Ebenen zeigen:</p>

      <h3>Publikationsebene</h3>
      <p>Dies bezeichnet den Gesamtbias eines Mediums, sei es eine Zeitung, ein Fernsehsender oder eine Social-Media-Seite. Über welche Themen wird überhaupt berichtet und wie viel? Welche tatsächlichen oder vermeintlichen Experten und Expertinnen kommen regelmäßig zu Wort?</p>

      <h3>Artikelebene</h3>
      <p>Hier geht es um den Gesamtbias eines einzelnen Artikels oder Beitrags: Welche Perspektive zu dem Thema, über das berichtet wird, wird unterm Strich insgesamt eingenommen? Welche Narrative werden unterstützt und auf welche Details wird sich fokussiert?</p>

      <h3>Satzebene</h3>
      <p>Welche Sichtweise wird in einem einzelnen Satz oder einer zusammenhängenden Gruppe von Sätzen forciert und wie genau zeigt sich das?</p>

      <div class="info-box">
        <p><strong>Wichtig für BiasScanner:</strong> BiasScanner ist vor allem darauf trainiert, <strong>Bias auf Artikel- und Satzebene</strong> zu erkennen. Die Publikationsebene ist ebenfalls relevant, erfordert aber eine andere Form der Auswertung, da sie nicht nur einzelne Formulierungen, sondern Muster über viele Beiträge hinweg betrachtet.</p>
      </div>

      <p>BiasScanner ist explizit darauf trainiert, die Artikel- und die Satzebene nach Bias zu durchsuchen. Zur Kategorisierung der einzelnen Sätze, die das System findet, haben wir schrittweise eine <strong class="term">Taxonomie</strong> der Bias-Typen entwickelt. Diese basiert auf einem von uns und durch eine erste Version von Scanner gesammelten Datensatz an Beispielen. An dieser Stelle noch einmal ein Dankeschön an alle, die BiasScanner fleißig genutzt haben, und natürlich besonders an die, die die Funktion zum „Spenden“ ihres Bias-Reports genutzt haben ;).</p>

      <p>Wir haben uns am Periodensystem der Elemente orientiert, um unsere Taxonomie von Medienbias-Typen zu strukturieren. Wie das Periodensystem, das unvollständig begann und sich durch neue Entdeckungen weiterentwickelt, soll auch unsere Taxonomie erweiterbar sein und schrittweise ein vollständiges Bild aller Bias-Typen auf Satzebene bieten.</p>

      <figure class="image-placeholder">
        <div class="image-box">Platzhalter für Bild: Taxonomie / „Periodensystem“ der Bias-Typen</div>
        <figcaption>Hier kannst du später die Visualisierung eurer Bias-Taxonomie einfügen.</figcaption>
      </figure>

      <p>Die Anordnung folgt dem Vorbild des Periodensystems:</p>
      <ul class="tip-list">
        <li>Ähnliche Bias-Typen werden in Gruppen zusammengefasst (farblich hervorgehoben).</li>
        <li>Die Platzierung der einzelnen Gruppen basiert auf der Häufigkeit aller Bias-Typen einer Gruppe in einer Stichprobe aus unserem Datensatz.</li>
        <li>Die Reihenfolge innerhalb der Gruppen richtet sich nach der Häufigkeit.</li>
        <li>Um Gruppen immer optisch miteinander verbunden zu lassen, wechselt die Reihenfolge im Zickzack-Muster: Ungerade Zeilen verlaufen von links nach rechts, gerade Zeilen von rechts nach links.</li>
        <li>Für jeden Typ zeigt eine von fünf Schriftgrößen die absolute Häufigkeit an.</li>
      </ul>

      <p>Ausführliche Erklärungen dazu, was die einzelnen Typen ausmacht und wie wir das System der Bias-Elemente genau entwickelt haben, sind in unserem Artikel verfügbar. <a href="#" class="source-link">Quelle</a></p>
    </section>

    <section id="automation" class="article-section">
      <span class="kicker">Automatisierte Erkennung</span>
      <h2>Von Lippmann bis zum Transformer</h2>

      <p>Als der amerikanische Journalist Walter Lippmann 1920 gemeinsam mit seinem Partner Charles Merz und unter Mithilfe seiner Ehefrau mit „A Test of the News“ die erste systematische Untersuchung von Bias in der Berichterstattung durchführte, analysierte er die Berichterstattung der New York Times über die Oktoberrevolution in Russland. <a href="#" class="source-link">Quelle</a></p>

      <p>Dieses Vorgehen war äußerst arbeitsaufwändig: Hunderte von Artikeln mussten gelesen und mit anderen Quellen verglichen werden. Derselbe Aufwand hätte für jedes neue Thema immer wieder von Neuem betrieben werden müssen. Gleichzeitig konstatierte Lippmann: „Die Nachrichten lassen sich nicht mathematisch ausdrücken.“</p>

      <p>Und dann, ein paar Jahrzehnte später, kam der Computer: Als 1954 im Georgetown–IBM-Experiment erstmals öffentlich demonstriert wurde, dass eine Maschine Texte verarbeiten kann, indem Sätze vom Russischen ins Englische übersetzt wurden, hielt Leon Dostert, einer der beteiligten Wissenschaftler, fest: „Die Verantwortlichen dieses Experiments betrachten es nun als definitiv erwiesen, dass eine Bedeutungsübertragung durch elektronische Sprachübersetzung möglich ist.“ <a href="#" class="source-link">Quelle</a></p>

      <p>Dies markierte den Beginn der elektronischen Verarbeitung von Sprache durch Computer, des sogenannten <strong class="term">Natural Language Processing</strong> (NLP). Mochte Lippmanns Aussage zu seiner Zeit noch gegolten haben, so schien es nun möglich, dass sich Nachrichten tatsächlich doch mathematisch ausdrücken lassen.</p>

      <p>Denn Nachrichten bestehen aus Wörtern, Wörter aus einzelnen Zeichen und <strong class="term">Token</strong> (kleineren Einheiten, ähnlich, aber nicht identisch mit Silben), und diese Zeichen und Token können durch Zahlen repräsentiert werden. Mit Zahlen wiederum kann automatisiert gerechnet und verglichen werden.</p>

      <p>Erste Ansätze zur Bias-Detektion haben häufig versucht, Verzerrungen zu messen, indem ein Artikel mit einer Referenz verglichen wurde. So wurde etwa gezählt, wie häufig bestimmte Thinktanks oder politische Gruppierungen zitiert werden <a href="#" class="source-link">Quelle</a>, oder wie ähnlich die im Artikel verwendete Sprache zu der Sprache von Reden ausgewählter Politiker ist <a href="#" class="source-link">Quelle</a>. Allerdings schränkt die Notwendigkeit eines Vergleichspunkts den Transfer auf neue Themen erheblich ein, da für jedes neue Thema diese Referenz erneut gesammelt werden muss. Eine Liste amerikanischer Think Tanks und Reden von Kongressabgeordneten sind nicht unbedingt nützlich, wenn man den Bias einer deutschsprachigen Zeitung ermitteln will.</p>

      <h3>Word Embeddings</h3>

      <p>Ein weiterer Durchbruch bei der „Mathematisierung“ von Nachrichten und Texten allgemein gelang mit den sogenannten <strong class="term">Word Embeddings</strong>: einer Methode, Wörter als <strong class="term">Vektoren</strong> (vereinfacht gesagt: Pfeile mit Länge und Richtung) darzustellen. Vektoren von Wörtern mit ähnlicher Bedeutung zeigen in eine ähnliche Richtung, während die Spitzen von Vektoren mit stark unterschiedlicher Bedeutung weit voneinander entfernt liegen.</p>

      <figure class="image-placeholder">
        <div class="image-box">Platzhalter für Bild: Visualisierung von Word Embeddings</div>
        <figcaption>Hier kannst du eine Vektordarstellung von Wortbeziehungen einfügen.</figcaption>
      </figure>

      <p>Zur grafischen Darstellung dieser Vektoren wird häufig eine vereinfachte dreidimensionale Projektion verwendet, da wir Menschen in einer dreidimensionalen Welt leben und uns höhere Dimensionen in der Regel nur schwer vorstellen können. In der Praxis besitzen solche Vektoren jedoch oft mehrere hundert Dimensionen, in <strong>Word2Vec</strong>, einem der bekanntesten Formate, zum Beispiel 300. <a href="#" class="source-link">Quelle</a></p>

      <p>Jede dieser Dimensionen kann eine bestimmte „Bedeutungsebene“ abbilden, etwa Tiere oder Fortbewegung, ist jedoch nicht immer unmittelbar für Menschen interpretierbar, sondern kann Zusammenhänge repräsentieren, die nur für den Computer erkennbar sind.</p>

      <p>Erzeugt werden diese Vektoren durch automatisierte statistische Verfahren, die anhand großer Textmengen erfassen, in welchen Kontexten Wörter häufig oder seltener gemeinsam auftreten.</p>

      <p>Wenn Wörter nun als Vektoren repräsentiert sind, können wir <strong class="term">Vektorrechnung</strong> nutzen, um Informationen über die Beziehungen zwischen ihnen zu gewinnen. Der Kosinus des Winkels zwischen zwei Vektoren gibt uns beispielsweise Auskunft darüber, wie ähnlich sich zwei Begriffe in ihrer Bedeutung sind. In Word2Vec beträgt der Kosinus zwischen <em>chimpanzee</em> (Schimpanse) und <em>gorilla</em> etwa 0,61, während er zwischen <em>chimpanzee</em> und <em>bicycle</em> (Fahrrad) nur rund 0,15 beträgt.</p>

      <figure class="image-placeholder">
        <div class="image-box">Platzhalter für Bild: Kosinus-Ähnlichkeit zwischen Wortvektoren</div>
        <figcaption>Hier kannst du eine einfache Grafik zur semantischen Ähnlichkeit ergänzen.</figcaption>
      </figure>

      <p>Besonders spannend wird es, wenn man beginnt, Vektoren zu addieren und zu subtrahieren. So ergibt die Summe aus dem Vektor von <em>princess</em> (Prinzessin) und <em>coronation</em> (Krönung) näherungsweise den Vektor von <em>queen</em> (Königin). Subtrahiert man <em>beer</em> (Bier) von <em>munich</em> (München), erhält man <em>berlin</em>. Und <em>birds</em> (Vögel) sind laut Word2Vec <em>animals</em> (Tiere) plus <em>feathers</em> (Federn), aber minus <em>scales</em> (Schuppen).</p>

        <div class="image-box">Platzhalter für Bild: Vektoraddition und -subtraktion</div>
        <figcaption>Hier kannst du ein Beispiel für semantische Vektorarithmetik einfügen.</figcaption>
      </figure>

      <h3>Maschinelles Lernen, neuronale Netze und Transformer</h3>

      <p>Wenn man heute von <strong class="term">KI</strong> redet, meint man damit im Grunde eigentlich maschinelles Lernen. Das unterscheidet sich von klassischer Programmierung dadurch, dass man nicht manuell dem Computer sagt: „Wenn das passiert, dann mach das“, sondern, vereinfacht gesagt, zeigt man dem Computer sehr viele Beispiele von einem Input und dem dazugehörenden Output, und er muss selbst einen Weg finden, dorthin zu kommen.</p>

      <p>Die gängigste Methode, um diesen Weg zu finden, sind derzeit verschiedene Formen der sogenannten <strong class="term">neuronalen Netze</strong>. Das sind Modelle, die von einer stark vereinfachten Vorstellung der Funktionsweise des menschlichen Gehirns inspiriert sind. Man programmiert mehrere Schichten von sogenannten Neuronen, die untereinander verbunden sind. Jedes Neuron merkt sich eine Zahl, die witzigerweise auch <em>Bias</em> heißt und bestimmt, wann es ein Signal, das es von einem anderen Neuron empfängt, selbst an andere Neuronen weiterleitet. Für jede Verbindung merkt es sich auch noch die sogenannten <strong class="term">Gewichte</strong>, die bestimmen, wie stark ein Signal weitergeleitet wird.</p>

      <p>Zu Beginn sind all diese Zahlen zufällig. Im sogenannten Training werden dem Modell jetzt ganz viele Beispiele gezeigt, nach dem Prinzip: Für dieses Eingangssignal, zum Beispiel das Bild einer Katze, muss dieses Ergebnis herauskommen, in diesem Fall die Klassifizierung als Katze. Dann wird geprüft, ob das mit den gegenwärtigen Zahlen schon funktionieren würde. Wenn nicht, werden mit einem mathematischen Verfahren namens <strong class="term">Backpropagation</strong> diese Zahlen so angepasst, dass sie zum richtigen Ergebnis führen würden. Wird das nun nicht für eines, sondern für sehr viele Katzenbilder gemacht, lernt das Modell irgendwann, woran es generell eine Katze erkennen kann.</p>

      <figure class="image-placeholder">
        <div class="image-box">Platzhalter für Bild: Neuronales Netz / Training / Backpropagation</div>
        <figcaption>Hier kannst du ein Schaubild zu neuronalen Netzen ergänzen.</figcaption>
      </figure>

      <p>Man kann diese Modelle jetzt auch mithilfe der oben beschriebenen Word Embeddings so trainieren, dass sie anstatt zu sagen, welches Tier auf einem Bild zu sehen ist, eine Vorhersage darüber abgeben, welches nächste Wort in einem Text kommt. Einfache neuronale Netze wie die oben beschriebene Grundform stoßen dabei allerdings schnell an ihre Grenzen, da sie Schwierigkeiten haben, den Zusammenhang aller Wörter eines Satzes zu erfassen, und deshalb oft eher sinnlose Vorschläge machen. Deshalb gibt es spezielle Varianten dieser Grundform, die extra auf Text zugeschnitten sind, wie den <strong class="term">Transformer</strong>.</p>

      <p>Das wichtigste Feature, das dem Transformer hilft, den Kontext der Wörter eines Satzes zu berücksichtigen, ist der sogenannte <strong class="term">Self-Attention-Mechanismus</strong>, ein mathematisches Verfahren, bei dem für jedes Token seine Relevanz für jedes andere Token berechnet wird. Dadurch kann das Modell auch längere Texte verstehen.</p>

      <figure class="image-placeholder">
        <div class="image-box">Platzhalter für Bild: Self-Attention im Transformer</div>
        <figcaption>Hier kannst du eine Illustration des Self-Attention-Mechanismus einfügen.</figcaption>
      </figure>

      <p>Wenn diese Modelle sehr groß werden, mit Milliarden Parametern, und mit sehr viel Text trainiert werden, also Milliarden bis Billionen Tokens, spricht man von <strong class="term">Large Language Models</strong> wie zum Beispiel <strong>ChatGPT</strong>, <strong>LLaMA</strong> oder <strong>Mistral</strong>. Diese Modelle lernen, Token für Token das wahrscheinlichste nächste Token vorherzusagen, wobei ein gewisses Zufallselement für Variation sorgt.</p>

      <figure class="image-placeholder">
        <div class="image-box">Platzhalter für Bild: Größenordnung von Large Language Models</div>
        <figcaption>Hier kannst du eine Grafik zu Modellgröße, Parametern oder Trainingsdaten ergänzen.</figcaption>
      </figure>

      <p>Neben diesen generativen Transformern, den sogenannten <strong class="term">Generative Pre-trained Transformers</strong> (das GPT in ChatGPT), gibt es auch einen zweiten Zweig der Transformer-Familie: <strong class="term">Encoder-Modelle</strong> wie <strong>BERT</strong>, die Text hauptsächlich verstehen und klassifizieren, aber nicht generieren. Ihr Textverständnis ist oft sogar noch ein bisschen genauer, weil sie den gesamten Kontext eines Satzes gleichzeitig betrachten können, anstatt Token für Token in Reihenfolge zu sehen.</p>

      <p>BiasScanner selbst basiert auf der GPT-Technologie, da wir auch Erklärungen zu den erkannten Typen von Bias und Propaganda generieren lassen wollen. Genauer gesagt basiert BiasScanner auf sogenannten <strong class="term">Fine-Tunes</strong>. Dabei nimmt man ein Modell, das schon mit sehr viel unterschiedlichem Text trainiert wurde und deshalb ein grundlegendes Verständnis von Sprache besitzt, und trainiert es für eine spezialisierte Aufgabe, in unserem Fall die Erkennung und Erklärung von Bias und Propaganda, nach. ChatGPT selbst ist übrigens ein Fine-Tune des Basis-GPT-Modells, das darauf nachtrainiert wurde, Instruktionen zu folgen.</p>

      <p>Das Wichtigste für so ein Training ist ein Datensatz mit diversen Beispielen, welche das Problem gut abbilden. In unserem Fall also ein Datensatz mit den unterschiedlichsten Beispielen von Bias und Propaganda, korrekt klassifiziert und gut erklärt. <a href="#" class="source-link">Quelle</a></p>

      <div class="info-box">
        <p><strong>Wie BiasScanner praktisch arbeitet:</strong> Ein vortrainiertes Sprachmodell wird mit einem spezialisierten Datensatz aus Beispielen von <strong>Bias</strong> und <strong>Propaganda</strong> nachtrainiert. So kann es nicht nur problematische Stellen erkennen, sondern auch erklären, welcher <strong>Bias-Typ</strong> vorliegt und warum.</p>
      </div>
    </section>

    <section id="psychology" class="article-section">
      <span class="kicker">Psychologie</span>
      <h2>Niemand ist frei von Bias</h2>

      <p>Stellen wir uns vor, jemand erzählt uns, dass er demnächst nach Paris ziehen wird. Sobald wir den Namen der Stadt hören, tauchen vor unserem inneren Auge Bilder auf. Einige davon sind sicher romantisch, wie der Eiffelturm, der sich über der Stadt erhebt, oder die Pariser, die mit einem Baguette unterm Arm und einer Baskenmütze auf dem Kopf an Cafés in den gepflasterten Gassen von Montmartre vorbeigehen. Andere Bilder sind vielleicht weniger schön, manche denken an Hotels mit Bettwanzen oder an Abwässer in der Seine. Wir fragen uns, was wir über die Bewohner von Paris wissen: Irgendwo haben wir vielleicht gehört, die Pariser seien arrogant, andererseits hieß es woanders, sie seien besonders stylisch.</p>

      <figure class="image-placeholder">
        <div class="image-box">Platzhalter für Bild: Assoziationen mit Paris</div>
        <figcaption>Hier kannst du eine illustrative Collage oder Grafik zu Stereotypen und Assoziationen einfügen.</figcaption>
      </figure>

      <p>Je nachdem, welche Bilder in uns aufkommen, wird unsere Reaktion unterschiedlich ausfallen. Freuen wir uns für unser Gegenüber, oder können wir überhaupt nicht nachvollziehen, warum jemand freiwillig in so einer Stadt leben möchte? So oder so, die einzelnen Bilder in unserem Kopf fügen sich zu einem Gesamtbild von Paris zusammen. Doch woher kommen diese Bilder, und ist Paris wirklich einfach ihre Summe?</p>

      <p>Manche von uns haben vielleicht Filme wie <em>Midnight in Paris</em> oder Serien wie <em>Emily in Paris</em> gesehen. Andere sind anlässlich der Olympischen Spiele 2024 mit zahlreichen Berichten über die Stadt in ihrem Social-Media-Feed konfrontiert worden. Vielleicht kennen wir auch jemanden, der schon einmal dort war, oder wir haben die Stadt selbst besucht. Je nachdem, was wir auf dem Bildschirm gesehen, von anderen gehört oder selbst erlebt haben, wird unser Bild von Paris anders ausfallen. Hat uns Hollywood eine romantische Version von Paris gezeigt? <a href="#" class="source-link">Quelle</a> Haben russische Desinformationskampagnen das Thema Bettwanzen im Vorfeld der Spiele bewusst übertrieben? <a href="#" class="source-link">Quelle</a> Hat unser Bekannter einfach Pech gehabt und zufällig besonders arrogante Pariser getroffen? Streikte die Müllabfuhr gerade, als er dort war? Hatten wir im Gegenzug einfach Glück und sind nur den nettesten Parisern begegnet? Hatten wir besonders gutes Timing und waren nur an den schönsten Ecken unterwegs?</p>

      <p>Paris ist eine Stadt mit Millionen von Einwohnern und Tausenden Straßen, alle mit ihren Unterschieden. Und schon heute ist sie wieder ein bisschen anders als gestern. Das ist die Kernproblematik der Meinungsbildung: Die allermeisten Dinge auf der Welt sind zu komplex, zu unübersichtlich und zu sehr im Wandel begriffen, als dass ein einzelner Mensch sie vollständig erfassen könnte. Unsere eigenen Erfahrungen, wenn wir sie überhaupt haben, sind immer nur ein Ausschnitt des Ganzen. Auch die Informationen, die wir aus zweiter Hand erhalten, von Bekannten, aus den Nachrichten oder von Social Media, sind immer nur ein Aspekt, eine Perspektive, die bereits durch den Filter anderer gelaufen ist.</p>

      <p>Aus all diesen Bruchstücken bauen wir uns ein vereinfachtes Modell der echten Welt in unserem Kopf zusammen, die <strong class="term">„Pseudo-Umwelt“</strong>, wie der Journalist Walter Lippmann es nannte. <a href="#" class="source-link">Quelle</a> Diese Pseudo-Umwelt stützt sich stark auf <strong class="term">Stereotype</strong>, stark vereinfachte, verallgemeinerte Vorurteile und Annahmen über die Welt. Während wir das Wort „Stereotype“ heute vor allem für gruppenbezogene Klischees verwenden, meinte Lippmann damit auch generelle, stark vereinfachte Annahmen über Politik, Wirtschaft und Gesellschaft. Ein Beispiel ist die noch immer verbreitete Vorstellung, dass Staatsfinanzen prinzipiell so funktionieren wie die eines privaten Haushalts. <a href="#" class="source-link">Quelle</a></p>

      <figure class="image-placeholder">
        <div class="image-box">Platzhalter für Bild: Pseudo-Umwelt / vereinfachtes Weltbild</div>
        <figcaption>Hier kannst du eine Grafik zu Lippmanns „Pseudo-Umwelt“ ergänzen.</figcaption>
      </figure>

      <p>Im Idealfall ist diese Pseudo-Umwelt eine brauchbare Annäherung an die reale Welt, gut genug, um auf ihrer Basis sinnvolle Entscheidungen zu treffen. Im schlimmsten Fall hat das Weltbild eines Menschen nur wenig mit der echten Welt zu tun, was zu Problemen führt, wenn man Entscheidungen für eine Welt trifft, die es so gar nicht gibt. Sind zwei Pseudo-Umwelten zu unterschiedlich, erschwert das ebenso die Lösung von Konflikten und das Finden von Kompromissen. Schließlich ist es schwer, einen gemeinsamen Weg zu finden, wenn man unterschiedliche Karten verwendet. Lippmann schrieb dazu: Die Menschen „leben in derselben Welt, aber sie denken und fühlen in verschiedenen Welten“.</p>

      <p>Hinzu kommt, dass die allermeisten Menschen fest davon überzeugt sind, dass ihre Meinung nicht das Ergebnis von Stereotypen, Vorurteilen oder Perspektiven aus zweiter Hand ist. Nein, die eigene Meinung ist der „gesunde Menschenverstand“ oder das Ergebnis „eigener Recherche“. „Ideologen“ oder manipulierte „Schlafschafe“, das sind immer die anderen.</p>

      <p>Das zeigt sich nicht nur in Bierzeltreden diverser Politiker, sondern auch in Umfragen, in denen eine Mehrheit angibt, sich wenig Sorgen darüber zu machen, dass die eigenen konsumierten Medien einen Bias haben, wohl aber die Medien, die „die meisten anderen“ konsumieren. <a href="#" class="source-link">Quelle</a> Experimente der Yale-Universität zeigen zudem, dass die Unterstützung für dieselbe Maßnahme maßgeblich davon abhängt, ob die eigene politische Seite sie befürwortet oder ablehnt. Gleichzeitig waren sich die meisten Teilnehmer sicher, dass nicht sie, sondern nur das andere Lager so beeinflussbar sei. <a href="#" class="source-link">Quelle</a></p>

      <figure class="image-placeholder">
        <div class="image-box">Platzhalter für Bild: Wahrnehmung des Bias bei sich selbst vs. bei anderen</div>
        <figcaption>Hier kannst du eine Infografik zu „Bias blind spot“ oder motiviertem Denken ergänzen.</figcaption>
      </figure>

      <p>Das Phänomen dahinter nennt sich <strong class="term">motivated reasoning</strong>. Wir geben weder uns selbst noch anderen gerne zu, dass unsere Meinung vielleicht doch nicht das Ergebnis eigenständiger, rationaler Überlegungen ist. Es ist mittlerweile gut belegt, dass wir unseren Verstand oft vor allem dazu einsetzen, Positionen, die wir primär aufgrund von Bias eingenommen haben, im Nachhinein vermeintlich rational zu erklären. Oft „fühlen“ wir zuerst eine Meinung und suchen dann hinterher das Argument dafür, nicht umgekehrt. Deshalb kann es auch so schwer sein, jemanden mit Argumenten zu überzeugen, weil er oder sie die eigene Haltung oft gar nicht auf Basis von Argumenten gebildet hat.</p>

      <p>Dies ist insbesondere der Fall, wenn ein Thema für uns einen besonderen emotionalen oder identitätsstiftenden Wert hat. <a href="#" class="source-link">Quelle</a> Wer Paris als eine Stadt wie jede andere betrachtet, lässt sich tatsächlich noch nachweisbar durch neue Informationen über die Stadt beeinflussen. Wer jedoch eine besondere persönliche Verbindung zu Paris hat, ob positiv oder negativ, oder wer in Paris ein politisches Symbol für etwas sieht, wovon er zutiefst überzeugt ist, wird deutlich schwerer zugänglich sein.</p>

      <p>Ein konservativer Mensch vom Land könnte in Paris zum Beispiel ein Symbol für ein multikulturelles, linksliberales Frankreich sehen, das für ihn allein deshalb schon ein gesetzloser Moloch sein muss. Gleichzeitig könnte jemand, der sich eine autofreie Stadt wünscht, aber in einer Stadt lebt, die noch weit davon entfernt ist, angesichts der kürzlichen Bemühungen von Paris, fußgängerfreundlicher zu werden, entsprechend seine Hoffnungen und Wünsche unkritisch in Paris hineinprojizieren.</p>

      <h3>System 1 und System 2</h3>

      <p>Zusätzlich denken wir über die meisten Informationen und Reize, die uns tagtäglich erreichen, in der Regel gar nicht wirklich aktiv nach. Die meiste Zeit verbringen wir tatsächlich in einer Art Autopilot, da aktives Nachdenken für unser Gehirn eine anstrengende Tätigkeit ist, die es nach Möglichkeit zu vermeiden sucht. Der Kognitionspsychologe Daniel Kahneman, der viel zu diesem Thema geforscht hat, nannte diesen Autopiloten <strong class="term">„System 1“</strong> und das aktive Nachdenken <strong class="term">„System 2“</strong>. <a href="#" class="source-link">Quelle</a> System 1 ist deutlich schneller, und ohne diese Möglichkeit, viele eigentlich komplexe Aufgaben weitgehend zu automatisieren, sobald wir darin genug Übung haben, wären wir im Alltag ständig überfordert.</p>

      <p>Ein Gespräch in einer Fremdsprache über unseren Lieblingsfilm zu führen, während wir gleichzeitig ein Fahrzeug steuern, wäre zum Beispiel deutlich schwerer, wenn wir dabei ständig aktiv darüber nachdenken müssten, was jetzt dieses Wort noch mal heißt, wie diese Grammatik funktioniert, welche Filme wir denn alle überhaupt in unserem Leben schon gesehen haben, wie das mit dem Schalten noch mal geht und so weiter, statt auf gelernte Abläufe und Muster zurückgreifen zu können.</p>

      <p>Allerdings ist System 1 auch deutlich anfälliger für Fehler und gerät an seine Grenzen, wenn unvorhergesehene Schwierigkeiten auftauchen, zum Beispiel, wenn uns ein Wort nicht einfällt. In solchen Situationen greift dann wieder System 2. Tatsächlich gibt es auch Experimente, die zeigen, dass zum Beispiel bei vermeintlich einfachen Trickaufgaben die Verwendung einer schwer zu lesenden Schriftart die Aktivierung von System 2 erzwingt und so zu mehr richtigen Lösungen führt als in einer einfach lesbaren Schriftart, wo eher System 1 zur Lösung genutzt wird.</p>

      <p>Für unseren Medienkonsum ist das insoweit problematisch, als dass dieser in der Regel über System 1 läuft. Welche Schlagzeile wir anklicken, welche Meinung wir gut oder schlecht finden, welche Informationen wir glauben, welchen Artikel wir teilen – über all das denken wir ja in der Regel nicht bewusst nach, sondern handeln eben auch auf Autopilot. Und da das alles ohne für uns direkt spürbare Reibung abläuft, gibt es auch in der Regel wenig Anlass für System 2, aktiv zu werden und zum Beispiel zu sagen: „Moment mal, ich sehe das zwar prinzipiell ähnlich und mich interessiert die Geschichte, aber diese Schlagzeile soll mich doch eindeutig manipulieren – nein, lass mal.“</p>

      <div class="info-box">
        <p><strong>Kernidee:</strong> Wenn Medienkonsum meistens über <strong>System 1</strong> läuft, dann braucht es bewusste Reibung, damit <strong>System 2</strong> aktiv wird. Genau hier setzt BiasScanner an, indem manipulative Muster im Text sichtbar gemacht werden.</p>
      </div>

      <p>Hier setzt jetzt BiasScanner an, indem wir durch das bewusste Hervorheben der Techniken hinter Medienbias und Propaganda, während der Artikel gelesen wird, die nötige Reibung für System 2 schaffen wollen. Dabei bauen wir auch auf der <strong class="term">Inoculation Theory</strong> auf. Diese postuliert, dass Einstellungen auf ähnliche Weise gegen Überzeugungsversuche immun gemacht werden können, wie der Körper durch medizinische Impfungen gegen Krankheiten immun gemacht wird. <a href="#" class="source-link">Quelle</a></p>

      <p>Genauso wie ein Impfstoff eine abgeschwächte Form eines Virus einführt, um das Immunsystem zu stimulieren und Abwehrkräfte gegen stärkere Angriffe aufzubauen, geht diese Theorie davon aus, dass die Konfrontation von Personen mit abgeschwächten Formen gegensätzlicher Argumente zusammen mit Widerlegungen ihre Fähigkeit stärkt, in Zukunft überzeugenderen Herausforderungen zu widerstehen. Bisherige Forschungsergebnisse deuten darauf hin, dass diese Methode effektiver sein könnte als reine Faktenchecks, insbesondere dann, wenn man sich nicht nur einmalig, sondern regelmäßig aktiv mit Medienbias und Propaganda auseinandersetzt, während man Nachrichten liest. <a href="#" class="source-link">Quelle</a></p>

      <div class="quote-box">
        <p>In seinem Buch <strong>1984</strong> schrieb George Orwell über den fiktiven totalitären Staat Ozeanien: „Die Partei befahl, die Erkenntnis deiner Augen und Ohren zurückzuweisen, es war ihr letzter, wichtigster Befehl.“ <a href="#" class="source-link">Quelle</a></p>
      </div>

      <p>Das ist keine bloße Übertreibung, um den totalitären Anspruch von Propaganda zu betonen. In letzter Konsequenz kann Bias tatsächlich so weit gehen, dass wir unseren eigenen Augen nicht glauben können oder wollen, wenn das, was wir sehen, im Widerspruch zu der Welt in unserem Kopf steht.</p>

      <p>Werfen wir einen Blick auf die beiden Bilder hier unten und fragen uns: Auf welchem Bild sind mehr Menschen zu sehen, links oder rechts?</p>

      <figure class="image-placeholder">
        <div class="image-box">Platzhalter für Bild: Amtseinführungen Obama 2009 vs. Trump 2017</div>
        <figcaption>Hier kannst du später die beiden Vergleichsbilder einfügen.</figcaption>
      </figure>

      <p>Die Antwort dürfte für die meisten von uns eindeutig ausfallen: rechts, natürlich. Die Älteren unter uns haben vielleicht sofort erkannt, was die Bilder zeigen, schließlich war das Thema damals groß in den Medien. Es handelt sich um die Amtseinführung von US-Präsident Donald Trump im Jahr 2017 (rechts) und die seines Vorgängers Barack Obama im Jahr 2009 (links). Trump und seine Regierung bestanden fälschlicherweise darauf, dass Trumps Amtseinführung mehr Besucher hatte als die von Obama, eine Sichtweise, die viele Anhänger der Republikaner übernahmen.</p>

      <p>In einem Experiment wurden einige Monate nach der Wahl beiden Gruppen tatsächlich beide Bilder gezeigt, ohne die Information, welcher Präsident darauf zu sehen war. <a href="#" class="source-link">Quelle</a> Die Teilnehmer wurden gefragt, auf welchem Bild mehr Menschen zu sehen seien. Unter denen, die 2016 die Demokraten gewählt hatten, wählten 2 % das linke Bild. Unter den Trump-Wählern waren es 15 %. Noch interessanter wird es, wenn man sich ansieht, welche Trump-Wähler sich besonders für das offensichtlich falsche Bild entschieden. Es waren vor allem diejenigen, die sich als starke Unterstützer sahen und gleichzeitig genug politische Nachrichten verfolgten, um zu wissen, dass das linke Bild die Amtseinführung „ihres“ Präsidenten zeigte. Hier stieg der Anteil derer, die angaben, das linke Bild zeige mehr Menschen, auf 26 %.</p>

      <p>Ob sie dort wirklich mehr Menschen sahen oder aus Loyalität zu Trump die Wahrheit nicht zugeben wollten, lässt sich nicht sagen. Mittlerweile gibt es jedoch Experimente mit Hirnscannern, die Hinweise darauf geben, dass starker Bias tatsächlich die Regionen unseres Gehirns beeinflussen kann, die etwa für räumliche Wahrnehmung zuständig sind. <a href="#" class="source-link">Quelle</a> Es ist also durchaus möglich, dass manche Trump-Wähler auf dem linken Bild, sobald sie die Abbildung und damit die nach ihrem Weltbild richtige Antwort erkennen, mehr Personen zu sehen glauben als auf dem rechten Bild. Weil für unser Gehirn manchmal einfach nicht sein kann, was nicht sein darf.</p>
    </section>

    <section id="history" class="article-section">
      <span class="kicker">Geschichte</span>
      <h2>Bias ist so alt wie die Medien selbst</h2>

      <p><strong class="term">Medienbias</strong> ist so alt wie die Medien selbst. Seitdem die Menschheit damit begann, bedeutende Ereignisse zu dokumentieren, wurden diese Aufzeichnungen von den subjektiven Erfahrungen und Perspektiven ihrer Schöpfer sowie vom gesellschaftlichen Kontext, in dem sie lebten, geprägt.</p>

      <p>Die Siegesstele von Naram-Sin, die im 23. Jahrhundert v. Chr. hergestellt wurde und als eines der frühesten bekannten Artefakte gilt, das als Nachrichtenbericht betrachtet werden kann, enthält eine Kombination aus geschnitzten Bildern und Keilschrift, die den Sieg des akkadischen Königs Naram-Sin über das Volk der Lullubi nicht nur beschreibt, sondern gleichermaßen preist. <a href="#" class="source-link">Quelle</a></p>

      <figure class="image-placeholder">
        <div class="image-box">Platzhalter für Bild: Siegesstele von Naram-Sin</div>
        <figcaption>Hier kannst du ein historisches Bild oder eine Abbildung der Stele einfügen.</figcaption>
      </figure>

      <p>Die sumerische Königsliste, eine Sammlung von Schriften aus dem 21. Jahrhundert v. Chr., die sumerische Könige, die von ihnen regierten Städte und die Dauer ihrer Regierungszeit – die oft unrealistisch lange Zeitspannen wie 1.500 Jahre umfasst – auflistet, wird heute in erster Linie als ein Werk angesehen, das von Herrschern in Auftrag gegeben wurde, um ihren Machtanspruch zu legitimieren, indem sie die Vorstellung verbreiteten, dass es schon immer eine einzige Stadt gegeben habe, in der die Königsherrschaft ausgeübt wurde. <a href="#" class="source-link">Quelle</a></p>

      <figure class="image-placeholder">
        <div class="image-box">Platzhalter für Bild: Sumerische Königsliste</div>
        <figcaption>Hier kannst du eine Abbildung oder ein Foto der Königsliste ergänzen.</figcaption>
      </figure>

      <p>Die Acta Diurna, die weithin als eine der frühesten Formen einer öffentlichen Zeitung angesehen wird, die zwischen 59 v. Chr. und 235 n. Chr. zirkulierte, wurde von der römischen Regierung veröffentlicht, um die Öffentlichkeit über wichtige Ereignisse zu informieren, wie sie von der Regierung gesehen werden sollten. Nebenbei bemerkt: Diese Berichte endeten angeblich mit dem Satz „publicare et propagare“, was bereits auf die Beziehung zwischen den Medien und dem später geprägten Begriff Propaganda hindeutet. <a href="#" class="source-link">Quelle</a></p>

      <p>Während des größten Teils der Geschichte dienten die Nachrichtenmedien weniger der bestmöglichen Information der Öffentlichkeit als vielmehr als Kommunikationskanal der Herrscher einer Gesellschaft zu den verschiedenen Gruppen unter ihnen.</p>

      <p>Dies änderte sich nicht sofort, als im 17. Jahrhundert die ersten modernen Zeitungen erschienen. Auch wenn es nicht mehr die Regierung war, die Informationen direkt an ihre Untertanen weitergab, bedeuteten Zensur, eingeschränkter Zugang zu unvoreingenommenen Informationsquellen und oft eine enge Verbindung zu Interessengruppen im Allgemeinen, dass die neuen, in Privatbesitz befindlichen Zeitungen sich nicht allzu sehr darum bemühten, objektiv und unvoreingenommen zu sein.</p>

      <p>Tatsächlich ist die bloße Vorstellung, dass Journalismus in irgendeinem Sinne des Wortes objektiv und unvoreingenommen sein könnte und sollte, eine relativ neue Erfindung, die Mitte bis Ende des 19. Jahrhunderts entstand, teilweise aufgrund der Geschäftsinteressen von Nachrichtenagenturen. In einer Rede vor dem US-Kongress im Jahr 1856 erklärte Lawrence Gobright, Chef der Agentur <em>Associated Press</em> (AP) in Washington, dass es die Aufgabe der AP sei, Fakten zu vermitteln, ohne sie zu kommentieren, damit die Zeitungen, die die eigentlichen Kunden der Agenturen waren, dann „ihre eigenen Kommentare zu den ihnen übermittelten Fakten abgeben“ könnten. <a href="#" class="source-link">Quelle</a></p>

      <p>Eine tiefgreifendere Diskussion über die Medien und ihren Einfluss auf die öffentliche Meinung begann zu Beginn des 20. Jahrhunderts, stark beeinflusst durch den offensichtlichen Erfolg groß angelegter Propagandamaßnahmen während des Ersten Weltkriegs. Walter Lippmann und Edward Bernays, die später zwei der einflussreichsten Bücher auf diesem Gebiet verfassten, arbeiteten beide für das Committee on Public Information, eine US-amerikanische Regierungsbehörde, die nach dem Eintritt des Landes in den Ersten Weltkrieg gegründet wurde, um die öffentliche Meinung zugunsten des Krieges zu beeinflussen.</p>

      <p>Lippmann schrieb 1922 das Buch <em>Public Opinion</em>, das als grundlegendes Werk darüber gilt, wie die öffentliche Meinung in einer Gesellschaft durch die begrenzte Fähigkeit des Menschen, die reale Welt zu verarbeiten, darzustellen und zu kommunizieren, geprägt und verzerrt wird. <a href="#" class="source-link">Quelle</a> Er argumentierte, dass diese Begrenzung dazu zwingt, sich auf ein verkürztes mentales Bild der Realität zu verlassen, was erhebliche Auswirkungen auf die Demokratie hat.</p>

      <p>Während im Journalismus nun erstmals Vorstellungen von Objektivität und Fairness formalisiert wurden, etwa in den ersten Ethikkodizes, die von Journalistenverbänden verabschiedet wurden, wie den <em>Canons of Journalism</em> der American Society of Newspaper Editors aus dem Jahr 1923 <a href="#" class="source-link">Quelle</a>, schickten sich gleichzeitig totalitäre Ideologien wie der Faschismus oder der Stalinismus an, Propaganda auf ein neues, alle Bereiche der Gesellschaft umfassendes Level zu heben. Dabei kamen zunehmend neue Technologien zum Einsatz, wie das Radio, der Film und das Fernsehen.</p>

      <p>So wie einst die Erfindung der Druckerpresse im 16. Jahrhundert die schnelle Verbreitung der Thesen Luthers und anderer Reformatoren durch Flugblätter und Karikaturen an ein Massenpublikum ermöglichte, erwiesen sich auch diese neuen Medien schnell als zentral für die Verbreitung von Propaganda im 20. Jahrhundert.</p>

      <figure class="image-placeholder">
        <div class="image-box">Platzhalter für Bild: Druckerpresse / Radio / Film / Fernsehen / Propaganda</div>
        <figcaption>Hier kannst du eine historische Montage zu Medientechnologien und Propaganda einfügen.</figcaption>
      </figure>

      <p>Im 21. Jahrhundert wird diese Rolle zusehends vom Internet und hier insbesondere von <strong class="term">Social Media</strong> übernommen, welches aus unserer heutigen Informationslandschaft kaum mehr wegzudenken ist. Der Mensch im 21. Jahrhundert wird wohl täglich mit mehr Informationen, die mal mehr und mal weniger den Titel Nachrichten verdienen, überschüttet als jemals zuvor in der Geschichte der Menschheit. Dabei verlieren die klassischen Medienhäuser zusehends an Relevanz und Deutungshoheit; sie sind auf dem Weg, nur noch eine Stimme unter vielen zu werden. <a href="#" class="source-link">Quelle</a></p>

      <p>Anstatt dass Medienhäuser entscheiden, über welche Themen und aus welcher Perspektive wir informiert werden, und wir uns zumindest theoretisch entscheiden können, diese oder jene Zeitung zu lesen oder diesen oder jenen Sender einzuschalten, entscheidet heute der <strong class="term">Algorithmus</strong>, ob wir die Perspektiven dieser Medienhäuser überhaupt noch zu Gesicht bekommen. Die Bestätigung der eigenen Meinung ist dabei nichts mehr, was wir aktiv suchen müssen, sie wird uns passiv serviert.</p>

        <div class="image-box">Platzhalter für Bild: Algorithmischer Feed / Social-Media-Gatekeeping</div>
        <figcaption>Hier kannst du eine Visualisierung von Plattform-Feeds oder Empfehlungsalgorithmen ergänzen.</figcaption>
      </figure>

      <p>Während Falschmeldungen an sich nichts Neues sind und auch in der Vergangenheit bereits Bilder, Dokumente und Berichte gefälscht wurden, ermöglicht das Aufkommen generativer KI nun eine völlig neue Geschwindigkeit und Dimension in der Erstellung und Verbreitung solcher Inhalte. Welche Auswirkungen dies auf die Meinungsbildung im weiteren Verlauf des 21. Jahrhunderts haben wird, bleibt abzuwarten.</p>
    </section>

    <section id="causes" class="article-section">
      <span class="kicker">Ursachen</span>
      <h2>Warum entsteht Bias in den Medien?</h2>

      <p>Es gibt verschiedene Ursachen für Bias in den Medien. In einer Marktwirtschaft ist die <strong class="term">Nachfrage des Publikums</strong> ein wichtiger Treiber: Menschen bevorzugen oft Nachrichten, die ihre eigene Weltsicht bestätigen. Das schafft einen Markt für Medien, die genau diese Voreingenommenheit bedienen, und es gibt wenig Anreiz, diese Ansichten zu hinterfragen. <a href="#" class="source-link">Quelle</a></p>

      <p>Ähnlich funktionieren <strong class="term">Filterblasen</strong> in sozialen Medien: Algorithmen zeigen Nutzern vor allem Inhalte, die zu ihren bestehenden Meinungen passen. Wie oben beschrieben, hängt diese Nachfrage oft mit dem Wunsch zusammen, kognitive Anstrengung zu vermeiden. <a href="#" class="source-link">Quelle</a> Widersprüchliche Meinungen oder Fakten können Stress auslösen, besonders wenn sie die eigene Identität oder Überzeugungen infrage stellen.</p>

      <p>Während unser Gehirn diese Form von Stress tunlichst vermeiden will, zeigen Studien und Experimente paradoxerweise gleichzeitig eine klare Präferenz für negativ formulierte Schlagzeilen und Artikel über negative Ereignisse, obwohl jeder, der schon einmal am Doomscrollen war, wohl wissen wird, dass wir uns dadurch nicht besser fühlen. <a href="#" class="source-link">Quelle</a> Eine Theorie besagt, dass dies mit der Evolutionsbiologie zusammenhängt. <a href="#" class="source-link">Quelle</a> In der Vergangenheit, als die menschliche Umwelt tatsächlich voller Gefahren wie wilden Tieren war, war es vorteilhaft, sich mit diesen Bedrohungen auseinanderzusetzen, statt sie zu ignorieren. Allerdings hat sich die Welt seitdem stark verändert. Unser Gehirn war nie darauf ausgelegt, täglich in Echtzeit mit Informationen über alle Katastrophen überflutet zu werden, egal, ob sie uns direkt betreffen oder wir direkt Einfluss darauf nehmen können.</p>

      <p>Man kann das Verhältnis zwischen dem Bias der Medien und dem Bias ihres Publikums als eine <strong class="term">„Henne-Ei“-Situation</strong> beschreiben, da die Ansichten des Publikums, die bestätigt werden wollen, ja nicht spontan entstehen, sondern selbst im Kontext des Einflusses der Massenmedien geformt werden. Die Medien sind nicht einfach nur „Opfer“ des Bias ihres Publikums, sondern prägen diesen aktiv mit, manchmal absichtlich, manchmal unabsichtlich.</p>

      <p>Dies geschieht beispielsweise durch den persönlichen Hintergrund der Journalisten, die in Medienorganisationen arbeiten und oft keine repräsentative Teilmenge der Bevölkerung darstellen. Im Vergleich zur Gesamtbevölkerung stammen deutsche Journalisten zum Beispiel deutlich häufiger aus akademischen Elternhäusern und haben seltener einen Migrationshintergrund, was sich dann auch in der Auswahl der Themen und Perspektiven niederschlägt. <a href="#" class="source-link">Quelle</a></p>

      <p>Ebenso kann die <strong class="term">Agenda der Eigentümer</strong> eine große Rolle spielen: Viele Medien befinden sich zum Beispiel im Besitz von Milliardären, für die ein Medienimperium nicht nur eine lukrative Einnahmequelle sein kann, sondern auch eine Möglichkeit, ihre enormen finanziellen Ressourcen einzusetzen, um die Gesellschaft in ihrem Sinne zu beeinflussen. <a href="#" class="source-link">Quelle</a></p>

      <figure class="image-placeholder">
        <div class="image-box">Platzhalter für Bild: Medienbesitz / Konzentration von Macht</div>
        <figcaption>Hier kannst du eine Grafik zu Medieneigentum und Einflussstrukturen einfügen.</figcaption>
      </figure>

      <p>Interessanterweise zeigt sich ein scheinbarer Widerspruch zwischen Journalisten und Medienbesitzern: Während Journalisten im Schnitt politisch leicht links orientiert sind <a href="#" class="source-link">Quelle</a>, haben die Eigentümer der reichweitenstärksten Medien, als Vermögende, in der Regel ein Interesse daran, gegen linke Positionen wie etwa eine höhere Besteuerung von Vermögen zu agitieren. Stattdessen fördern sie eher rechte oder liberale Stimmen, deren Politik Vermögenden tendenziell mehr Vorteile bietet. <a href="#" class="source-link">Quelle</a></p>

      <p>Ein Beispiel hierfür ist Mathias Döpfner, CEO und Eigentümer des Axel-Springer-Verlags, zu dem unter anderem <em>Bild</em>, <em>Welt</em> und <em>Politico</em> gehören. Im Bundestagswahlkampf 2021 wies er den damaligen Chefredakteur Julian Reichelt in einer später geleakten SMS an, die FDP zu „stärken“, damit diese in der sich abzeichnenden Ampelkoalition möglichst selbstbewusst auftreten könne. <a href="#" class="source-link">Quelle</a></p>

      <p>Natürlich findet in der Praxis eine gewisse Selektion statt: Journalisten suchen sich eher eine Anstellung bei Medien, die zu ihrer politischen Ausrichtung passen, und Medien bevorzugen Journalisten, die „zur Marke“ passen. <a href="#" class="source-link">Quelle</a> Zudem befinden sich nicht alle Medien im Privatbesitz einzelner Vermögender, manche sind genossenschaftlich oder öffentlich-rechtlich organisiert.</p>

      <p>Gleichzeitig bemühen sich Journalisten, die ihren Beruf ernst nehmen, nach bestem Wissen und Gewissen fair zu bleiben. Auch nehmen nicht alle privaten Eigentümer direkten Einfluss auf redaktionelle Entscheidungen. Letztlich ist die politische Einstellung der Journalisten vor allem bei Medien relevant, die ohnehin eine klare Schlagseite haben. <a href="#" class="source-link">Quelle</a> Bei Medien, die ernsthaft um Objektivität bemüht sind, tritt sie dagegen deutlich in den Hintergrund.</p>

      <p>In autoritär regierten Staaten tritt dagegen der Einfluss der privaten Besitzverhältnisse und Überzeugungen zugunsten der vorgegebenen Linie der Regierung zurück.</p>

      <p>Die Beziehung zwischen all diesen Faktoren kann recht komplex sein. Die anfängliche Entscheidung von Fox News, den Sieg von Joe Biden bei den US-Wahlen 2020 zu bestätigen, führte beispielsweise zu einem Verlust von Zuschauern, die sich, möglicherweise auch deshalb, weil Fox News vor der Wahl immer wieder Beiträge hatten, die vor angeblichem Wahlbetrug der Demokraten warnten, Sendern zuwandten, die die falsche, aber nachgefragte Erzählung verbreiteten, die Wahl sei manipuliert worden. <a href="#" class="source-link">Quelle</a> Letztendlich gab Fox News dem Marktdruck nach und verbreitete ebenfalls Falschmeldungen über die Sicherheit von Wahlmaschinen. Daraufhin wurde der Sender wegen Verleumdung verklagt und musste im Rahmen eines Vergleichs eine erhebliche Zahlung leisten.</p>

      <figure class="image-placeholder">
        <div class="image-box">Platzhalter für Bild: Fox News / Wahlnarrative / Marktdruck</div>
        <figcaption>Hier kannst du eine passende Grafik oder Screenshot-Zusammenstellung ergänzen.</figcaption>
      </figure>

      <p>Neben diesen Faktoren hat sich auch der Wunsch, in der Gunst der Objekte der Berichterstattung zu bleiben, als relevanter Faktor erwiesen. Journalisten möchten möglicherweise keinen Zugang zu Interviewpartnern verlieren, indem sie zu kritisch erscheinen, oder sie entwickeln durch wiederholten Kontakt persönliche Sympathien. <a href="#" class="source-link">Quelle</a></p>

      <p>Es hat sich ebenso gezeigt, dass der Vorwurf an Journalisten, sie seien bei einem Thema parteiisch, ob berechtigt oder nicht, tatsächlich dazu führen kann, dass sie übersteuern und bewusst Narrative der Seite übernehmen, von der diese Kritik kommt, um vermeintlich ihre Neutralität zu beweisen. <a href="#" class="source-link">Quelle</a></p>

      <p>So hatten deutsche Medien beispielsweise lange Zeit in ihrer Berichterstattung – bis auf Ausnahmen – prinzipiell auf die Nennung der Herkunft von Tatverdächtigen komplett verzichtet, was ihnen nach den Übergriffen in der Kölner Silvesternacht 2015 den Vorwurf einbrachte, sie würden absichtlich die migrantische Herkunft der Täter verschweigen. Um dem zu begegnen, begannen die deutschen Medien zum einen häufiger, die Herkunft zu nennen, nach einer Auswertung aus dem Jahr 2025 in jedem dritten Zeitungsbericht und jedem vierten Fernsehbericht über Gewaltkriminalität. <a href="#" class="source-link">Quelle</a></p>

      <p>Sie nennen die Herkunft aber nicht prinzipiell häufiger, sondern vor allem, wenn es sich um eine ausländische Herkunft handelt. In TV-Berichten werden zu 95 % Ausländer erwähnt, wenn die Herkunft thematisiert wird. In Zeitungsberichten sind es 91 %. In der aktuellen Kriminalstatistik sind etwa 34 % der Tatverdächtigen Ausländer; das heißt: Sofern die Herkunft genannt wird, kommen in der Berichterstattung über Gewaltkriminalität fast nur Ausländer vor, obwohl sie in der Realität nur etwa ein Drittel der Tatverdächtigen ausmachen.</p>

      <figure class="image-placeholder">
        <div class="image-box">Platzhalter für Bild: Statistische Verzerrung bei Herkunftsnennungen</div>
        <figcaption>Hier kannst du ein Diagramm oder eine Gegenüberstellung von Statistik und Berichterstattung einfügen.</figcaption>
      </figure>

      <p><strong class="term">Werbung</strong>, was ja als eine Form von Propaganda betrachtet werden kann, ist ein interessanter Fall, da Unternehmen und Organisationen sowohl potenzielle Kunden für Werbeflächen in einem Medium als auch potenzielle Objekte der Berichterstattung sind. Tatsächlich wurde gezeigt, dass Zeitungen tendenziell positiver über Werbepartner berichten, auch über die eigentliche bezahlte Anzeige hinaus; schließlich will man seine Kunden nicht durch einen zu kritischen Ton verschrecken. <a href="#" class="source-link">Quelle</a></p>

      <p>Darüber hinaus kann Werbung auch Anreiz für ein Medium sein, sich mit radikalen, extremistischen oder einfach nur potenziell kontroversen Inhalten zurückzuhalten, da Werbekunden oft eine Assoziation mit solchen Inhalten vermeiden wollen. <a href="#" class="source-link">Quelle</a></p>

      <p>Abseits von privaten Akteuren nutzen auch Staaten und Regierungen zuweilen Werbung als Mittel, um Medien zu einer genehmeren Berichterstattung zu drängen, insbesondere in mehr oder weniger funktionierenden Demokratien, wo direkte Druckmittel und staatliche Gewalt begrenzt sind. <a href="#" class="source-link">Quelle</a></p>

      <p>Je nach Grad der Autorität und der Stärke unabhängiger Institutionen können Regierungen in solchen Systemen auf weitere Arten Einfluss nehmen, darunter die Vorenthaltung oder Zuteilung direkter Finanzmittel oder die Anwendung von Zensur, entweder direkt erzwungen oder durch eine Kultur der Selbstzensur, die durch rechtlichen oder gewaltsamen Druck auf Journalisten und Medien entsteht. Dabei stehen nicht nur dem Staat solche Mittel zur Verfügung. Wenn eine Regierung nicht in der Lage oder willens ist, Medienschaffende vor Bedrohungen durch nichtstaatliche Akteure wie Terrorgruppen, kriminelle Organisationen oder mächtige Unternehmen zu schützen, können diese entsprechend ebenfalls Druck ausüben. <a href="#" class="source-link">Quelle</a></p>

      <div class="info-box">
        <p>In einer liberalen Demokratie, die auf dem Ideal einer gut informierten Bürgerschaft beruht, die vielfältige Perspektiven berücksichtigt, auf faktenbasierte Argumentation reagiert, wenn sie politische Meinungen bildet, und bereit bleibt, mit denen zu kompromittieren, die zu anderen Schlussfolgerungen gelangen, sind diese Erkenntnisse ernüchternd.</p>
        <p>Diese Sorge wird noch größer, wenn man die Treiber von Medienvoreingenommenheit betrachtet. Wenn der Einfluss der Massenmedien wirksam ist und die Akteure mit der größten Fähigkeit, diesen Einfluss zu gestalten, diejenigen sind, die bereits erhebliche Macht besitzen, darunter Regierungen, einflussreiche politische Organisationen, Unternehmen oder wohlhabende Einzelpersonen, untergräbt das Ergebnis direkt ein weiteres demokratisches Ideal, nämlich das Prinzip, dass jeder die gleiche Möglichkeit haben sollte, seine Stimme zu erheben und für seine Position einzutreten.</p>
      </div>
    </section>

    <section id="effects" class="article-section">
      <span class="kicker">Wirkungen</span>
      <h2>Wie Bias und Propaganda wirken</h2>

      <p>Prinzipiell wirken Bias und Propaganda auf drei Ebenen: auf der Ebene der <strong class="term">Überzeugung</strong>, auf der Ebene der <strong class="term">Polarisierung</strong> und auf der Ebene des <strong class="term">Zynismus</strong>.</p>

      <h3>Überzeugung</h3>

      <p>Zum einen gibt es Propaganda, wie man sie sich oft vorstellt: mit dem primären Ziel, ihre Empfänger von einer bestimmten Botschaft zu überzeugen. Die hier beschriebenen Bias-Typen können tatsächlich ein geeignetes Mittel dafür sein. Allerdings ist es gar nicht so einfach, jemanden durch bloße Kommunikation wirklich von etwas zu überzeugen, vor allem nicht, wenn ein Thema der Person sehr wichtig ist, sie eine starke Meinung vertritt und glaubt, viel darüber zu wissen. <a href="#" class="source-link">Quelle</a></p>

      <p>Die Forschung zeigt, dass sich neue Überzeugungen vor allem bei Themen formen lassen, die dem Empfänger mehr oder weniger egal sind und ihn nicht auf persönlicher Ebene berühren. Die meisten Menschen sind schnell bereit zu akzeptieren, dass Thomas Edison nicht die Glühbirne erfunden hat – tatsächlich hat er eine bestehende Erfindung verbessert und auf den Massenmarkt gebracht –, selbst wenn sie zuvor das Gegenteil geglaubt haben. Bei Themen wie Migration, Sozialstaat, Sicherheit oder Steuerpolitik, also Themen, die politisch aufgeladen sind, sieht das jedoch ganz anders aus. <a href="#" class="source-link">Quelle</a></p>

      <p>Weil sie so politisiert sind, sind sie zu eng mit der eigenen Identität verknüpft. Sich oder anderen einzugestehen, dass man sich auch nur in einem Punkt irrt, stellt mit seinen Implikationen eine Bedrohung für das komplette eigene Bild der Welt und den eigenen Platz darin dar, etwas, das nach Möglichkeit vermieden werden muss.</p>

      <p>Eine überzeugende Botschaft ist also oft vor allem eine, die an bereits bestehende Überzeugungen anknüpft und als deren Fortsetzung wahrgenommen wird – nicht als Widerspruch. Ein Widerspruch kann sogar zum sogenannten <strong class="term">Backfire-Effekt</strong> führen: Werden Menschen mit einer Gegenposition zu ihren Überzeugungen konfrontiert, selbst wenn diese noch so logisch und gut argumentiert ist, verfestigen sie ihre Haltung als Abwehrmechanismus oft noch weiter. <a href="#" class="source-link">Quelle</a></p>

      <figure class="image-placeholder">
        <div class="image-box">Platzhalter für Bild: Backfire-Effekt / Reaktanz</div>
        <figcaption>Hier kannst du eine einfache Grafik zum Backfire-Effekt oder zu Reaktanz einfügen.</figcaption>
      </figure>

      <p>Überhaupt sind Medien viel effektiver darin, die Themen vorzugeben, die im öffentlichen Diskurs eine Rolle spielen, als direkt die Meinung zu diesen. Auch wenn Staatsmedien in Autokratien aufgrund der fehlenden Konkurrenz durch widersprüchliche Perspektiven hier einen Vorteil haben könnten. <a href="#" class="source-link">Quelle</a> Da gewisse Themen allerdings in der Bevölkerung mit gewissen Parteien besonders assoziiert sind, das sogenannte <strong class="term">Topic Ownership</strong> <a href="#" class="source-link">Quelle</a>, und diese von der Diskussion „ihres“ Themas besonders profitieren, können Medien so trotzdem indirekt großen Einfluss nehmen.</p>

      <p>So ein Einfluss auf Wahlergebnisse ist zum Beispiel für das amerikanische Fox News empirisch belegt: Überall dort, wo der konservative Sender an den Start ging und eine Zuschauerschaft fand, haben die Republikaner messbar profitiert. <a href="#" class="source-link">Quelle</a></p>

      <h3>Polarisierung</h3>

      <p>Wenn Bias und Propaganda in beide Richtungen bestehender Überzeugungen wirken, entweder indem sie sie durch ihren Inhalt bestätigen oder durch den Widerspruch eine Verfestigung als Gegenreaktion provozieren, ist das zu erwartende Ergebnis eine Verstärkung gesellschaftlicher Gräben und Konfliktlinien. Ein Ergebnis, welches in Studien auch immer wieder nachgewiesen wird. <a href="#" class="source-link">Quelle</a></p>

      <p>Wenn das Thema bereits polarisierend genug ist, muss die Berichterstattung dazu nicht einmal selbst besonders spaltend sein. Selbst gute, faktenbasierte, faire journalistische Arbeit kann durch bloße Erhöhung der Aufmerksamkeit für das Thema die Spaltung weiter befeuern. <a href="#" class="source-link">Quelle</a></p>

      <p>Es wäre allerdings falsch, diese Politisierung nur als Nebenprodukt von Überzeugungsversuchen zu sehen. Oft ist diese Spaltung selbst genau das Ziel. „Divide et impera“, also „teile und herrsche“, wie es bereits in der Antike hieß. Es ist gut dokumentiert, wie russische Propagandakampagnen in den USA sowohl pro- als auch anti-Black-Lives-Matter-Inhalte produzierten und verbreiteten. <a href="#" class="source-link">Quelle</a> Teilweise wurden dabei sogar zeitgleich Pro- und Kontra-Veranstaltungen in derselben Stadt gefördert, um Konfrontation zu erzeugen.</p>

      <figure class="image-placeholder">
        <div class="image-box">Platzhalter für Bild: Polarisierung / Divide et impera / BLM-Kampagnen</div>
        <figcaption>Hier kannst du eine Visualisierung zu polarisierenden Narrativen ergänzen.</figcaption>
      </figure>

      <p>Natürlich wird diese Strategie nicht nur zwischen Staaten im „Informationskrieg“ eingesetzt. Auch innerhalb einer Gesellschaft kann es für diejenigen mit Macht von Vorteil sein, wenn Gruppen, die eigentlich ein Interesse daran hätten, sich miteinander zu solidarisieren, stattdessen übereinander herfallen.</p>

      <p>So zeigen Analysen politischer Werbekampagnen in den USA, dass die Republikaner besonders in Gegenden, die durch das Outsourcing von Jobs im Rahmen zunehmender Globalisierung schwer getroffen wurden, in ihrer Wählerwerbung besonders stark auf Themen setzten, die für die Identität vieler der weißen, nun oft arbeitslosen Arbeiter in diesen Regionen wichtig sind, etwa Waffenbesitz, Abtreibung, generell konservative Werte und auch Ablehnung von Immigration. <a href="#" class="source-link">Quelle</a></p>

      <p>Wirtschaftliche Fragen wie Steuern, Handel oder Sozialstaat rückten dagegen in den Hintergrund. Diese Themen wurden wiederum von den Demokraten stärker betont. Die Strategie der Republikaner lässt sich also so verstehen, dass sie angesichts einer sich verschlechternden wirtschaftlichen Lage versuchten, zu verhindern, dass sich ihre Wähler den Demokraten zuwenden, von deren Wirtschafts- und Sozialpolitik sie möglicherweise mehr profitiert hätten. Stattdessen betonten sie stärker, was die Wähler in ihrer Identität von den Demokraten unterscheidet, um sie bei der Stange zu halten.</p>

      <p>In ihrer extremsten Form ist die Funktion von Propaganda vielleicht die schädlichste. Der Autor Aldous Huxley schrieb einst: „Das Ziel des Propagandisten ist es, eine Gruppe von Menschen vergessen zu lassen, dass andere Gruppen ebenfalls Menschen sind.“ <a href="#" class="source-link">Quelle</a> Diese <strong class="term">Dehumanisierung</strong> des vermeintlichen Gegners ist das, was die schlimmsten Formen der organisierten Gewalt, zu denen die Menschheit fähig ist, überhaupt erst ermöglicht. Kein Krieg und kein Völkermord wären denkbar, wenn es nicht möglich wäre, Menschen die Menschlichkeit derer, die nicht zu „ihrer“ Gruppe gehören, vergessen zu lassen. <a href="#" class="source-link">Quelle</a></p>

      <h3>Zynismus</h3>

      <p>Manchmal bemüht sich Propaganda gar nicht, eine angebliche Wahrheit zu verbreiten. Stattdessen kann das Ziel auch sein, das Konzept von <strong class="term">Wahrheit</strong> generell aufzulösen. <a href="#" class="source-link">Quelle</a> An einem Tag wird eine Variante der Ereignisse, eine Version der Geschichte, gepusht, am nächsten Tag eine völlig andere. Bis eine Lüge richtiggestellt ist, wurden schon zwei neue in Umlauf gebracht. Angesichts dieser Flut erscheint die Wahrheit bald nur noch als eine Geschichte unter vielen. „Man hört so viel, wer weiß schon, was wirklich stimmt? Es lügen doch sowieso alle.“</p>

      <figure class="image-placeholder">
        <div class="image-box">Platzhalter für Bild: Informationsüberflutung / Auflösung von Wahrheit</div>
        <figcaption>Hier kannst du eine Visualisierung zu „firehose of falsehood“ oder Zynismus einfügen.</figcaption>
      </figure>

      <p>Für ein Regime oder eine Bewegung, für die Macht wichtiger ist als jede tatsächliche Überzeugung, kann diese Form der Propaganda durchaus nützlicher sein. Wer an keine Wahrheit mehr glaubt, kann sich auch nicht enttäuscht von ihrer Wahrheit abwenden.</p>

      <p>Eine Propaganda, der die Wahrheit nicht mehr wichtig ist, stört dementsprechend auch ein Fact-Check nicht wirklich. Tatsächlich hat beispielsweise die russische Auslandspropaganda im Rahmen der „Operation Overload“ sogar immer wieder gezielt Fact-Checking-Organisationen kontaktiert und sich dabei als „besorgte Bürger“ ausgegeben, die diese oder jene Falschmeldung geprüft haben wollten. <a href="#" class="source-link">Quelle</a> Denn eine Richtigstellung sehen viel mehr Leute als die ursprüngliche Lüge.</p>

      <p>Es gibt mittlerweile Forschung, die belegt, dass selbst ein erfolgreicher Fact-Check, also einer, bei dem die Leute hinterher wissen, was wahr und was falsch ist, nicht verhindern kann, dass die Lüge einen gewissen Effekt auf Überzeugungen hat. <a href="#" class="source-link">Quelle</a></p>

      <h3>Einschüchtern</h3>

      <p>Von außen betrachtet wirkt die Propaganda in vielen Diktaturen oft einfach nur absurd lächerlich: riesige goldene Statuen, peinliche Loblieder und Wahlen, die angeblich mit 99 % der Stimmen gewonnen werden. Diese Absurdität ist zum Teil natürlich einfach das Ergebnis des Narzissmus dieser Gewaltherrscher, die irgendwann den Kontakt zur Realität verloren haben. Gleichzeitig steckt aber auch System dahinter: Öffentlich eine Lüge zu verkünden, die so absurd und dumm ist, dass jeder sie sofort als solche durchschaut, und gleichzeitig jeden zu zwingen, öffentlich bei dieser Lüge mitzumachen, ist eine Demonstration von Macht. Widerstand gegen eine Regierung, die eine ganze Gesellschaft zwingen kann, „die Lüge zu singen“, erscheint oft sinnlos. <a href="#" class="source-link">Quelle</a></p>

      <figure class="image-placeholder">
        <div class="image-box">Platzhalter für Bild: Absurde Propaganda / Personenkult / Einschüchterung</div>
        <figcaption>Hier kannst du eine Grafik oder Bildmontage zu Personenkult und Propagandaspektakel ergänzen.</figcaption>
      </figure>

      <p>Diktaturen versuchen häufig, etwa durch ein Netzwerk aus Spitzeln, zu garantieren, dass sich diese Lüge bis ins Private fortsetzt, bis sich jede und jeder fragt, ob sie oder er nicht allein mit ihrer oder seiner Opposition dasteht. Allerdings hat die Geschichte gezeigt, dass das Private letztlich viel schwerer zu kontrollieren ist als die Öffentlichkeit. Im Privaten überwintern die wahren Überzeugungen, warten auf Risse in der Fassade, und sobald diese bricht, kann alles ganz schnell gehen – wie in der Geschichte „Des Kaisers neue Kleider“. <a href="#" class="source-link">Quelle</a></p>

      <p>Historisch lässt sich die letzte öffentliche Rede von Nicolae Ceaușescu als symbolisch für diese Dynamik verstehen. Der rumänische Diktator pflegte einen extremen Personenkult, ließ sich als „Genie der Karpaten“ feiern und inszenierte Massenkundgebungen mit zehntausenden jubelnden Anhängern. Bei seiner letzten Rede, mit der das Regime angesichts der Proteste in Timișoara Stärke demonstrieren wollte, sprach er vor rund 100.000 angekarrten Zuschauern. Als plötzlich einzelne Buhrufe laut wurden, die sich schnell lawinenartig über den Platz verbreiteten, geriet Ceaușescu ins Stocken, die TV-Übertragung brach ab, und aus der geplanten Machtdemonstration wurden Massenproteste, die wenige Tage später zu seinem Sturz führten. <a href="#" class="source-link">Quelle</a></p>

      <p>Tatsächlich sind es vor allem Diktaturen, die sich ansonsten keinerlei Mühe machen, auch nur den Anschein von Demokratie aufrechtzuerhalten, die auf solche absurde Propaganda setzen. Laut einer Analyse von Propaganda aus verschiedenen Autokratien entsprechen die typischen Staatsmedien in Autokratien, die einige demokratische Legitimationselemente aufrechterhalten, wie etwa Wahlen – die natürlich alles andere als frei und fair sind –, in ihrem Bias-Niveau etwa „Fox News“. <a href="#" class="source-link">Quelle</a> Also einem Sender, der zwar eindeutig extrem parteiisch ist und sich nicht zu schade ist, klare Propaganda zu verbreiten, aber eben Propaganda, die von den Zuschauern tatsächlich geglaubt werden soll. Medien in totalitären Staaten sind laut dieser Analyse jedoch etwa viermal parteiischer, bis zu einem Level, das ins Absurde abgleiten kann.</p>

      <p>Auch die Natur der Wirtschaft eines Regimes kann die Art der Propaganda und des Bias bestimmen: Autokratische Regierungen, die ihr Einkommen vor allem aus dem Verkauf natürlicher Ressourcen wie Erdöl ziehen, neigen zu einer noch strikteren Kontrolle jeder Form kritischer Berichterstattung als Diktaturen, die weniger ressourcenreich sind. <a href="#" class="source-link">Quelle</a> Die gängigste Theorie führt dies darauf zurück, dass Diktaturen, die sich nicht einfach über eine einzelne Ressource finanzieren können, stärker darauf angewiesen sind, dass die Bürokratie im Land einigermaßen funktioniert, und demzufolge ein Interesse daran haben, dass etwa Fälle von Korruption über die Medien aufgedeckt werden können.</p>

      <h3>Kann es gute Propaganda geben?</h3>

      <p>Wenn Bias und Propaganda grundsätzlich funktionieren, dann stellt sich natürlich die grundsätzliche Frage, ob es so etwas wie <strong class="term">gute Propaganda</strong> geben kann. Also Kommunikation, die anstatt im Sinne der Aufklärung mit rationaler Argumentation und Fakten zu überzeugen versucht, sich bewusst der hier diskutierten Techniken bedient, um Ziele voranzutreiben, die eine aufgeklärte Gesellschaft in der Regel als „gut“ bezeichnen würde.</p>

      <p>Natürlich bleibt es am Ende immer ein Stück weit subjektiv, was „gut“ ist; die Diskussion würde an dieser Stelle zu weit führen. Aber wenn man wirklich ein Anliegen hat, das diese Bezeichnung verdient, wäre es dann ein Fehler, sich dieser funktionierenden Methoden zu verweigern und den Erfolg seines Anliegens zu riskieren? Oder ist eine solche Form der manipulativen Kommunikation bereits ein Fehler an sich – aus prinzipiellen ethischen Überlegungen oder weil man die Normalisierung dieser Methoden für zu gefährlich hält?</p>

      <p>Denn tatsächlich kann Propaganda nicht nur Desinformation verbreiten, extremistische Kräfte an die Macht bringen und eine Gesellschaft spalten, sondern ebenso helfen, die öffentliche Gesundheit zu verbessern <a href="#" class="source-link">Quelle</a>, den Aufstieg von Extremisten bremsen <a href="#" class="source-link">Quelle</a> und Gemeinsamkeiten betonen. <a href="#" class="source-link">Quelle</a></p>

      <p>Der bereits erwähnte Edward Bernays schrieb dazu einmal: „Der einzige Unterschied zwischen ‚Propaganda‘ und ‚Bildung‘ liegt eigentlich im Blickwinkel. Die Förderung dessen, woran wir glauben, ist Bildung. Die Förderung dessen, woran wir nicht glauben, ist Propaganda.“ und „Propaganda wird niemals aussterben. Intelligente Menschen müssen erkennen, dass Propaganda das moderne Instrument ist, mit dem sie für produktive Ziele kämpfen und helfen können, Ordnung aus dem Chaos zu schaffen.“ <a href="#" class="source-link">Quelle</a></p>

      <figure class="image-placeholder">
        <div class="image-box">Platzhalter für Bild: Ethische Frage „gute Propaganda?“</div>
        <figcaption>Hier kannst du eine grafische Gegenüberstellung von Aufklärung und Manipulation ergänzen.</figcaption>
      </figure>

      <p>Die meisten der anderen hier bereits zitierten Autoren, von Lippmann über Huxley zu Orwell, sehen das deutlich kritischer. Wer letztendlich Recht hat, darauf kann BiasScanner keine Antwort geben, auch wenn ich natürlich meine eigene persönliche Meinung dazu habe. Unser Ziel ist es, auf das Thema aufmerksam zu machen und Usern zu helfen, Bias und Propaganda zu erkennen, zu verstehen und es ihnen zu ermöglichen, selbst eine Entscheidung zu treffen, wie sie damit umgehen wollen.</p>

    <section id="social-media" class="article-section">
      <span class="kicker">Digitale Gegenwart</span>
      <h2>Bias, Propaganda und Social Media</h2>

      <p>Oben wurde bereits darauf eingegangen, wie im 21. Jahrhundert die Rolle des „Gatekeepers“ zwischen uns und den Nachrichten zusehends von den klassischen Medien zu insbesondere <strong class="term">Social Media</strong> übergeht. Hier kommt der <strong class="term">Algorithmus</strong> als eine neue, automatisierte Quelle des Bias ins Spiel.</p>

      <p>In der Ausgestaltung des Algorithmus wiederum spielen die altbekannten Faktoren eine Rolle: Einmal das marktwirtschaftliche Zusammenspiel aus Angebot und Nachfrage. Social-Media-Plattformen haben ein Interesse daran, dass ihre User möglichst viel Zeit auf der Plattform verbringen, damit ihnen möglichst viel bezahlte Werbung ausgespielt werden kann. Also werden solche Inhalte priorisiert, mit denen User besonders viel interagieren, und das sind wie bei klassischen Medien emotionalisierende Inhalte und solche, die das eigene Weltbild bestätigen. <a href="#" class="source-link">Quelle</a></p>

      <p>Daneben kommt die Agenda der Eigentümer, die noch häufiger als bei klassischen Medien Milliardäre sind. Es ist nicht immer möglich nachzuvollziehen, wie sehr hier aktiv aufgrund politischer Agenda eingegriffen wird, aber im Fall von Elon Musk, „Twitter“ bzw. „X“, beispielsweise tauchten laut einer Analyse der Queensland University seine eigenen Tweets und die anderer rechter Accounts deutlich häufiger in den Empfehlungen auf, nachdem Elon Musk im Juli 2024 offiziell erklärte, Donald Trump in der anstehenden Wahl zu unterstützen. <a href="#" class="source-link">Quelle</a></p>

      <figure class="image-placeholder">
        <div class="image-box">Platzhalter für Bild: Social-Media-Empfehlungen / Plattformbias / X</div>
        <figcaption>Hier kannst du eine Plattformgrafik oder Visualisierung von Empfehlungsstrukturen einfügen.</figcaption>
      </figure>

      <p>Allgemein zeigen Experimente immer wieder, dass standardmäßig über alle Plattformen hinweg Usern deutlich mehr rechter Content vorgeschlagen wird als linker. Das kann aber auch einfach daran liegen, dass die politische Rechte in der Regel ein besseres „Social-Media-Game“ hat und das, was auf diesen Plattformen besonders gut läuft, besonders gut produzieren kann. Vergleicht man beispielsweise das Verhältnis zwischen Social-Media-Werbebudget und gesammelten Reaktionen im Wahlkampf für den deutschen Bundestag 2025, so ergibt sich für die AfD das beste Verhältnis, während die Grünen hier am ineffizientesten wären. Gleichzeitig konnte allerdings auch die Linke Boden gut machen. <a href="#" class="source-link">Quelle</a></p>

      <p>Da Menschen tendenziell empfänglicher für Botschaften sind, die nicht sofort als Propaganda erkennbar sind <a href="#" class="source-link">Quelle</a>, sondern vermeintlich von „Menschen wie du und ich“ kommen, werden auf Social Media neben offiziellen Parteiaccounts auch vermeintlich unabhängige Accounts zur Multiplikation der eigenen Botschaft eingesetzt. Eine Strategie, die außerhalb von Social Media schon länger als <strong class="term">Astroturfing</strong> bekannt ist. <a href="#" class="source-link">Quelle</a></p>

      <p>Passend dazu ist die Verbreitung politischer Narrative in Form von vorgeblich apolitischer Unterhaltung. Das ist ebenfalls nichts Neues; so transportierten zum Beispiel auch Bücher, Filme oder Videospiele schon immer ein bestimmtes Bild von der Welt, oft unbeabsichtigt, oft aber auch geplant. Durch Social Media kommen hier nun auch verstärkt zum Beispiel Podcasts ins Spiel, die sich selbst nicht primär als Politik-, sondern als Unterhaltungsformate sehen. Diese vorgebliche Distanz zur Politik, an die die Hosts oftmals sogar selbst glauben, sowie der intime Charakter machen diese Formate zu effektiven Werkzeugen der Verbreitung von Narrativen.</p>

      <p><em>Media Matters</em> hat dieses Phänomen für die USA 2024 untersucht und identifizierte auch hier eine starke Dominanz rechter Formate: 9 von 10 der nach Followern populärsten Online-Formate, bei denen eine politische Orientierung festzustellen war, waren eher rechts orientiert. <a href="#" class="source-link">Quelle</a></p>

      <figure class="image-placeholder">
        <div class="image-box">Platzhalter für Bild: Politische Podcasts / Unterhaltung als Narrativträger</div>
        <figcaption>Hier kannst du eine Visualisierung zu Podcast- oder Creator-Netzwerken ergänzen.</figcaption>
      </figure>

      <p>Was zusätzlich auffällt: Ein Drittel dieser Formate mit erkennbarer politischer Ausrichtung kategorisieren sich selbst als unpolitisch, besonders häufig, nämlich zu 72 %, wenn sie eigentlich politisch rechts stehen.</p>

      <h3>Die deutsche Medienlandschaft</h3>

      <p>Je nachdem, wen man fragt, sind die Medien in Deutschland eher klar links oder eindeutig rechts. <a href="#" class="source-link">Quelle</a> Wie man das sieht, hängt wenig überraschend primär davon ab, wo man selbst steht. Aus diesem Grund versucht BiasScanner, Bias nicht anhand des Links-rechts-Spektrums, sondern anhand konkreter, verwendeter Arten von Sprache zu messen.</p>

      <p>Der Medienkompass hat vor 2019 einmal versucht, diese Positionen mit einer großen Umfrage zusammenzufassen, nach dem Motto: Wenn die eine Hälfte ein Medium für links und die andere Hälfte es für rechts hält, entspricht es wohl der Mitte der Gesellschaft. <a href="#" class="source-link">Quelle</a></p>

      <p>Ich hatte diese Umfrage, die neben der Ausrichtung auch nach der empfundenen Qualität des Journalismus fragte, Anfang 2025 einmal mit Zahlen zur Reichweite verschiedener Medien kombiniert, um einen Überblick zu bekommen, wie man die deutsche Medienlandschaft insgesamt einordnen könnte. Zusammengefasst ergibt sich nach diesen Zahlen das Bild einer deutschen Medienlandschaft, die politisch Mitte-rechts steht und nicht unbedingt qualitativ hochwertig berichtet.</p>

      <p>Die mit Abstand auflagenstärkste Tageszeitung war die <em>BILD</em>, die bekanntermaßen ebenso rechts wie reißerisch ist. Ebenso war ihr Webangebot auch das meistaufgerufene Online-Nachrichtenportal, allerdings war hier der Abstand zu anderen Websites wie der deutlich mittigeren und qualitativ besseren <em>Tagesschau</em> und <em>t-online</em>, das in der Medienkompass-Umfrage wie andere, neuere Medien nicht dabei war, aber eher Mitte bis Mitte-links eingeordnet wird, nicht so groß wie bei den Printmedien. Im Fernsehen hatten nach wie vor Formate des öffentlich-rechtlichen Rundfunks die Nase vorn, während auf YouTube mit <em>Welt TV</em> ein weiteres Mal eine Marke des Springer-Konzerns am reichweitenstärksten war.</p>
